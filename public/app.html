  const[showNotes,setShowNotes]=useState(false);

  const[noteText,setNoteText]=useState("");
  const[smsText,setSmsText]=useState("");
  const[calls,setCalls]=useState(C);
  const filtered=filter==="all"?calls:calls.filter(c=>c.status===filter);
  const pick=c=>{setSel(c);setShowTr(false);setShowSms(false);setShowNotes(false)};
  const[reschedDate,setReschedDate]=useState("");
  const[reschedTime,setReschedTime]=useState("");
  const[newCall,setNewCall]=useState({name:"",phone:"",issue:"",urg:"Normal",src:"Google"});
  /* Metrics — same day bucket from Leads so numbers align across pages */
  const freshness=(t="")=>{
    const s=(t||"").toLowerCase();
    if(s.includes("min ago")||s.includes("just now"))return "now";
    if(s.includes("hr ago")||s.includes("hour"))return "today";
    if(s.includes("am")||s.includes("pm"))return "today";
    if(s==="yesterday")return "week";
    return "older";
  };
  const todayCalls=calls.filter(c=>{const f=freshness(c.time);return f==="now"||f==="today";});
  const bookedToday=todayCalls.filter(c=>c.status==="booked").length;
  const callsTotal=calls.length;
  const activeCalls=calls.filter(c=>c.status!=="declined").length;
  const bookRate=activeCalls?Math.round(calls.filter(c=>c.status==="booked").length/activeCalls*100):0;
  const avgDur=(()=>{
    const parts=calls.filter(c=>c.dur&&c.dur!=="0:00").map(c=>{const[m,s]=c.dur.split(":").map(Number);return m*60+s;});
    if(parts.length===0)return "—";
    const avg=Math.round(parts.reduce((a,n)=>a+n,0)/parts.length);
    return Math.floor(avg/60)+":"+String(avg%60).padStart(2,"0");
  })();

  return(
    <div className="flex flex-col h-full fu">
      {/* Hero metrics */}

          <p className="text-[10px] text-neutral-400 mt-0.5">{callsTotal} total in view</p>
        </div>
        <div className="bg-white border border-neutral-100 p-4">
          <p className="text-[10px] text-neutral-400 uppercase tracking-widest mb-1.5">Booked today</p>

          <p className="text-[10px] text-neutral-400 mt-0.5">appointments confirmed</p>
        </div>
        <div className="bg-white border border-neutral-100 p-4">
          <p className="text-[10px] text-neutral-400 uppercase tracking-widest mb-1.5">Avg duration</p>
          <p className="text-xl text-neutral-900 tabular-nums tracking-tight">{avgDur}</p>
          <p className="text-[10px] text-neutral-400 mt-0.5">Diali handles the full call</p>
        </div>
        <div className="bg-white border border-neutral-100 p-4">
          <p className="text-[10px] text-neutral-400 uppercase tracking-widest mb-1.5">Book rate</p>
          <p className="text-xl text-neutral-900 tabular-nums tracking-tight">{bookRate}<span className="text-xs text-neutral-400 ml-1">%</span></p>
          <p className="text-[10px] text-neutral-400 mt-0.5">of non-declined calls</p>
        </div>
      </div>

    <div className="flex flex-col md:flex-row gap-0 md:gap-6 flex-1 min-h-0">

          <FF label="New date"><TI type="date" value={reschedDate} onChange={e=>setReschedDate(e.target.value)}/></FF>
          <FF label="New time"><TI type="time" value={reschedTime} onChange={e=>setReschedTime(e.target.value)}/></FF>
          <FF label="Reason" hint="Optional context for the reschedule"><TA rows={3} placeholder="Customer requested..."/></FF>
        </div>
        <div className="px-7 py-5 border-t border-neutral-100 shrink-0 flex gap-3">
          <button onClick={()=>{if(reschedDate&&reschedTime&&sel){const formatted=new Date(reschedDate+"T"+reschedTime).toLocaleDateString("en-US",{weekday:"long",month:"short",day:"numeric"})+", "+new Date(reschedDate+"T"+reschedTime).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});setCalls(p=>p.map(c=>c.id===sel.id?{...c,booked:formatted}:c));setSel(prev=>({...prev,booked:formatted}));setReschedDate("");setReschedTime("");}setPanel(null);}} className="flex-1 bg-neutral-900 text-white py-3 text-sm hover:bg-black transition-colors">Confirm</button>

                      </div>
                    ):null}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )})}</div>}

      {/* List view */}
      {view==="list"&&<div className="bg-white border border-neutral-100">
        <div className="hidden md:grid px-7 py-3.5 border-b border-neutral-100 grid-cols-7 gap-4">{["Customer","Issue","Schedule","Tech","Revenue","Progress","Status"].map(h=><span key={h} className="text-xs text-neutral-400 uppercase tracking-widest">{h}</span>)}</div>

          <div key={j.id} onClick={()=>setSelJob(j)} className="px-4 md:px-7 py-4 border-b border-neutral-100 last:border-0 flex md:grid md:grid-cols-7 gap-3 md:gap-4 items-center hover:bg-neutral-50 cursor-pointer transition-colors">
            <div className="flex items-center gap-3"><Av n={j.cust} s={32}/><div className="min-w-0"><p className="text-sm text-neutral-900 flex items-center gap-2">{j.cust}{dayBucket(j.day)==="today"&&j.st!=="Completed"&&<span className="text-[9px] uppercase tracking-widest bg-neutral-900 text-white px-1.5 py-0.5">Today</span>}</p><p className="text-xs text-neutral-400 truncate">{j.ph}</p><p className="md:hidden text-xs text-neutral-400">{j.day} · {j.time} · ${j.rev.toLocaleString()}</p></div></div>
            <p className="hidden md:block text-xs text-neutral-500 truncate">{j.issue}</p>
            <div className="hidden md:block"><p className="text-sm text-neutral-900">{j.day}</p><p className="text-xs text-neutral-400">{j.time}</p></div>
            <span className="hidden md:block text-xs text-neutral-400 bg-neutral-100 px-2.5 py-1 w-fit">{j.tech}</span>
            <span className="hidden md:block text-sm text-neutral-900 tabular-nums">${j.rev.toLocaleString()}</span>
            <div className="hidden md:block"><div className="h-1 bg-neutral-100 w-20 mb-1"><div className="h-full bg-neutral-900" style={{width:j.pct+"%"}}/></div><span className="text-xs text-neutral-400">{j.pct}%</span></div>
            <span className={"text-xs px-3 py-1 w-fit ml-auto md:ml-0 "+(j.st==="Confirmed"?"bg-neutral-900 text-white":j.st==="Completed"?"bg-neutral-200 text-neutral-500":"bg-neutral-200 text-neutral-600")}>{j.st==="Confirmed"?"Scheduled":j.st}</span>
          </div>
        ))}
      </div>}
    </div>
  );
};

const Leads=({profile,setQuoteView})=>{
  const[view,setView]=useState("board");
  const[filter,setFilter]=useState("all");

  const[quoteMsg,setQuoteMsg]=useState("Hi {name}, thank you for contacting Martinez HVAC. Please find your service quote below. This estimate is valid for 30 days. Feel free to call us with any questions.");
  /* Freshness bucket from the string "time" field on each lead */
  const freshness=(t="")=>{
    const s=t.toLowerCase();
    if(s.includes("min ago")||s.includes("just now"))return "now";
    if(s.includes("hr ago")||s.includes("hour"))return "today";
    if(s.includes("am")||s.includes("pm"))return "today";
    if(s==="yesterday")return "week";
    if(s.includes("day"))return "week";
    return "older";
  };
  const isHot=(l)=>l.score==="hot"&&l.status!=="declined"&&l.status!=="booked"&&l.rev>=300&&(freshness(l.time)==="now"||freshness(l.time)==="today");
  const passes=(l)=>{
    if(filter==="all")return true;
    if(filter==="hot")return isHot(l);
    if(filter==="urgent")return l.urg==="urgent"||l.urg==="emergency";
    if(filter==="today"){const f=freshness(l.time);return f==="now"||f==="today";}
    if(filter==="week"){const f=freshness(l.time);return f!=="older";}
    return true;
  };
  const live=C.filter(l=>l.status!=="declined").filter(passes);
  const cols={
    New:live.filter(l=>l.status!=="booked"&&l.status!=="follow-up"&&!quoteSent[l.id]&&!leadDraftMeta[l.id]),
    "Followed up":live.filter(l=>l.status==="follow-up"&&!quoteSent[l.id]&&!leadDraftMeta[l.id]),
    "Quote sent":live.filter(l=>(leadDraftMeta[l.id]||quoteSent[l.id])&&l.status!=="booked"),
    Booked:live.filter(l=>l.status==="booked")
  };
  /* Metrics — pipeline excludes booked + declined (that's closed business, not pipeline) */
  const pipeline=C.filter(l=>l.status!=="declined"&&l.status!=="booked").reduce((a,l)=>a+l.rev,0);
  const hotCount=C.filter(isHot).length;
  const bookedThisWeek=C.filter(l=>l.status==="booked").length;
  const activePool=C.filter(l=>l.status!=="declined").length;
  const bookRate=activePool?Math.round(bookedThisWeek/activePool*100):0;
  const pv=C.reduce((a,c)=>a+c.rev,0);
  const timeline={1:[{t:"2:45 PM",a:"Inbound call — 4:32 duration"},{t:"2:47 PM",a:"AI booked appointment for tomorrow 2 PM"},{t:"2:48 PM",a:"SMS confirmation sent and acknowledged"}],2:[{t:"1:20 PM",a:"Inbound call — urgent furnace noise"},{t:"1:22 PM",a:"Emergency dispatch scheduled for 5 PM today"}],3:[{t:"12:15 PM",a:"Inbound call — seasonal maintenance inquiry"},{t:"12:17 PM",a:"AI sent available time slots via SMS"},{t:"—",a:"Awaiting customer response"}],4:[{t:"11:45 AM",a:"Inbound call — emergency water leak"},{t:"11:47 AM",a:"Emergency dispatch confirmed for 2:30 PM"}],6:[{t:"9:15 AM",a:"Inbound call — new build HVAC quote"},{t:"9:17 AM",a:"Quote appointment scheduled for Friday 10 AM"},{t:"—",a:"Blueprints requested from customer"}],7:[{t:"8:45 AM",a:"Inbound call — ductwork cleaning pricing"},{t:"—",a:"Quote pending — follow up today"}],9:[{t:"Yesterday",a:"Inbound call — refrigerant refill needed"},{t:"—",a:"Follow up overdue — customer waiting"}],11:[{t:"2 days ago",a:"Inbound call — 50 unit commercial bid"},{t:"2 days ago",a:"Meeting scheduled for Monday 9 AM"},{t:"—",a:"Prepare volume pricing before meeting"}],12:[{t:"3 days ago",a:"Inbound call — warranty question"},{t:"—",a:"Needs warranty lookup — follow up pending"}]};
  const nextSteps={1:"Confirm tech John S. has parts ready for tomorrow.",2:"Verify Mike T. is en route for 5 PM emergency.",3:"Send follow-up SMS with 3 available time slots this week.",4:"Check on emergency dispatch — confirm water damage assessment.",6:"Review blueprints and prepare detailed quote before Friday.",7:"Call back with ductwork cleaning estimate ($325 quoted).",9:"Call back today — customer has been waiting since yesterday.",11:"Finalize 50-unit volume pricing and prepare bid document.",12:"Look up warranty records and call Chris back with details."};

  const sendQuote=(lead)=>{
    const qid="Q-"+Date.now().toString(36).toUpperCase();

    const expires=new Date(Date.now()+validDays*86400000).toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"});
    setQuoteView({

      sub:subtotal,discPct:disc,discAmt,taxPct:taxRate,tax,total,

    setQuoteSent(p=>({...p,[lead.id]:true}));setQuoteOpen(null);

          <div className="flex-1 overflow-y-auto px-7 py-6 space-y-6">

            {leadDraftMeta[selLead.id]&&!quoteSent[selLead.id]&&<div className="border border-neutral-900">
              <div className="bg-neutral-900 px-5 py-3 flex items-center gap-2"><span className="w-3.5 h-3.5 text-neutral-500">{I.zap}</span><p className="text-xs text-neutral-400 uppercase tracking-widest flex-1">Draft quote ready</p><span className="text-[10px] text-neutral-400">Drafted {leadDraftMeta[selLead.id].draftedAt}</span></div>
              <div className="p-5 space-y-3">
                <p className="text-sm text-neutral-700 leading-relaxed">Diali drafted a quote from the call transcript. <span className="text-neutral-900">{leadDraftMeta[selLead.id].matchCount} of {leadDraftMeta[selLead.id].totalLines} line items</span> were auto-matched from your pricebook.</p>
                <div className="grid grid-cols-3 gap-3 pt-2">
                  <div><p className="text-lg text-neutral-900 tabular-nums tracking-tight">{leadDraftMeta[selLead.id].matchCount}</p><p className="text-xs text-neutral-400 mt-0.5">Auto-matched</p></div>
                  <div><p className="text-lg text-neutral-900 tabular-nums tracking-tight">{leadDraftMeta[selLead.id].totalLines-leadDraftMeta[selLead.id].matchCount}</p><p className="text-xs text-neutral-400 mt-0.5">Manual added</p></div>
                  <div><p className="text-lg text-neutral-900 tabular-nums tracking-tight">{leadDraftMeta[selLead.id].conf}%</p><p className="text-xs text-neutral-400 mt-0.5">Confidence</p></div>
                </div>
              </div>
            </div>}
            {quoteSent[selLead.id]&&<div className="bg-neutral-50 p-5 flex items-center gap-3"><span className="w-5 h-5 text-neutral-900">{I.check}</span><p className="text-sm text-neutral-700">Quote sent to {selLead.ph}</p></div>}
          </div>
          <div className="px-7 py-5 border-t border-neutral-100 shrink-0 flex gap-3">

          </div>

            <div className="flex-1 overflow-y-auto px-7 py-6 space-y-7">

                    <FF label="Valid for">
                      <SE value={validDays} onChange={e=>setValidDays(e.target.value)}>

                        <option value={60}>60 days</option>
                        <option value={90}>90 days</option>
                      </SE>
                    </FF>
                  </div>
                  <FF label="Notes / terms" hint="Optional — shown on the quote PDF"><TA value={qNotes} onChange={e=>setQNotes(e.target.value)} rows={2} placeholder="Payment due within 30 days. Parts warranty included..."/></FF>
                </div>
              </div>
            </div>

            <div className="px-7 py-5 border-t border-neutral-100 shrink-0 flex gap-3">
              <button onClick={()=>sendQuote(quoteOpen)} className="flex-1 bg-neutral-900 text-white py-3 text-sm flex items-center justify-center gap-2 hover:bg-black transition-colors"><span className="w-4 h-4">{I.send}</span>Send quote — ${total.toLocaleString()}</button>
              <button onClick={()=>setQuoteOpen(null)} className="px-6 border border-neutral-200 py-3 text-sm text-neutral-500 hover:bg-neutral-50 transition-colors">Cancel</button>
            </div>
          </>}

        {[["all","All",C.filter(l=>l.status!=="declined").length],["hot","Hot",C.filter(isHot).length],["urgent","Urgent",C.filter(l=>l.urg==="urgent"||l.urg==="emergency").length],["today","Today",C.filter(l=>{const f=freshness(l.time);return f==="now"||f==="today";}).length],["week","This week",C.filter(l=>freshness(l.time)!=="older").length]].map(([k,label,n])=>(

            <span className={"tabular-nums "+(filter===k?"text-neutral-400":"text-neutral-300")}>{n}</span>

      {/* Board view */}
      {view==="board"&&<div className="grid grid-cols-1 md:grid-cols-4 gap-5">{Object.entries(cols).map(([name,leads])=>{
        const cv=leads.reduce((a,l)=>a+l.rev,0);
        const emptyCopy={"New":"No new leads in this window. Diali is listening 24/7.","Followed up":"No follow-ups pending. Nice work.","Quote sent":"No quotes awaiting a response.","Booked":"No bookings yet in this window."};
        return(
        <div key={name}>
          {/* Column header */}
          <div className="flex items-center justify-between mb-4">
            <div className="flex items-center gap-2.5">

              <span className="text-xs text-neutral-400 bg-neutral-200 w-5 h-5 flex items-center justify-center tabular-nums">{leads.length}</span>

            {cv>0&&<span className="text-xs text-neutral-400 tabular-nums">${cv.toLocaleString()}</span>}

          <div className="space-y-3">
            {leads.length===0?(
              <div className="border border-dashed border-neutral-200 p-5 text-center">
                <p className="text-xs text-neutral-400 leading-relaxed">{emptyCopy[name]}</p>
              </div>
            ):leads.map(l=>{
              const draft=leadDraftMeta[l.id];
              const sent=quoteSent[l.id];
              const hot=isHot(l);
              const urg=l.urg==="emergency"||l.urg==="urgent";

                  {!hot&&urg&&<div className="absolute -top-px -left-px -right-px bg-neutral-100 px-4 py-1"><span className="text-[10px] uppercase tracking-widest text-neutral-600 flex items-center gap-1.5"><span className="w-3 h-3">{I.zap}</span>{l.urg==="emergency"?"Emergency":"Urgent"}</span></div>}
                  {!hot&&!urg&&draft&&!sent&&<div className="absolute -top-px -left-px -right-px bg-neutral-100 px-4 py-1"><span className="text-[10px] uppercase tracking-widest text-neutral-600 flex items-center gap-1.5"><span className="w-3 h-3">{I.zap}</span>Draft ready · {draft.matchCount}/{draft.totalLines}</span></div>}
                  {(hot||urg||(draft&&!sent))&&<div className="h-5"/>}
                  {/* Customer row */}
                  <div className="flex items-start gap-3 mb-3">
                    <Av n={l.name} s={32}/>

                        <span className="text-xs text-neutral-400">{l.src}</span>
                        <span className="text-neutral-200">·</span>
                        <span className="text-xs text-neutral-400">{l.time}</span>
                      </div>
                    </div>
                    <Dot s={l.score}/>
                  </div>
                  {/* Issue */}
                  <p className="text-xs text-neutral-500 mb-4 leading-relaxed line-clamp-2">{l.issue}</p>
                  {/* Revenue — the hero number */}
                  <div className="flex items-end justify-between">
                    <div>
                      <p className="text-xl text-neutral-900 tabular-nums tracking-tight">{l.rev?"$"+l.rev.toLocaleString():"—"}</p>
                      <p className="text-[10px] text-neutral-400 uppercase tracking-widest mt-0.5">{sent?"Quote sent":draft?"Draft ready":l.rev?"Est. value":"No value"}</p>
                    </div>
                    {/* Hover quick actions */}
                    {hovered===l.id?(
                      <div className="flex items-center gap-1 fi">
                        <a href={"tel:"+l.ph} onClick={e=>e.stopPropagation()} title="Call" className="w-8 h-8 border border-neutral-200 hover:border-neutral-900 hover:bg-neutral-900 hover:text-white flex items-center justify-center transition-colors"><span className="w-3.5 h-3.5">{I.phone}</span></a>
                        <a href={"sms:"+l.ph} onClick={e=>e.stopPropagation()} title="SMS" className="w-8 h-8 border border-neutral-200 hover:border-neutral-900 hover:bg-neutral-900 hover:text-white flex items-center justify-center transition-colors"><span className="w-3.5 h-3.5">{I.msg}</span></a>
                        <button onClick={e=>{e.stopPropagation();setQuoteOpen(l);}} title="Quote" className="w-8 h-8 border border-neutral-200 hover:border-neutral-900 hover:bg-neutral-900 hover:text-white flex items-center justify-center transition-colors"><span className="w-3.5 h-3.5">{I.dollar}</span></button>
                      </div>
                    ):(
                      <span className="text-xs text-neutral-400 tabular-nums">{l.conf}%</span>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )})}</div>}

      {/* List view */}
      {view==="list"&&<div className="bg-white border border-neutral-100">
        <div className="hidden md:grid px-7 py-3.5 border-b border-neutral-100 grid-cols-6 gap-4">{["Customer","Issue","Value","Confidence","Score","Status"].map(h=><span key={h} className="text-xs text-neutral-400 uppercase tracking-widest">{h}</span>)}</div>
        {live.length===0?(
          <div className="px-7 py-12 text-center">
            <p className="text-sm text-neutral-500 mb-1">No leads match this filter</p>
            <p className="text-xs text-neutral-400">Try "All" to see everything in your pipeline.</p>
          </div>
        ):live.map(l=>(
          <div key={l.id} onClick={()=>setSelLead(l)} className="px-4 md:px-7 py-4 border-b border-neutral-100 last:border-0 flex md:grid md:grid-cols-6 gap-3 md:gap-4 items-center hover:bg-neutral-50 cursor-pointer transition-colors">
            <div className="flex items-center gap-3"><Av n={l.name} s={32}/><div className="min-w-0 flex-1"><p className="text-sm text-neutral-900 flex items-center gap-2">{l.name}{isHot(l)&&<span className="text-[9px] uppercase tracking-widest bg-neutral-900 text-white px-1.5 py-0.5">Hot</span>}</p><p className="text-xs text-neutral-400 truncate">{l.ph} · {l.time}</p><p className="md:hidden text-xs text-neutral-400 truncate">{l.issue}</p></div></div>
            <p className="hidden md:block text-xs text-neutral-500 truncate">{l.issue}</p>
            <span className="hidden md:block text-sm text-neutral-900 tabular-nums">{l.rev?"$"+l.rev.toLocaleString():"—"}</span>
            <div className="hidden md:block"><div className="h-1 bg-neutral-100 w-20 mb-1"><div className="h-full bg-neutral-900" style={{width:l.conf+"%"}}/></div><span className="text-xs text-neutral-400">{l.conf}%</span></div>
            <span className="hidden md:block"><Dot s={l.score}/></span><Bg s={l.status}/>
          </div>
        ))}
      </div>}
    </div>
  );
};

const Quotes=()=>{
  const[items,setItems]=useState(PRICEBOOK_SEED);
  const[editing,setEditing]=useState(null);
  const[adding,setAdding]=useState(false);
  const[q,setQ]=useState("");
  const[cat,setCat]=useState("All");
  const[draft,setDraft]=useState(null);

  React.useEffect(()=>{
    if(editing)setDraft({...editing});
    else if(adding)setDraft({cat:"Service",name:"",desc:"",unit:"each",rate:0,rangeLow:0,rangeHigh:0,tax:true,uses:0,updated:"just now",rules:[]});
    else setDraft(null);
  },[editing,adding]);

  const cats=["All","Service","Labor","Parts","Maintenance","Install"];
  const filtered=items.filter(it=>
    (cat==="All"||it.cat===cat)&&
    (q===""||it.name.toLowerCase().includes(q.toLowerCase())||it.desc.toLowerCase().includes(q.toLowerCase()))
  );

  const totalItems=items.length;
  const totalCats=new Set(items.map(i=>i.cat)).size;
  const avgRate=items.length?Math.round(items.reduce((a,i)=>a+i.rate,0)/items.length):0;
  const mostUsed=[...items].sort((a,b)=>b.uses-a.uses)[0];
  const totalUses=items.reduce((a,i)=>a+i.uses,0);

  const save=()=>{
    if(!draft||!draft.name.trim())return;
    if(editing){
      setItems(p=>p.map(i=>i.id===editing.id?{...draft,updated:"just now"}:i));
    }else{
      setItems(p=>[...p,{...draft,id:"pb-"+Date.now(),updated:"just now"}]);
    }
    setEditing(null);setAdding(false);
  };

  const remove=()=>{
    if(!editing)return;
    setItems(p=>p.filter(i=>i.id!==editing.id));
    setEditing(null);
  };

  return(
    <div className="fu">
      {/* Edit / Add slide-over panel */}
      <Panel open={!!editing||adding} onClose={()=>{setEditing(null);setAdding(false);}}>
        {draft&&<>
          <PanelHeader
            onClose={()=>{setEditing(null);setAdding(false);}}
            title={editing?"Edit pricebook item":"Add pricebook item"}
            sub={editing?"Changes apply to future quotes":"Add a new service, part, or labor rate"}
          />
          <div className="flex-1 overflow-y-auto px-7 py-6 space-y-6">
            <FF label="Name" required><TI value={draft.name} onChange={e=>setDraft({...draft,name:e.target.value})} placeholder="e.g. Standard diagnostic"/></FF>
            <FF label="Description"><TA value={draft.desc} onChange={e=>setDraft({...draft,desc:e.target.value})} rows={2} placeholder="Short description shown to customers"/></FF>
            <div>
              <SL>Category</SL>
              <div className="grid grid-cols-5 gap-2">
                {["Service","Labor","Parts","Maintenance","Install"].map(c=>(
                  <button key={c} onClick={()=>setDraft({...draft,cat:c})} className={"text-xs md:text-sm py-2.5 border transition-colors "+(draft.cat===c?"bg-neutral-900 text-white border-neutral-900":"border-neutral-200 text-neutral-500 hover:border-neutral-400")}>{c}</button>
                ))}
              </div>
            </div>
            <FD label="Pricing"/>
            <div className="grid grid-cols-3 gap-3">
              <div>
                <FF label="Rate"><div className="relative">
                  <span className="absolute left-4 top-1/2 -translate-y-1/2 text-sm text-neutral-400 pointer-events-none">$</span>
                  <input value={draft.rate} onChange={e=>setDraft({...draft,rate:parseFloat(e.target.value)||0})} type="number" min="0" step="0.01" className="w-full border border-neutral-200 pl-8 pr-3 py-3 text-sm tabular-nums hover:border-neutral-300 transition-colors"/>
                </div></FF>
              </div>
              <div>
                <FF label="Unit"><SE value={draft.unit} onChange={e=>setDraft({...draft,unit:e.target.value})}><option value="each">each</option><option value="hour">hour</option><option value="lb">lb</option><option value="ft">linear ft</option><option value="sqft">sq ft</option><option value="day">day</option><option value="year">year</option></SE></FF>
              </div>
              <div>
                <p className="text-xs text-neutral-400 uppercase tracking-widest mb-3">Taxable</p>
                <div className="border border-neutral-200 px-3 py-[13px] flex items-center justify-between">
                  <span className="text-sm text-neutral-500">{draft.tax?"Yes":"No"}</span>
                  <Toggle on={draft.tax} onChange={()=>setDraft({...draft,tax:!draft.tax})}/>
                </div>
              </div>
            </div>
            {editing&&(
              <div className="bg-neutral-50 p-5 grid grid-cols-3 gap-4">
                <div>
                  <p className="text-xs text-neutral-400 uppercase tracking-widest mb-1">Used on</p>
                  <p className="text-lg text-neutral-900 tabular-nums tracking-tight">{draft.uses}</p>
                  <p className="text-xs text-neutral-400 mt-0.5">quotes</p>
                </div>
                <div>
                  <p className="text-xs text-neutral-400 uppercase tracking-widest mb-1">Revenue</p>
                  <p className="text-lg text-neutral-900 tabular-nums tracking-tight">${(draft.uses*draft.rate).toLocaleString()}</p>
                  <p className="text-xs text-neutral-400 mt-0.5">total invoiced</p>
                </div>
                <div>
                  <p className="text-xs text-neutral-400 uppercase tracking-widest mb-1">Updated</p>
                  <p className="text-sm text-neutral-900 mt-1.5">{draft.updated}</p>
                </div>
              </div>

            {/* Ballpark range — what Diali quotes on the phone */}
            <FD label="Ballpark Range"/>

              <p className="text-xs text-neutral-400 mb-3 leading-relaxed">Diali gives callers this range when asked about cost. Never a firm quote — always says "our tech needs to inspect for an exact price."</p>

                <FF label="Low"><div className="relative">
                    <span className="absolute left-4 top-1/2 -translate-y-1/2 text-sm text-neutral-400 pointer-events-none">$</span>

                  </div></FF>
                <FF label="High"><div className="relative">
                  <span className="absolute left-4 top-1/2 -translate-y-1/2 text-sm text-neutral-400 pointer-events-none">$</span>

                </div></FF>
              </div>
            </div>

                <div className="border border-dashed border-neutral-200 py-6 flex flex-col items-center">
                  <span className="w-5 h-5 text-neutral-200 mb-2">{I.zap}</span>
                  <p className="text-xs text-neutral-400">No rules yet — Diali won't auto-add this</p>

              ):(draft.rules||[]).map((r,ri)=>(
                <div key={r.id} className="border border-neutral-200 mb-2 last:mb-0">

                    <span className="w-3.5 h-3.5 text-neutral-400 shrink-0">{I.zap}</span>
                    <input value={r.name} onChange={e=>{const rs=[...draft.rules];rs[ri]={...r,name:e.target.value};setDraft({...draft,rules:rs});}} className="flex-1 text-sm text-neutral-900 bg-transparent border-0 p-0 focus:outline-none"/>
                    <button onClick={()=>{const rs=draft.rules.filter((_,i)=>i!==ri);setDraft({...draft,rules:rs});}} className="w-4 h-4 text-neutral-300 hover:text-neutral-900 transition-colors">{I.x}</button>
                  </div>
                  <div className="p-4 space-y-3">
                    {/* Match logic + confidence + qty */}
                    <div className="grid grid-cols-3 gap-2">
                      <div>
                        <label className="text-xs text-neutral-400 mb-1 block">If</label>
                        <select value={r.logic} onChange={e=>{const rs=[...draft.rules];rs[ri]={...r,logic:e.target.value};setDraft({...draft,rules:rs});}} className="w-full border border-neutral-200 px-2 py-2 text-xs bg-white">
                          <option value="any">Any match</option>
                          <option value="all">All match</option>
                        </select>
                      </div>
                      <div>
                        <label className="text-xs text-neutral-400 mb-1 block">Add qty</label>

                      </div>
                      <div>
                        <label className="text-xs text-neutral-400 mb-1 block">Confidence</label>
                        <select value={r.confidence} onChange={e=>{const rs=[...draft.rules];rs[ri]={...r,confidence:e.target.value};setDraft({...draft,rules:rs});}} className="w-full border border-neutral-200 px-2 py-2 text-xs bg-white">
                          <option value="high">High</option>
                          <option value="medium">Medium</option>
                          <option value="low">Low</option>

                      </div>
                    </div>
                    {/* Conditions */}

                      {(r.conditions||[]).map((cond,ci)=>(
                        <div key={ci} className="flex items-center gap-2">
                          <select value={cond.field} onChange={e=>{const rs=[...draft.rules];const cs=[...r.conditions];cs[ci]={...cond,field:e.target.value};rs[ri]={...r,conditions:cs};setDraft({...draft,rules:rs});}} className="border border-neutral-200 px-2 py-1.5 text-xs bg-white shrink-0">
                            <option value="transcript">Transcript</option>
                            <option value="issue">Issue</option>
                            <option value="urgency">Urgency</option>
                            <option value="category">Category</option>

                          <select value={cond.op} onChange={e=>{const rs=[...draft.rules];const cs=[...r.conditions];cs[ci]={...cond,op:e.target.value};rs[ri]={...r,conditions:cs};setDraft({...draft,rules:rs});}} className="border border-neutral-200 px-2 py-1.5 text-xs bg-white shrink-0">
                            <option value="contains">contains</option>
                            <option value="contains_any">contains any</option>
                            <option value="contains_all">contains all</option>
                            <option value="equals">equals</option>
                          </select>
                          <input value={Array.isArray(cond.value)?cond.value.join(", "):cond.value} onChange={e=>{const rs=[...draft.rules];const cs=[...r.conditions];const v=(cond.op==="contains_any"||cond.op==="contains_all")?e.target.value.split(",").map(x=>x.trim()).filter(Boolean):e.target.value;cs[ci]={...cond,value:v};rs[ri]={...r,conditions:cs};setDraft({...draft,rules:rs});}} placeholder="not cooling, warm air, ..." className="flex-1 border border-neutral-200 px-3 py-1.5 text-xs min-w-0"/>
                          <button onClick={()=>{const rs=[...draft.rules];const cs=r.conditions.filter((_,i)=>i!==ci);rs[ri]={...r,conditions:cs};setDraft({...draft,rules:rs});}} className="w-4 h-4 text-neutral-300 hover:text-neutral-900 shrink-0">{I.x}</button>
                        </div>
                      ))}
                      <button onClick={()=>{const rs=[...draft.rules];rs[ri]={...r,conditions:[...(r.conditions||[]),{field:"transcript",op:"contains_any",value:[]}]};setDraft({...draft,rules:rs});}} className="flex items-center gap-1 text-xs text-neutral-400 hover:text-neutral-900 transition-colors"><span className="w-3 h-3">{I.plus}</span>Add condition</button>
                    </div>
                  </div>
                </div>
              ))}
            </div>

            <div className="bg-neutral-900 p-5 flex items-start gap-3">
              <span className="w-4 h-4 text-neutral-400 mt-0.5 shrink-0">{I.bot}</span>
              <div>
                <p className="text-xs text-neutral-400 uppercase tracking-widest mb-1">How Diali uses this</p>
                <p className="text-sm text-white leading-relaxed">On calls, Diali quotes the ballpark range and always defers to on-site inspection. After the call, it drafts a quote using any rules that matched the transcript — your team reviews and sends.</p>
              </div>
            </div>
          </div>

};

/* ══════════════════ AGENT ══════════════════ */
const Agent=({vapiKeys,setVapiKeys,saveSetting,agentCfg})=>{
  const defaultPrompt="You are the AI receptionist for a home services company. You sound natural, warm, and confident — like someone who has worked the front desk for years. Short sentences. No jargon unless the caller uses it first.\n\n## YOUR JOB ON EVERY CALL\n\n### 1. Greet and identify\n- Answer warmly. Once you have their name, use it naturally.\n- Ask if they are an existing customer.\n\n### 2. Diagnose the issue — go deep\nYour goal is to gather enough detail so the technician shows up prepared with the right parts and tools. Do NOT settle for vague answers. Ask follow-ups:\n- What specific equipment is affected? (AC unit, furnace, water heater, thermostat, ductwork, etc.)\n- What exactly is happening? (Not cooling, making noise, leaking, won't turn on, blowing warm air, short cycling, etc.)\n- When did it start? Is it constant or intermittent?\n- Any unusual sounds, smells, or error codes on the unit?\n- How old is the equipment if they know?\n- Have they tried anything already? (Reset breaker, changed filter, adjusted thermostat)\n- Is this affecting the whole house or just certain rooms?\nIf they say \"I don't know\" to something, that's fine — move on. But always try. A tech who shows up informed saves everyone time.\n\n### 3. Assess urgency\n- Ask: \"Is this something that needs attention today, or could we look at it in the next day or two?\"\n- EMERGENCY triggers (prioritize same-day): no heat in winter, no AC in extreme heat, gas smell, carbon monoxide alarm, water actively flooding, sparking or burning smell.\n- For emergencies say: \"That sounds urgent — let me get someone out to you as soon as possible today.\"\n\n### 4. Collect their information\n- Full name\n- Phone number (confirm by repeating it back)\n- Service address\n- If existing customer, ask if their address is still the same on file\n\n### 5. SCHEDULE THE APPOINTMENT — this is critical\nDo NOT say \"someone will call you back\" or \"we'll reach out to schedule.\" YOU book it on this call. That's the whole point.\n- Offer 2-3 specific time windows: \"I have availability tomorrow morning between 8 and 10, or tomorrow afternoon between 1 and 3. What works better for you?\"\n- If they need same-day, say: \"Let me get you on the schedule for today. Our next available window is [time]. Does that work?\"\n- If they ask about a specific day, accommodate: \"We can do Thursday. Would morning or afternoon work better?\"\n- Always confirm the exact date and time window they chose.\n- Let them know a tech will be assigned and they'll get a confirmation.\n\n### 6. Confirm and close\nBefore ending, repeat back ALL details:\n- Their name\n- The issue (brief summary)\n- Appointment date and time window\n- Service address\n- Say: \"You're all set. If anything changes before then, just give us a call back. Have a great day!\"\n\n## PRICING — this is critical\nYou do NOT give firm quotes on the phone. Ever. Firm quotes only happen after our tech sees the equipment on-site.\n\nWhen a caller asks about price:\n1. Start with empathy and honesty: \"Great question — I want to give you a real answer.\"\n2. Make it clear you can't quote firm: \"Our tech needs to come take a look to give you an exact number, because every job is a little different.\"\n3. Give a BALLPARK RANGE based on what they've described, pulled from the pricebook's range fields. For example:\n   - \"For something like what you're describing, most jobs fall in the $X to $Y range.\"\n   - \"A diagnostic visit starts at $95, and from there we'll give you a firm quote before doing any work.\"\n4. ALWAYS anchor back to the diagnostic visit: \"The good news is the diagnostic is a flat $95 — after that our tech will give you an exact price in writing before doing any work, and you decide from there.\"\n5. Never commit the business to a firm number. If pushed, say: \"I really can't give you a firm price without the tech seeing it — I'd be guessing and I don't want to set the wrong expectation. But I can get someone out to you [time], and you'll have a real quote in hand after that.\"\n\nYou do NOT need to itemize a quote on the call. The business gets a draft quote automatically after the call ends, and they'll send it to the customer themselves once they've reviewed it.\n\n## RULES\n- Never give firm pricing or commit to a final number — only ballpark ranges.\n- Never reveal you are AI unless directly asked — then be honest.\n- If the caller is frustrated, acknowledge it: \"I hear you, that sounds really frustrating. Let's get this taken care of.\"\n- If you cannot help or the caller asks for a manager, say: \"Let me connect you with our team\" and flag for escalation.\n- Stay concise. Don't over-explain. Let them talk.";
  const[sec,setSec]=useState("voice");
  const[voiceId,setVoiceId]=useState(agentCfg?.voice_id||"O7LV5fxosQChiBE7l6Wz");
  const[voiceName,setVoiceName]=useState(agentCfg?.voice_name||"Kim");
  const[greeting,setGreeting]=useState(agentCfg?.greeting||"Hi, thanks for calling! How can we help you today?");
  const[sysPrompt,setSysPrompt]=useState(agentCfg?.system_prompt||defaultPrompt);
  const[qs,setQs]=useState(agentCfg?.questions||["What specific equipment is having the issue — is it your AC, furnace, water heater, or something else?","Can you describe exactly what's happening? Any unusual sounds, smells, or error codes?","When did this start, and is it constant or does it come and go?","How old is the equipment, if you know?","Have you tried anything already, like resetting the breaker or changing the filter?","Is this affecting your whole house or just certain areas?","Is this something that needs attention today, or could we schedule within the next day or two?","What does your availability look like — do mornings or afternoons work better for you?"]);
  const[newQ,setNewQ]=useState("");
  const[testPanel,setTestPanel]=useState(false);
  const[callState,setCallState]=useState("idle");
  const[callDur,setCallDur]=useState(0);
  const[volume,setVolume]=useState(0);
  const[muted,setMuted]=useState(false);
  const[transcript,setTranscript]=useState([]);
  const[callError,setCallError]=useState("");
  const[saving,setSaving]=useState(false);
  const[saved,setSaved]=useState(false);
  const[assistantId,setAssistantId]=useState("");
  const[sdkReady,setSdkReady]=useState(!!window.VapiSDK);
  const vapiRef=React.useRef(null);
  const timerRef=React.useRef(null);
  const transcriptEndRef=React.useRef(null);

  const voices=[
    {id:"O7LV5fxosQChiBE7l6Wz",name:"Kim",desc:"Conversational, friendly, engaging",tag:"Default"},
    {id:"tMvyQtpCVQ0DkixuYm6J",name:"Asher",desc:"Warm, professional",tag:"Popular"},
    {id:"Sr9Xhw1be5kyNtGEOV0y",name:"Brady",desc:"Deep, confident",tag:""},
    {id:"TWutjvRaJqAX89preB4e",name:"Evan",desc:"Calm, measured",tag:""},
    {id:"LoQnubeEKhw9RDkfeS80",name:"Larry",desc:"Authoritative, steady",tag:""},
    {id:"hGQkZQUA5RiOXIw7P9iO",name:"Kiora",desc:"Friendly, energetic",tag:""}
  ];
  const[playingVoice,setPlayingVoice]=useState(null);
  const[loadingVoice,setLoadingVoice]=useState(null);
  const[previewErr,setPreviewErr]=useState(null);
  const audioRef=React.useRef(null);
  const previewVoice=(vId,e)=>{
    e.stopPropagation();
    setPreviewErr(null);
    if(audioRef.current){audioRef.current.pause();audioRef.current=null;}
    if(playingVoice===vId){setPlayingVoice(null);return;}
    setLoadingVoice(vId);setPlayingVoice(null);
    fetch("/api/voice-preview?voiceId="+encodeURIComponent(vId))
    .then(r=>{if(!r.ok)return r.json().then(d=>{throw new Error(d.error||"Preview failed")});return r.blob();}).then(blob=>{
      const url=URL.createObjectURL(blob);
      const a=new Audio(url);
      a.onended=()=>{setPlayingVoice(null);audioRef.current=null;URL.revokeObjectURL(url);};
      a.onerror=()=>{setPlayingVoice(null);setLoadingVoice(null);audioRef.current=null;};
      audioRef.current=a;setPlayingVoice(vId);setLoadingVoice(null);a.play();
    }).catch(err=>{console.error("Voice preview error:",err);setLoadingVoice(null);setPlayingVoice(null);setPreviewErr(err.message||"Preview unavailable");setTimeout(()=>setPreviewErr(null),4000);});
  };

  /* Listen for SDK load */
  React.useEffect(()=>{
    if(window.VapiSDK){setSdkReady(true);return;}
    const h=()=>setSdkReady(true);
    window.addEventListener('vapi-ready',h);
    return()=>window.removeEventListener('vapi-ready',h);
  },[]);

  /* Init Vapi instance */
  React.useEffect(()=>{
    if(!sdkReady||!vapiKeys.publicKey||vapiRef.current)return;
    try{
      const v=new window.VapiSDK(vapiKeys.publicKey);
      v.on('call-start',()=>setCallState('active'));
      v.on('call-end',()=>setCallState('ended'));
      v.on('volume-level',lv=>setVolume(Math.min(1,lv)));
      v.on('speech-start',()=>{});
      v.on('speech-end',()=>{});
      v.on('message',msg=>{
        if(msg.type==='transcript'&&msg.transcriptType==='final'){
          setTranscript(p=>[...p,{role:msg.role,text:msg.transcript}]);
        }
      });
      v.on('error',e=>{console.error('Vapi error:',e);setCallState('idle');});
      vapiRef.current=v;
    }catch(e){console.error('Vapi init:',e);}
  },[sdkReady,vapiKeys.publicKey]);

  /* Call timer */
  React.useEffect(()=>{
    if(callState==='active'){timerRef.current=setInterval(()=>setCallDur(d=>d+1),1000);}
    else{clearInterval(timerRef.current);if(callState==='idle'){setCallDur(0);setTranscript([]);}}
    return()=>clearInterval(timerRef.current);
  },[callState]);

  /* Auto-scroll transcript */
  React.useEffect(()=>{transcriptEndRef.current?.scrollIntoView({behavior:'smooth'});},[transcript]);

  /* Auto-save agent config to Supabase (debounced) */
  React.useEffect(()=>{
    if(!saveSetting)return;
    const t=setTimeout(()=>{
      saveSetting({voice_id:voiceId,voice_name:voiceName,greeting,system_prompt:sysPrompt,questions:qs,vapi_assistant_id:assistantId});
    },1500);
    return()=>clearTimeout(t);
  },[voiceId,voiceName,greeting,sysPrompt,qs,assistantId]);

  const fmtTime=s=>{const m=Math.floor(s/60);const sc=s%60;return m+':'+(sc<10?'0':'')+sc;};

  const buildAssistantConfig=()=>({
    model:{provider:"openai",model:"gpt-4o",messages:[{role:"system",content:sysPrompt+"\n\nQualification questions to ask:\n"+qs.map((q,i)=>(i+1)+". "+q).join("\n")}]},
    voice:{provider:"11labs",voiceId:voiceId},
    firstMessage:greeting,
    transcriber:{provider:"deepgram",model:"nova-2"},
    name:"Diali Receptionist"
  });

  /* Start call via Web SDK */
  const startCall=async()=>{
    if(!vapiKeys.publicKey){setSec("setup");setTestPanel(false);return;}
    setCallError("");setCallState('connecting');setTranscript([]);setCallDur(0);setMuted(false);
    try{
      /* Check secure context (needed for mic access) */
      if(!window.isSecureContext){
        setCallError("Browser calls require HTTPS or localhost. Open this page from http://localhost instead of file://");
        setCallState('idle');return;
      }
      /* Init SDK if needed */
      if(!vapiRef.current){
        if(!window.VapiSDK){
          setCallError("Vapi SDK not loaded. Check your internet connection and refresh the page.");
          setCallState('idle');return;
        }
        const v=new window.VapiSDK(vapiKeys.publicKey);
        v.on('call-start',()=>{setCallError("");setCallState('active');});
        v.on('call-end',()=>setCallState('ended'));
        v.on('volume-level',lv=>setVolume(Math.min(1,lv)));
        v.on('message',msg=>{if(msg.type==='transcript'&&msg.transcriptType==='final')setTranscript(p=>[...p,{role:msg.role,text:msg.transcript}]);});
        v.on('error',e=>{console.error('Vapi error:',e);setCallError(e?.message||e?.error?.message||"Call failed — check Vapi dashboard for details");setCallState('idle');});
        vapiRef.current=v;
      }
      const cfg=assistantId||buildAssistantConfig();
      console.log('Starting Vapi call with:',JSON.stringify(cfg).slice(0,200));
      await vapiRef.current.start(cfg);
    }catch(e){
      console.error('Call error:',e);
      const msg=e?.message||String(e);
      if(msg.includes('Permission')||msg.includes('NotAllowed'))setCallError("Microphone access denied. Allow mic access in your browser and try again.");
      else if(msg.includes('secure context'))setCallError("Browser calls need HTTPS. Serve this page from localhost.");
      else setCallError("Call failed: "+msg);
      setCallState('idle');
    }
  };

  const endCall=()=>{try{vapiRef.current?.stop();}catch(e){}setCallState('ended');};
  const toggleMute=()=>{try{vapiRef.current?.setMuted(!muted);}catch(e){}setMuted(!muted);};

  /* Save assistant via backend (platform Vapi key — clients never touch it) */
  const saveAssistant=async()=>{
    setSaving(true);
    try{
      const sb=window.supabase;if(!sb)return;
      const{data:{session}}=await sb.auth.getSession();
      if(!session)return;
      const res=await fetch(BACKEND_URL+'/api/assistants/deploy',{method:'POST',headers:{'Authorization':'Bearer '+session.access_token,'Content-Type':'application/json'},body:JSON.stringify({assistantConfig:buildAssistantConfig()})});
      const data=await res.json();
      if(data.assistantId){setAssistantId(data.assistantId);setSaved(true);setTimeout(()=>setSaved(false),3000);
        /* Also persist agent settings to Supabase for local state */
        saveSetting({voice_id:voiceId,voice_name:voiceName,greeting,system_prompt:sysPrompt,questions:qs,vapi_assistant_id:data.assistantId});
      }else{console.error('Deploy failed:',data);}
    }catch(e){console.error(e);}
    setSaving(false);
  };

  /* Load existing assistant ID from Supabase settings (already loaded via agentCfg) */
  const fetchAssistant=()=>{
    if(agentCfg?.vapi_assistant_id)setAssistantId(agentCfg.vapi_assistant_id);
  };

  const addQ=()=>{if(newQ.trim()){setQs(p=>[...p,newQ.trim()]);setNewQ("");}};
  const rmQ=i=>setQs(p=>p.filter((_,idx)=>idx!==i));
  const hasKeys=true; /* Deploy always available via backend; public key only needed for test calls */

  return(
    <div className="flex flex-col md:flex-row gap-4 md:gap-6 h-full fu">
      {/* Test call panel */}
      <Panel open={testPanel} onClose={()=>{if(callState==='active')endCall();setTestPanel(false);}}>
        <PanelHeader onClose={()=>{if(callState==='active')endCall();setTestPanel(false);}} title="Test your AI agent" sub={callState==='active'?"Live call — "+fmtTime(callDur):callState==='connecting'?"Connecting...":"Using the \""+voiceName+"\" voice"}/>
        <div className="flex-1 overflow-y-auto px-7 py-6 space-y-6">
          {/* Call status hero */}
          <div className={"p-8 text-center transition-all duration-500 "+(callState==='active'?"bg-neutral-900":"bg-neutral-50")}>
            <div className={"w-20 h-20 flex items-center justify-center mx-auto mb-5 transition-all duration-300 "+(callState==='active'?"bg-white/10":"bg-neutral-100")}>
              {callState==='connecting'&&<div className="w-6 h-6 border-2 border-neutral-400 border-t-transparent animate-spin" style={{borderRadius:'50%'}}/>}
              {callState==='active'&&<div className="flex items-end gap-1 h-8">{[0.3,0.6,1,0.7,0.4,0.8,0.5].map((base,i)=><div key={i} className="w-1 bg-white transition-all duration-150" style={{height:Math.max(4,Math.round(base*volume*32+4))+'px',opacity:0.5+volume*0.5}}/>)}</div>}
              {callState!=='connecting'&&callState!=='active'&&<span className={"w-7 h-7 "+(callState==='ended'?"text-neutral-400":"text-neutral-300")}>{callState==='ended'?I.check:I.mic}</span>}
            </div>
            <p className={"text-lg mb-1 "+(callState==='active'?"text-white":"text-neutral-900")}>{callState==='idle'?"Ready to call":callState==='connecting'?"Connecting...":callState==='active'?fmtTime(callDur):"Call ended"}</p>
            <p className={"text-xs "+(callState==='active'?"text-neutral-400":"text-neutral-400")}>{callState==='idle'?"Your AI will answer as your receptionist":callState==='active'?(muted?"Muted":"Listening..."):"Duration: "+fmtTime(callDur)}</p>
            {callState==='active'&&<div className="flex items-center justify-center gap-3 mt-6">
              <button onClick={toggleMute} className={"w-12 h-12 flex items-center justify-center transition-colors "+(muted?"bg-white text-neutral-900":"bg-white/10 text-white hover:bg-white/20")}><span className="w-5 h-5">{I.mic}</span></button>
              <button onClick={endCall} className="w-12 h-12 bg-white text-neutral-900 flex items-center justify-center hover:bg-neutral-100 transition-colors"><span className="w-5 h-5">{I.x}</span></button>
            </div>}
          </div>

          {/* Live transcript */}
          {transcript.length>0&&<div>
            <p className="text-xs text-neutral-400 uppercase tracking-widest mb-3">Live transcript</p>
            <div className="space-y-3 max-h-80 overflow-y-auto">
              {transcript.map((m,i)=>(<div key={i} className={m.role==='assistant'?"mr-12":"ml-12"}>

              </div>))}
              <div ref={transcriptEndRef}/>
            </div>
          </div>}

          {/* Error display */}
          {callError&&<div className="bg-neutral-900 p-5">
            <p className="text-sm text-white mb-1">Something went wrong</p>
            <p className="text-xs text-neutral-400 leading-relaxed">{callError}</p>
            <button onClick={()=>setCallError("")} className="mt-3 text-xs bg-white text-neutral-900 px-4 py-2 hover:bg-neutral-100 transition-colors">Dismiss</button>
          </div>}

          {/* SDK status */}
          {!vapiKeys.publicKey&&<div className="bg-neutral-50 p-5">
            <p className="text-sm text-neutral-900 mb-1">Connect Vapi to make real calls</p>
            <p className="text-xs text-neutral-400 mb-4">Add your Vapi public key in the Setup tab to enable live browser calls with your AI agent.</p>
            <button onClick={()=>{setTestPanel(false);setSec("setup");}} className="text-xs bg-neutral-900 text-white px-4 py-2 hover:bg-black transition-colors">Go to setup</button>
          </div>}

          {callState==='ended'&&<div className="space-y-3">
            <div className="bg-neutral-50 p-5">
              <div className="flex items-center gap-2 mb-2"><span className="w-4 h-4 text-neutral-400">{I.zap}</span><p className="text-xs text-neutral-400 uppercase tracking-widest">Call summary</p></div>
              <p className="text-sm text-neutral-700 leading-relaxed">{transcript.length} messages exchanged over {fmtTime(callDur)}. {transcript.filter(t=>t.role==='assistant').length} AI responses, {transcript.filter(t=>t.role==='user').length} caller messages.</p>
            </div>
          </div>}
        </div>
        <div className="px-7 py-5 border-t border-neutral-100 shrink-0">
          {callState==='idle'&&<button onClick={startCall} className="w-full bg-neutral-900 text-white py-3.5 text-sm hover:bg-black transition-colors flex items-center justify-center gap-2"><span className="w-4 h-4">{I.phone}</span>{vapiKeys.publicKey?"Start live test call":"Start demo call"}</button>}
          {callState==='connecting'&&<button disabled className="w-full bg-neutral-300 text-white py-3.5 text-sm cursor-not-allowed flex items-center justify-center gap-2"><div className="w-4 h-4 border-2 border-white border-t-transparent animate-spin" style={{borderRadius:'50%'}}/>Connecting...</button>}
          {callState==='active'&&<button onClick={endCall} className="w-full bg-neutral-900 text-white py-3.5 text-sm hover:bg-black transition-colors flex items-center justify-center gap-2"><span className="w-4 h-4">{I.x}</span>End call — {fmtTime(callDur)}</button>}
          {callState==='ended'&&<div className="flex gap-3"><button onClick={()=>{setCallState('idle');setTranscript([]);setCallDur(0);}} className="flex-1 bg-neutral-900 text-white py-3.5 text-sm hover:bg-black transition-colors">Try again</button><button onClick={()=>{setCallState('idle');setTestPanel(false);}} className="flex-1 border border-neutral-200 py-3.5 text-sm text-neutral-500 hover:bg-neutral-50 transition-colors">Close</button></div>}
        </div>
      </Panel>

      {/* Sidebar nav — horizontal scroll on mobile, vertical on desktop */}
      <div className="md:w-52 shrink-0">
        <div className="flex md:flex-col gap-1 overflow-x-auto md:overflow-x-visible pb-1 md:pb-0">
          {[["setup","Setup"],["voice","Voice"],["personality","Personality"],["greeting","Greeting"],["questions","Questions"],["hours","Hours"],["escalation","Escalation"]].map(([k,l])=><button key={k} onClick={()=>setSec(k)} className={"whitespace-nowrap md:w-full text-left px-4 py-2.5 md:py-3 text-sm transition-all duration-200 "+(sec===k?"bg-neutral-900 text-white":"text-neutral-400 hover:bg-neutral-100 hover:text-neutral-600")}>
            <span className="flex items-center justify-between">{l}{k==="setup"&&<span className={"w-1.5 h-1.5 ml-2 "+(hasKeys?"bg-neutral-900":"bg-neutral-300")+(sec===k?" bg-white":"")}/>}</span>
          </button>)}
        </div>
        <div className="hidden md:block mt-6 pt-6 border-t border-neutral-200 space-y-3">
          <button onClick={()=>setTestPanel(true)} className="w-full bg-neutral-900 text-white py-3 text-sm flex items-center justify-center gap-2 hover:bg-black transition-colors"><span className="w-4 h-4">{I.phone}</span>Test call</button>
          {hasKeys&&<button onClick={saveAssistant} disabled={saving} className={"w-full border py-3 text-sm flex items-center justify-center gap-2 transition-colors "+(saved?"border-neutral-900 bg-neutral-900 text-white":"border-neutral-200 text-neutral-500 hover:bg-neutral-50")}>
            {saving?<><div className="w-3.5 h-3.5 border-2 border-neutral-400 border-t-transparent animate-spin" style={{borderRadius:'50%'}}/>Saving...</>:saved?<><span className="w-4 h-4">{I.check}</span>Saved to Vapi</>:<><span className="w-4 h-4">{I.upload}</span>Deploy to Vapi</>}
          </button>}
          {assistantId&&<p className="text-xs text-neutral-300 text-center truncate px-2" title={assistantId}>ID: {assistantId.slice(0,8)}...</p>}
        </div>
        {/* Mobile action buttons */}
        <div className="flex md:hidden gap-2 mt-3">
          <button onClick={()=>setTestPanel(true)} className="flex-1 bg-neutral-900 text-white py-2.5 text-sm flex items-center justify-center gap-2"><span className="w-4 h-4">{I.phone}</span>Test</button>
          {hasKeys&&<button onClick={saveAssistant} disabled={saving} className="flex-1 border border-neutral-200 py-2.5 text-sm text-neutral-500 flex items-center justify-center gap-2">{saving?"Saving...":saved?"Saved":"Deploy"}</button>}
        </div>
      </div>

      {/* Main content */}
      <div className="flex-1 bg-white border border-neutral-100 p-4 md:p-8 overflow-y-auto">

        {/* Setup */}
        {sec==="setup"&&<div className="max-w-xl">
          <p className="text-2xl text-neutral-900 tracking-tight mb-1">Setup</p>
          <p className="text-neutral-400 mb-8">Connect your Vapi account to power your AI voice agent.</p>

          <div className="space-y-6">
            <div className="bg-neutral-50 p-6">
              <div className="flex items-center gap-3 mb-4">
                <div className="w-10 h-10 bg-neutral-900 flex items-center justify-center"><img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAGAAAABgCAYAAADimHc4AAAJZklEQVR42u2bXWwcVxXH/+femVmvY8dJ6iRVi1qJjwpSqhAMUfpFPyQooiGqqACJIlVIvCCEhAQC2jRV0nzQwhM89KUv8FYlqnjgAbWicgptCkVCqmiVUgOVWqrWu5sP79renTtz75+HGccf2XXG3l13i+5P2gd7d87OPfd/zj1z7l3A4/F4PB6Px+PxeDwej8fj8Xg8Ho/H4/F4PB6Px+PxeDwej8fj8fQE6aUxkgJALbFLAE5EOAj2+m33A4WkXs97G2Wv33bXS9Aj5ysRseRkAEzcDJvsArSG1lPA7BkRmcs/49Zm76QG9u+Dbd4IJyEk+jeC1hkRqZOUtSp20e5bQ8D4rbD2BsAJqKYQ1F8UkeZa7nOglM/W9P209dfIWZJJ/ponbf0tmur3FhxArp72Fu29f4C2/upye03S1t+hqf1w0R6lqPMBgHHtQab1KXJ++X2m9X8xrj2Yffak/rA4X+XO+lE2kAYZVyzjSsK4krA1bcmLJEnG7//6yikgGzjNe98nY5Kzy+3FlZTuQmYvqT5V1FmXJjV+7zHSkayTrenldjlD0pHJ9JEPKh2tT/mm8gVynjS1lHElpaly2SuuWMZVQ5JMqw90GhxJTVJoqhO0DdKcsx3tmWpMkksiS185oir7yZQ01YTxtO1gNyFTMql+daMmQXUzB7mJRwFF0BEil9+wiAKo4WYdHI/z7bfLANzlqeMURISgOwoVAbSuoz0ygGs4kAf57rvD7e0tnQMqKBwDYoIUiFId7ArQIpx7nJOTweIYB2wC8gXQkY2doLsZbk4AdFaLiEI6T4Rbr8fOTQ/ki6deqlKRb1ia2l7o8peRzDiIBKvbawFR+VpsDydye6qd+kXEIa0dQDi2G2au/aQu2tUwcw7Rll24edd92Rgng0GMgExtpnktwmAYqSVErrAYSqYucT8hGeHw4ctVS/sIdEnAIlWIOCAiKNdnf5+WjuqnewSwLO6SlFB4OFvj7nSDmoIAqhasK+D8XLVm3iEc+wRM7Zty5IgDoLM8K46mOgFdvhdJ3UGKlMcUgAK6Vtt3JyeDTP0X7kU4NoFkdnX1L0pLI5lzCMf2IK7tFxGXp6PBeRJeqMFJlmGqU4hK18DEzPL9qhc6RMOCZP4swu27ATgAIiKW8fTvEG29D/FFC1XIUQSUQ2A/JbJjamX9nldohKn8FdHo52AKTkB2sUU4opE0XkG0Y19+j25gIiBz/mQgIk0oPA1sktyZBaNgyy6Y6v35oBzjC5+BHjqAZMYVcj5pEYwKXPpCB+dnuT+ufgXR2OcLq3/pWpDOWkSb96JVuSdbC/pTEXWRgvLcmJhfIa3PQWkNksWCLiEED5EMsgU0PgRdVnCOxSPXAk6d6BDJJCkQPgK49dUyC9coObjiP4MxAQuqkOGPvANrfotgTADY4jl2626k5+7i/PnroDfdl6lfFVN/NKpgGn+W8vbnF9oLl6m/VbkH0eZ9MI21qX9ZRdRwiDbdxmb17n5Fgery+kxppdIvkTaaUKpYFFAAWILuIQT2CeiSKhY9C1on4IKjndSfjYyH8re7US4BDSjXtyjouh2dK86yNf0USld9F+Z8umoNv2xsAaAESJJit5KpXyOeOSNDV9/aIfdbNmtfxNDwc0hmLSBdqpYOwbBCOne7RDtfXPiOQYmAxSiA/AJpw0BpVUwpAqQpYRIW10H+3KDDx1ZXvz0ESG/0ShASAuzPWtD1BOQKVDK0YwpMnkawWYG0RS8u9AyxLPfX/4Lgquc65X4m1bsRjdy+7tzfbi1I6g566B6a2l5k5bcepAhYjAKnHoedS6CUQl+SpQJUcFQE7                 <div><p className="text-sm text-neutral-900">Vapi</p><p className="text-xs text-neutral-400">Voice AI platform</p></div>
                <span className={"ml-auto text-xs px-3 py-1 "+(hasKeys?"bg-neutral-900 text-white":"bg-neutral-200 text-neutral-500")}>{hasKeys?"Connected":"Not connected"}</span>
              </div>
              <p className="text-xs text-neutral-400 leading-relaxed">Vapi handles the full voice pipeline — telephony, speech recognition, LLM, and text-to-speech. Get your API keys from <a href="https://dashboard.vapi.ai" target="_blank" className="text-neutral-900 hover:underline">dashboard.vapi.ai</a></p>
            </div>

            <div>
              <label className="text-xs text-neutral-400 mb-1.5 block">Vapi public key <span className="text-neutral-300">(optional — for browser test calls)</span></label>
              <input value={vapiKeys.publicKey} onChange={e=>setVapiKeys(p=>({...p,publicKey:e.target.value}))} type="text" placeholder="pk_xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" className="w-full border border-neutral-200 px-4 py-3 text-sm font-mono"/>
              <p className="text-xs text-neutral-300 mt-1.5">Only needed if you want to test calls in the browser. Your AI agent deploys without it.</p>
            </div>

            <div className="flex gap-3">
              <button onClick={()=>{fetchAssistant();setSec("voice");}} className="bg-neutral-900 text-white px-6 py-3 text-sm hover:bg-black transition-colors flex items-center gap-2"><span className="w-4 h-4">{I.check}</span>Continue setup</button>
            </div>
            {!hasKeys&&<div className="bg-neutral-900 p-6">
              <p className="text-sm text-white mb-2">Don't have a Vapi account?</p>
              <p className="text-xs text-neutral-400 leading-relaxed mb-4">Sign up free at vapi.ai — you get $10 in credits to test. No credit card required.</p>
              <a href="https://dashboard.vapi.ai" target="_blank" className="text-xs bg-white text-neutral-900 px-5 py-2.5 hover:bg-neutral-100 transition-colors inline-block">Create Vapi account</a>
            </div>}

            <div className="pt-6 border-t border-neutral-100">
              <p className="text-xs text-neutral-400 uppercase tracking-widest mb-4">How it works</p>
              <div className="space-y-4">
                {[["1. Connect","Add your Vapi API keys above to link your account."],["2. Configure","Set your AI voice, personality, greeting, and business rules."],["3. Test","Make a live test call directly from your browser."],["4. Deploy","Save to Vapi and connect a phone number to go live."]].map(([t,d])=>(
                  <div key={t} className="flex items-start gap-4">
                    <div className="w-8 h-8 bg-neutral-100 flex items-center justify-center shrink-0"><span className="text-xs text-neutral-500">{t.split(".")[0]}</span></div>
                    <div><p className="text-sm text-neutral-900">{t.split(". ")[1]}</p><p className="text-xs text-neutral-400 mt-0.5">{d}</p></div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>}

        {/* Voice */}
        {sec==="voice"&&<div>
          <p className="text-2xl text-neutral-900 tracking-tight mb-1">Voice</p>
          <p className="text-neutral-400 mb-8">Choose an ElevenLabs voice for your AI receptionist. Powered by Vapi.</p>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            {voices.map(v=>(<div key={v.id} onClick={()=>{setVoiceId(v.id);setVoiceName(v.name);}} className={"p-4 md:p-6 border-2 cursor-pointer transition-all duration-200 "+(voiceId===v.id?"border-neutral-900":"border-neutral-200 hover:border-neutral-300")}>
              <div className="flex items-center justify-between mb-4">
                <div className="flex items-center gap-4">
                  <div className={"w-12 h-12 flex items-center justify-center "+(voiceId===v.id?"bg-neutral-900":"bg-neutral-100")}><span className={"w-5 h-5 "+(voiceId===v.id?"text-white":"text-neutral-400")}>{I.mic}</span></div>
                  <div><p className="text-sm text-neutral-900">{v.name}</p><p className="text-xs text-neutral-400 mt-0.5">{v.desc}</p></div>
                </div>
                <div className="flex items-center gap-2">{v.tag&&<span className="text-xs bg-neutral-100 text-neutral-500 px-2 py-0.5">{v.tag}</span>}{voiceId===v.id&&<span className="w-5 h-5 text-neutral-900">{I.check}</span>}</div>
              </div>
              <div className="flex items-center justify-between">
                <span className="text-xs text-neutral-300 font-mono">{v.id.slice(0,12)}...</span>
                <button onClick={e=>previewVoice(v.id,e)} className={"text-xs transition-colors flex items-center gap-1.5 "+(playingVoice===v.id?"text-neutral-900":"text-neutral-400 hover:text-neutral-900")}>
                  {loadingVoice===v.id?<><div className="w-3.5 h-3.5 border-2 border-neutral-400 border-t-transparent animate-spin" style={{borderRadius:'50%'}}/>Loading...</>:playingVoice===v.id?<><span className="w-3.5 h-3.5">{I.x}</span>Stop</>:<><span className="w-3.5 h-3.5">{I.play}</span>Preview voice</>}
                </button>
              </div>
            </div>))}
          </div>
          {previewErr&&<div className="mt-4 bg-neutral-900 text-white px-4 py-3 text-sm flex items-center gap-3"><span className="w-4 h-4 shrink-0">{I.x}</span>{previewErr}</div>}
          <p className="text-xs text-neutral-300 mt-6">Voice IDs from ElevenLabs. You can use any ElevenLabs voice ID — including cloned voices.</p>
          <div className="mt-4"><label className="text-xs text-neutral-400 mb-1.5 block">Custom voice ID (optional)</label><input value={voiceId} onChange={e=>setVoiceId(e.target.value)} className="w-full border border-neutral-200 px-4 py-3 text-sm font-mono" placeholder="Enter any ElevenLabs voice ID"/></div>
        </div>}

        {/* Personality */}
        {sec==="personality"&&<div className="max-w-xl">
          <p className="text-2xl text-neutral-900 tracking-tight mb-1">Personality</p>
          <p className="text-neutral-400 mb-8">Define how your AI agent thinks and behaves. This is the system prompt sent to the LLM.</p>
          <textarea value={sysPrompt} onChange={e=>setSysPrompt(e.target.value)} rows={14} className="w-full border border-neutral-200 p-5 text-sm leading-relaxed font-mono mb-4"/>
          <div className="flex items-center justify-between">
            <span className="text-xs text-neutral-300">{sysPrompt.length} characters</span>
            <div className="flex gap-3">
              <button onClick={()=>setSysPrompt("You are a friendly, professional AI receptionist for a home services company. Your goals:\n1. Greet the caller warmly and ask how you can help\n2. Understand their issue — what's broken, leaking, not working\n3. Assess urgency — is it an emergency or can it wait?\n4. Collect their name, phone, and address\n5. Book an appointment or take a detailed message\n6. Confirm details before ending the call\n\nBe concise and natural. Use short sentences. Sound like a real person, not a script. If unsure, ask clarifying questions. Never reveal you are AI unless directly asked.")} className="text-xs text-neutral-400 hover:text-neutral-900 transition-colors">Reset to default</button>
            </div>
          </div>
          <div className="mt-8 bg-neutral-50 p-5">
            <p className="text-xs text-neutral-400 uppercase tracking-widest mb-3">Tips</p>
            <div className="space-y-2 text-xs text-neutral-500 leading-relaxed">
              <p>Keep instructions concise — long prompts increase latency.</p>
              <p>Use numbered lists for multi-step workflows.</p>
              <p>Include your company name and services for context.</p>
              <p>Tell the AI what NOT to do (e.g., "never give pricing").</p>
            </div>
          </div>
        </div>}

        {/* Greeting */}
        {sec==="greeting"&&<div className="max-w-xl">
          <p className="text-2xl text-neutral-900 tracking-tight mb-1">Greeting</p>
          <p className="text-neutral-400 mb-8">The first thing callers hear when your AI picks up. This is the <code className="text-xs bg-neutral-100 px-1.5 py-0.5 text-neutral-600">firstMessage</code> in Vapi.</p>
          <textarea value={greeting} onChange={e=>setGreeting(e.target.value)} rows={4} className="w-full border border-neutral-200 p-5 text-sm leading-relaxed mb-4"/>
          <div className="flex items-center justify-between">
            <span className="text-xs text-neutral-300">{greeting.length} characters</span>
            <div className="flex gap-3">
              <button onClick={()=>setTestPanel(true)} className="text-sm px-5 py-2.5 border border-neutral-200 text-neutral-500 hover:bg-neutral-50 transition-colors flex items-center gap-2"><span className="w-4 h-4">{I.play}</span>Test it</button>
            </div>
          </div>
          <div className="mt-8 space-y-2">
            <p className="text-xs text-neutral-400 uppercase tracking-widest mb-3">Quick templates</p>
            {["Hi, thanks for calling! I can help you with scheduling a service appointment or answer any questions. What's going on?","Thank you for calling [Company]! I'd be happy to help get a technician out to you. What are you experiencing?","Hi there! Are you calling about an existing appointment, or do we need to get someone out to take a look at something?","Good morning! I can get you scheduled for a service call right now. What's the issue you're dealing with?"].map((t,i)=>(
              <button key={i} onClick={()=>setGreeting(t)} className={"w-full text-left p-4 text-sm transition-colors "+(greeting===t?"bg-neutral-900 text-white":"bg-neutral-50 text-neutral-600 hover:bg-neutral-100")}>{t}</button>
            ))}
          </div>
        </div>}

        {/* Questions */}
        {sec==="questions"&&<div className="max-w-xl">
          <p className="text-2xl text-neutral-900 tracking-tight mb-1">Questions</p>
          <p className="text-neutral-400 mb-8">Qualification questions your AI asks callers. These get appended to your system prompt.</p>
          <div className="space-y-2 mb-6">
            {qs.map((q,i)=><div key={i} className="flex items-center gap-3 p-4 bg-neutral-50 group hover:bg-neutral-100 transition-colors">
              <span className="w-5 h-5 bg-neutral-200 text-neutral-500 flex items-center justify-center text-xs shrink-0">{i+1}</span>
              <span className="flex-1 text-sm text-neutral-700">{q}</span>
              <button onClick={()=>rmQ(i)} className="w-4 h-4 text-neutral-200 hover:text-neutral-900 opacity-0 group-hover:opacity-100 transition-opacity">{I.trash}</button>
            </div>)}
          </div>
          <div className="flex gap-2">
            <input value={newQ} onChange={e=>setNewQ(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addQ()} placeholder="Add a new question..." className="flex-1 border border-neutral-200 px-4 py-3 text-sm"/>
            <button onClick={addQ} className="bg-neutral-900 text-white px-4 py-3 text-sm hover:bg-black transition-colors flex items-center gap-2"><span className="w-4 h-4">{I.plus}</span>Add</button>
          </div>
        </div>}

        {/* Hours */}
        {sec==="hours"&&<div className="max-w-xl">
          <p className="text-2xl text-neutral-900 tracking-tight mb-1">Business hours</p>
          <p className="text-neutral-400 mb-8">Your AI answers 24/7 — but knows when to book vs. take a message.</p>
          <div className="space-y-1">{["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"].map((d,i)=>(

      </div>

};
