              <div><label className="text-xs text-neutral-400 mb-1.5 block">Email address</label><input type="email" value={invite.email} onChange={e=>setInvite(p=>({...p,email:e.target.value}))} placeholder="name@company.com" className="w-full border border-neutral-200 px-4 py-3 text-sm"/></div>
              <div><label className="text-xs text-neutral-400 mb-1.5 block">Role</label><select value={invite.role} onChange={e=>setInvite(p=>({...p,role:e.target.value}))} className="w-full border border-neutral-200 px-4 py-3 text-sm bg-white">{["Admin","Technician","Dispatcher"].map(r=><option key={r}>{r}</option>)}</select><p className="text-xs text-neutral-300 mt-1.5">{invite.role==="Admin"?"Full access to manage jobs, team, and settings":invite.role==="Dispatcher"?"Can manage calendar, schedule jobs, and assign technicians":"Field access — view assigned jobs, update status, add notes"}</p></div>
              <div className="pt-3 border-t border-neutral-100"><p className="text-xs text-neutral-400 uppercase tracking-widest mb-4">Scheduling defaults</p>
                <div className="space-y-4">
                  <div className="grid grid-cols-2 gap-3"><div><label className="text-xs text-neutral-400 mb-1.5 block">Working hours</label><input type="text" value={invite.hours} onChange={e=>setInvite(p=>({...p,hours:e.target.value}))} placeholder="7 AM – 5 PM" className="w-full border border-neutral-200 px-4 py-3 text-sm"/></div><div><label className="text-xs text-neutral-400 mb-1.5 block">Working days</label><input type="text" value={invite.days} onChange={e=>setInvite(p=>({...p,days:e.target.value}))} placeholder="Mon – Fri" className="w-full border border-neutral-200 px-4 py-3 text-sm"/></div></div>
                  <div><label className="text-xs text-neutral-400 mb-1.5 block">Service area</label><input type="text" value={invite.area} onChange={e=>setInvite(p=>({...p,area:e.target.value}))} placeholder="Denver Metro, Boulder, etc." className="w-full border border-neutral-200 px-4 py-3 text-sm"/></div>
                </div>
              </div>
            </div>
            <div className="px-7 py-5 border-t border-neutral-100 shrink-0"><button onClick={sendInvite} className="w-full bg-neutral-900 text-white py-3 text-sm hover:bg-black transition-colors">Send invite</button></div>
          </Panel>

          {/* Edit member panel */}
          <Panel open={teamPanel==="edit"} onClose={()=>{setTeamPanel(null);setEditMember(null);}}>
            {editMember&&<>
            <PanelHeader onClose={()=>{setTeamPanel(null);setEditMember(null);}} title={editData.name||editMember.name} sub={editMember.email} right={<span className={"text-xs px-3 py-1 "+statusBg(editMember.status)}>{editMember.status}</span>}/>
            <div className="flex-1 overflow-y-auto px-7 py-6 space-y-5">
              <div className="grid grid-cols-2 gap-3"><div><label className="text-xs text-neutral-400 mb-1.5 block">Name</label><input type="text" value={editData.name||""} onChange={e=>setEditData(p=>({...p,name:e.target.value}))} className="w-full border border-neutral-200 px-4 py-3 text-sm"/></div><div><label className="text-xs text-neutral-400 mb-1.5 block">Phone</label><input type="tel" value={editData.phone||""} onChange={e=>setEditData(p=>({...p,phone:e.target.value}))} className="w-full border border-neutral-200 px-4 py-3 text-sm"/></div></div>
              <div><label className="text-xs text-neutral-400 mb-1.5 block">Role</label><select value={editData.role||""} onChange={e=>setEditData(p=>({...p,role:e.target.value}))} className="w-full border border-neutral-200 px-4 py-3 text-sm bg-white" disabled={editMember.role==="Owner"}>{["Owner","Admin","Technician","Dispatcher"].map(r=><option key={r}>{r}</option>)}</select>{editMember.role==="Owner"&&<p className="text-xs text-neutral-300 mt-1.5">Owner role cannot be changed</p>}</div>
              <div className="pt-3 border-t border-neutral-100"><p className="text-xs text-neutral-400 uppercase tracking-widest mb-4">Schedule</p>
                <div className="space-y-4">
                  <div className="grid grid-cols-2 gap-3"><div><label className="text-xs text-neutral-400 mb-1.5 block">Working hours</label><input type="text" value={editData.hours||""} onChange={e=>setEditData(p=>({...p,hours:e.target.value}))} placeholder="7 AM – 5 PM" className="w-full border border-neutral-200 px-4 py-3 text-sm"/></div><div><label className="text-xs text-neutral-400 mb-1.5 block">Working days</label><input type="text" value={editData.days||""} onChange={e=>setEditData(p=>({...p,days:e.target.value}))} placeholder="Mon – Fri" className="w-full border border-neutral-200 px-4 py-3 text-sm"/></div></div>
                  <div><label className="text-xs text-neutral-400 mb-1.5 block">Service area</label><input type="text" value={editData.area||""} onChange={e=>setEditData(p=>({...p,area:e.target.value}))} placeholder="Denver Metro, Boulder, etc." className="w-full border border-neutral-200 px-4 py-3 text-sm"/></div>
                </div>
              </div>
            </div>
            <div className="px-7 py-5 border-t border-neutral-100 shrink-0 space-y-3">
              <button onClick={saveEdit} className="w-full bg-neutral-900 text-white py-3 text-sm hover:bg-black transition-colors">Save changes</button>
              {editMember.role!=="Owner"&&<button onClick={deactivateMember} className="w-full border border-neutral-200 py-3 text-sm text-neutral-400 hover:bg-neutral-50 transition-colors">{editMember.status==="Deactivated"?"Reactivate member":"Deactivate member"}</button>}
            </div>
            </>}
          </Panel>

          {/* Header */}
          {(()=>{const activeCount=team.filter(m=>m.status==="Active"||m.status==="Pending").length;const seatLimit=curPlanData?.seats||1;const atLimit=seatLimit!==999&&activeCount>=seatLimit;
          return <div className="flex items-center justify-between mb-6"><div><p className="text-2xl text-neutral-900 tracking-tight">Team</p><p className="text-xs text-neutral-400 mt-1">{team.filter(m=>m.status==="Active").length} active \u00B7 {team.filter(m=>m.status==="Pending").length} pending{seatLimit!==999&&<span> \u00B7 {activeCount}/{seatLimit} seats used</span>}</p></div>
          {atLimit?<button onClick={()=>{const next=planTier(curPlan)<1?"growth":"scale";requirePlan("More team seats",next);}} className="border border-neutral-200 text-neutral-500 px-5 py-2.5 text-sm flex items-center gap-2 hover:bg-neutral-50 transition-colors"><span className="w-4 h-4">{I.plus}</span>Upgrade for more seats</button>
          :<button onClick={()=>setTeamPanel("invite")} className="bg-neutral-900 text-white px-5 py-2.5 text-sm flex items-center gap-2 hover:bg-black transition-colors"><span className="w-4 h-4">{I.plus}</span>Invite</button>}
          </div>;})()}

          {/* Filters */}
          <div className="flex bg-neutral-200 p-1 mb-6 w-fit">{[["all","All"],["Active","Active"],["Pending","Pending"],["Deactivated","Deactivated"]].map(([k,l])=><button key={k} onClick={()=>setTeamFilter(k)} className={"px-5 py-2 text-sm transition-all duration-200 "+(teamFilter===k?"bg-white text-neutral-900":"text-neutral-500")}>{l}</button>)}</div>

          {/* Role legend */}
          <div className="flex gap-3 mb-6">{["Owner","Admin","Dispatcher","Technician"].map(r=><div key={r} className="flex items-center gap-2"><span className={"text-xs px-2.5 py-1 "+roleBg(r)}>{r}</span></div>)}</div>

          {/* Member list */}
          <div className="space-y-2">
            {filteredTeam.length===0&&<p className="text-sm text-neutral-400 py-8 text-center">No team members match this filter.</p>}
            {filteredTeam.map(m=>(
              <div key={m.id} onClick={()=>openEdit(m)} className="flex items-center gap-4 p-5 border border-neutral-100 hover:border-neutral-300 cursor-pointer transition-all duration-200 bg-white">
                <Av n={m.name} s={42}/>
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2"><p className={"text-sm "+(m.status==="Deactivated"?"text-neutral-400 line-through":"text-neutral-900")}>{m.name}</p>{m.status==="Pending"&&<span className="text-xs text-neutral-400">— invite sent</span>}</div>
                  <p className="text-xs text-neutral-400 mt-0.5">{m.email}</p>
                </div>
                {m.area&&<div className="hidden xl:flex items-center gap-1.5 text-xs text-neutral-300"><span className="w-3 h-3">{I.map}</span>{m.area.split(",")[0]}</div>}
                {m.hours&&m.hours!=="—"&&<div className="hidden xl:flex items-center gap-1.5 text-xs text-neutral-300"><span className="w-3 h-3">{I.clock}</span>{m.hours}</div>}
                <span className={"text-xs px-3 py-1 "+roleBg(m.role)}>{m.role}</span>
                <span className={"text-xs px-3 py-1 "+statusBg(m.status)}>{m.status}</span>
              </div>
            ))}
          </div>
        </div>}
        {tab==="billing"&&<div>
          {/* ── Stripe Checkout Modal ── */}
          {checkoutPlan&&(()=>{const isUpgrade=curPlan&&planTier(checkoutPlan.id)>planTier(curPlan);const isDowngrade=curPlan&&planTier(checkoutPlan.id)<planTier(curPlan);const curP=getPlan(curPlan);
          return ReactDOM.createPortal(<div className="fixed inset-0 z-50 flex items-center justify-center" style={{zIndex:9999}}>
            <div className="absolute inset-0 bg-black/50" onClick={()=>{if(!checkoutLoading&&!checkoutDone){setCheckoutPlan(null);setCardNum("");setCardExp("");setCardCvc("");setCardName("");}}}/>
            <div className="relative bg-white w-full max-w-md mx-4" style={{zIndex:10000}}>
              {checkoutDone?<div className="p-10 text-center">
                <div className="w-14 h-14 bg-neutral-900 flex items-center justify-center mx-auto mb-5"><span className="w-6 h-6 text-white">{I.check}</span></div>
                <p className="text-lg text-neutral-900 mb-1">{isDowngrade?"Downgraded to":"You\u2019re on"} {checkoutPlan.name}</p>
                <p className="text-sm text-neutral-400">{isDowngrade?"Changes take effect at the end of your billing period.":"Your subscription is now active."}</p>
              </div>:<>
              <div className="flex items-center justify-between px-7 py-5 border-b border-neutral-100">
                <div><p className="text-sm text-neutral-900">{isUpgrade?"Upgrade to":isDowngrade?"Downgrade to":"Subscribe to"} {checkoutPlan.name}</p><p className="text-xs text-neutral-400 mt-0.5">${checkoutPlan.price}/month</p></div>
                <button onClick={()=>{setCheckoutPlan(null);setCardNum("");setCardExp("");setCardCvc("");setCardName("");}} className="w-8 h-8 flex items-center justify-center text-neutral-400 hover:text-neutral-600"><span className="w-4 h-4">{I.x}</span></button>
              </div>
              {/* Upgrade/downgrade context */}
              {(isUpgrade||isDowngrade)&&<div className={"mx-7 mt-5 p-4 "+(isUpgrade?"bg-neutral-50":"bg-neutral-50")}>
                <p className="text-xs text-neutral-400 mb-2">{isUpgrade?"What you\u2019ll gain:":"What changes:"}</p>
                {isUpgrade&&<div className="space-y-1">
                  <p className="text-xs text-neutral-600">\u2713 {checkoutPlan.minutes.toLocaleString()} call minutes (up from {curP?.minutes.toLocaleString()})</p>
                  <p className="text-xs text-neutral-600">\u2713 {checkoutPlan.seats===999?"Unlimited":checkoutPlan.seats} team seats (up from {curP?.seats})</p>
                  {planTier(checkoutPlan.id)>=1&&planTier(curPlan)<1&&<p className="text-xs text-neutral-600">\u2713 Custom AI voice clone</p>}
                  {planTier(checkoutPlan.id)>=1&&planTier(curPlan)<1&&<p className="text-xs text-neutral-600">\u2713 CRM, Slack, QuickBooks integrations</p>}
                  {planTier(checkoutPlan.id)>=2&&planTier(curPlan)<2&&<p className="text-xs text-neutral-600">\u2713 API access, webhooks, advanced analytics</p>}
                </div>}
                {isDowngrade&&<div className="space-y-1">
                  <p className="text-xs text-neutral-600">Minutes: {curP?.minutes.toLocaleString()} \u2192 {checkoutPlan.minutes.toLocaleString()}</p>
                  <p className="text-xs text-neutral-600">Seats: {curP?.seats===999?"Unlimited":curP?.seats} \u2192 {checkoutPlan.seats}</p>
                  <p className="text-xs text-neutral-400 mt-2">Downgrade takes effect at end of billing period.</p>
                </div>}
              </div>}
              <div className="px-7 py-6 space-y-4">
                {!curPlan&&<><div><label className="text-xs text-neutral-400 mb-1.5 block">Cardholder name</label><input value={cardName} onChange={e=>setCardName(e.target.value)} placeholder="Full name on card" className="w-full border border-neutral-200 px-4 py-3 text-sm"/></div>
                <div><label className="text-xs text-neutral-400 mb-1.5 block">Card number</label><input value={cardNum} onChange={e=>setCardNum(formatCard(e.target.value))} placeholder="1234 5678 9012 3456" className="w-full border border-neutral-200 px-4 py-3 text-sm font-mono" maxLength={19}/></div>
                <div className="grid grid-cols-2 gap-3">
                  <div><label className="text-xs text-neutral-400 mb-1.5 block">Expiration</label><input value={cardExp} onChange={e=>setCardExp(formatExp(e.target.value))} placeholder="MM/YY" className="w-full border border-neutral-200 px-4 py-3 text-sm font-mono" maxLength={5}/></div>
                  <div><label className="text-xs text-neutral-400 mb-1.5 block">CVC</label><input value={cardCvc} onChange={e=>setCardCvc(e.target.value.replace(/\D/g,"").slice(0,4))} placeholder="123" className="w-full border border-neutral-200 px-4 py-3 text-sm font-mono" maxLength={4}/></div>
                </div></>}
                {curPlan&&<div className="flex items-center gap-3 py-2"><div className="w-10 h-7 bg-neutral-100 flex items-center justify-center"><svg width="20" height="14" viewBox="0 0 20 14"><rect width="20" height="14" fill="#1A1F71" rx="2"/><circle cx="7.5" cy="7" r="3.5" fill="#F7B600"/><circle cx="12.5" cy="7" r="3.5" fill="#EB001B" fillOpacity=".7"/></svg></div><div><p className="text-sm text-neutral-900">\u2022\u2022\u2022\u2022 4242</p><p className="text-xs text-neutral-400">Card on file</p></div></div>}
                <div className="pt-2 border-t border-neutral-100 mt-2">
                  {isUpgrade&&curP&&<><div className="flex justify-between text-sm mb-1"><span className="text-neutral-400">Prorated credit ({curP.name})</span><span className="text-neutral-400">-${Math.round(curP.price*0.5)}.00</span></div>
                  <div className="flex justify-between text-sm mb-1"><span className="text-neutral-400">{checkoutPlan.name} plan</span><span className="text-neutral-900">${checkoutPlan.price}.00</span></div>
                  <div className="flex justify-between text-sm pt-3 border-t border-neutral-100"><span className="text-neutral-900">Due today</span><span className="text-neutral-900">${checkoutPlan.price-Math.round(curP.price*0.5)}.00</span></div></>}
                  {isDowngrade&&<><div className="flex justify-between text-sm mb-1"><span className="text-neutral-400">{checkoutPlan.name} plan (next cycle)</span><span className="text-neutral-900">${checkoutPlan.price}.00</span></div>
                  <div className="flex justify-between text-sm pt-3 border-t border-neutral-100"><span className="text-neutral-900">Due today</span><span className="text-neutral-900">$0.00</span></div></>}
                  {!isUpgrade&&!isDowngrade&&<><div className="flex justify-between text-sm mb-1"><span className="text-neutral-400">{checkoutPlan.name} plan</span><span className="text-neutral-900">${checkoutPlan.price}.00</span></div>
                  <div className="flex justify-between text-sm mb-3"><span className="text-neutral-400">Tax</span><span className="text-neutral-900">$0.00</span></div>
                  <div className="flex justify-between text-sm pt-3 border-t border-neutral-100"><span className="text-neutral-900">Total due today</span><span className="text-neutral-900">${checkoutPlan.price}.00</span></div></>}
                </div>
              </div>
              <div className="px-7 pb-7"><button onClick={curPlan?()=>{setCheckoutLoading(true);setTimeout(()=>{setCurPlan(checkoutPlan.id);setCheckoutLoading(false);setCheckoutDone(true);setTimeout(()=>{setCheckoutDone(false);setCheckoutPlan(null);},1500);},1500);}:handleCheckout} disabled={checkoutLoading||(!curPlan&&(!cardNum||!cardExp||!cardCvc||!cardName))} className={"w-full py-3.5 text-sm transition-colors "+(checkoutLoading?"bg-neutral-400 text-white cursor-wait":(!curPlan&&(!cardNum||!cardExp||!cardCvc||!cardName))?"bg-neutral-200 text-neutral-400 cursor-not-allowed":"bg-neutral-900 text-white hover:bg-black")}>{checkoutLoading?"Processing...":(isUpgrade?"Upgrade":isDowngrade?"Downgrade":"Subscribe")+" \u2014 $"+(isDowngrade?"0":isUpgrade?(checkoutPlan.price-Math.round((getPlan(curPlan)?.price||0)*0.5)):checkoutPlan.price)+"/today"}</button>
                <div className="flex items-center justify-center gap-2 mt-4"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="text-neutral-300"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg><p className="text-xs text-neutral-300">Secured by Stripe</p></div>
              </div></>}
            </div>
          </div>,document.body);})()}

          {/* ── Cancel modal ── */}
          {cancelModal&&<CancelModal planName={getPlan(curPlan)?.name} onConfirm={()=>setCurPlan(null)} onClose={()=>setCancelModal(false)}/>}

          <p className="text-2xl text-neutral-900 tracking-tight mb-2">{curPlan?"Manage your plan":"Choose your plan"}</p>
          <p className="text-sm text-neutral-400 mb-8">{curPlan?"Upgrade, downgrade, or cancel anytime.":"All plans include a 14-day free trial. Cancel anytime."}</p>

          {/* ── Plan cards ── */}
          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-8">
            {plans.map(p=>{const active=curPlan===p.id;const isUp=curPlan&&planTier(p.id)>planTier(curPlan);const isDown=curPlan&&planTier(p.id)<planTier(curPlan);return(
              <div key={p.id} className={"border p-6 flex flex-col transition-colors "+(active?"border-neutral-900 bg-neutral-50":"border-neutral-200 hover:border-neutral-300")}>
                <div className="flex items-center gap-2 mb-3">{p.badge&&<span className="text-xs bg-neutral-900 text-white px-3 py-1">{p.badge}</span>}{active&&<span className="text-xs border border-neutral-900 text-neutral-900 px-3 py-1">Current</span>}</div>
                <p className="text-lg text-neutral-900">{p.name}</p>
                <p className="text-xs text-neutral-400 mt-1 mb-4">{p.desc}</p>
                <div className="flex items-baseline gap-1 mb-1"><span className="text-3xl text-neutral-900">${p.price}</span><span className="text-sm text-neutral-400">{p.period}</span></div>
                <p className="text-xs text-neutral-300 mb-5">{p.minutes.toLocaleString()} minutes included \u00B7 {p.overage} overage</p>
                <div className="space-y-2.5 mb-6 flex-1">{p.features.map((f,i)=><div key={i} className="flex items-start gap-2.5"><span className="w-4 h-4 text-neutral-400 shrink-0 mt-0.5">{I.check}</span><span className="text-sm text-neutral-600">{f}</span></div>)}</div>
                {active?<div className="space-y-2"><button className="w-full py-3 text-sm border-2 border-neutral-900 text-neutral-900 cursor-default">Current plan</button><button onClick={()=>setCancelModal(true)} className="w-full py-2.5 text-xs text-neutral-400 hover:text-neutral-600 transition-colors">Cancel subscription</button></div>
                :isDown?<button onClick={()=>setCheckoutPlan(p)} className="w-full py-3 text-sm border border-neutral-200 text-neutral-500 hover:bg-neutral-50 transition-colors">Downgrade</button>
                :<button onClick={()=>setCheckoutPlan(p)} className="w-full py-3 text-sm bg-neutral-900 text-white hover:bg-black transition-colors">{isUp?"Upgrade":"Get started"}</button>}
              </div>
            );})}
          </div>

          {/* ── Current plan summary ── */}
          {curPlan&&<div className="border border-neutral-200 p-7 mb-6">
            <div className="flex items-center justify-between mb-4"><p className="text-xs text-neutral-400 uppercase tracking-widest">Current subscription</p><span className="text-xs bg-neutral-900 text-white px-3 py-1">{getPlan(curPlan)?.name} \u00B7 ${getPlan(curPlan)?.price}/mo</span></div>
            <div className="grid grid-cols-2 gap-6 mb-4">
              <div><p className="text-xs text-neutral-400 mb-2">Call minutes</p><div className="h-2 bg-neutral-100 overflow-hidden"><div className="h-full bg-neutral-900 transition-all" style={{width:isDemo?"34%":"0%"}}/></div><p className="text-xs text-neutral-300 mt-1.5">{isDemo?"68":"0"} / {getPlan(curPlan)?.minutes.toLocaleString()} used</p></div>
              <div><p className="text-xs text-neutral-400 mb-2">Team seats</p><div className="h-2 bg-neutral-100 overflow-hidden"><div className="h-full bg-neutral-900 transition-all" style={{width:isDemo?Math.min(100,Math.round((team.filter(m=>m.status==="Active").length/getPlan(curPlan)?.seats)*100))+"%":"0%"}}/></div><p className="text-xs text-neutral-300 mt-1.5">{isDemo?team.filter(m=>m.status==="Active").length:"0"} / {getPlan(curPlan)?.seats===999?"\u221E":getPlan(curPlan)?.seats} used</p></div>
            </div>
            <p className="text-xs text-neutral-300">Next billing date: May 1, 2026 \u00B7 Overage rate: {getPlan(curPlan)?.overage}</p>
          </div>}

          {/* ── Payment method ── */}
          <div className="border border-neutral-200 p-7 mb-6">
            <p className="text-xs text-neutral-400 uppercase tracking-widest mb-4">Payment method</p>
            {curPlan?<div className="flex items-center justify-between"><div className="flex items-center gap-3"><div className="w-10 h-7 bg-neutral-100 flex items-center justify-center"><svg width="20" height="14" viewBox="0 0 20 14"><rect width="20" height="14" fill="#1A1F71" rx="2"/><circle cx="7.5" cy="7" r="3.5" fill="#F7B600"/><circle cx="12.5" cy="7" r="3.5" fill="#EB001B" fillOpacity=".7"/></svg></div><div><p className="text-sm text-neutral-900">\u2022\u2022\u2022\u2022 \u2022\u2022\u2022\u2022 \u2022\u2022\u2022\u2022 4242</p><p className="text-xs text-neutral-400 mt-0.5">Expires 12/27</p></div></div><button className="text-xs text-neutral-400 hover:text-neutral-600 transition-colors">Update</button></div>
            :<><p className="text-sm text-neutral-400">No payment method on file</p><p className="text-xs text-neutral-300 mt-1">Choose a plan above to add a payment method</p></>}
          </div>

          {/* ── Invoices ── */}
          <div>
            <p className="text-xs text-neutral-400 uppercase tracking-widest mb-4">Recent invoices</p>
            {curPlan?<div className="space-y-2">{[["Mar 1, 2026","$"+getPlan(curPlan)?.price+".00","Paid"],["Feb 1, 2026","$"+getPlan(curPlan)?.price+".00","Paid"],["Jan 1, 2026","$"+getPlan(curPlan)?.price+".00","Paid"]].map(([d,a,s],i)=><div key={i} className="flex items-center justify-between py-3 border-b border-neutral-100 last:border-0"><div><p className="text-sm text-neutral-900">{d}</p></div><div className="flex items-center gap-4"><span className="text-sm text-neutral-900">{a}</span><span className="text-xs text-neutral-400 bg-neutral-50 px-2.5 py-1">{s}</span></div></div>)}</div>
            :<p className="text-sm text-neutral-400">No invoices yet</p>}
          </div>
        </div>}
        {tab==="notifications"&&<div className="max-w-xl"><p className="text-2xl text-neutral-900 tracking-tight mb-8">Notifications</p><div className="space-y-1">{[["calls","New call alerts","Get notified when a new call comes in"],["sms","SMS notifications","Receive text alerts for urgent calls"],["email","Email digests","Daily summary of all calls and bookings"],["weekly","Weekly reports","Performance report every Monday"]].map(([k,title,desc])=>(<div key={k} className="flex items-center justify-between py-5 border-b border-neutral-100 last:border-0"><div><p className="text-sm text-neutral-900">{title}</p><p className="text-xs text-neutral-400 mt-0.5">{desc}</p></div><Toggle on={notifs[k]} onChange={()=>toggleN(k)}/></div>))}</div></div>}
      </div>
    </div>
  );
};

  const timeToRow=t=>{const[h]=t.replace(/\s?(AM|PM)/i,"").split(":").map(Number);const hr=t.includes("PM")&&h!==12?h+12:t.includes("AM")&&h===12?0:h;return hr-7;};

          <div className="px-7 py-5 border-t border-neutral-100 shrink-0">
            <button onClick={()=>{setBookings(p=>p.map(b=>b.id===selBook.id?{...b,tech:bookTech,notes:bookNotes}:b));setSelBook(null);}} className="w-full bg-neutral-900 text-white py-3 text-sm hover:bg-black transition-colors">Save changes</button>
          </div>
        </>}
      </Panel>

      {/* New appointment panel */}
      <Panel open={addPanel} onClose={()=>setAddPanel(false)}>
        <PanelHeader onClose={()=>setAddPanel(false)} title="New appointment" sub="Add a manual booking"/>
        <div className="flex-1 overflow-y-auto px-7 py-6 space-y-5">
          <FF label="Customer name" required><TI type="text" value={newAppt.name} onChange={e=>setNewAppt({...newAppt,name:e.target.value})} placeholder="Full name"/></FF>
          <FF label="Phone"><TI type="tel" value={newAppt.phone} onChange={e=>setNewAppt({...newAppt,phone:e.target.value})} placeholder="(555) 000-0000"/></FF>
          <FF label="Address"><TI type="text" value={newAppt.address} onChange={e=>setNewAppt({...newAppt,address:e.target.value})} placeholder="Street address"/></FF>

            <FF label="Start"><TI type="time" value={newAppt.time} onChange={e=>setNewAppt({...newAppt,time:e.target.value})}/></FF>
            <FF label="End"><TI type="time" value={newAppt.timeEnd} onChange={e=>setNewAppt({...newAppt,timeEnd:e.target.value})}/></FF>
          </div>
          <FF label="Issue / description"><TA rows={3} value={newAppt.issue} onChange={e=>setNewAppt({...newAppt,issue:e.target.value})} placeholder="Describe the issue..."/></FF>
          <div><label className="text-xs text-neutral-400 mb-1.5 block">Urgency</label><div className="grid grid-cols-3 gap-2">{[["standard","Standard"],["urgent","Urgent"],["emergency","Emergency"]].map(([k,l])=><button key={k} onClick={()=>setNewAppt({...newAppt,urgency:k})} className={"text-sm py-2.5 border transition-colors "+(newAppt.urgency===k?"bg-neutral-900 text-white border-neutral-900":"border-neutral-200 text-neutral-500 hover:border-neutral-400")}>{l}</button>)}</div></div>
        </div>
        <div className="px-7 py-5 border-t border-neutral-100 shrink-0">
          <button onClick={()=>{if(!newAppt.name||!newAppt.date)return;const fmtT=t=>{if(!t)return"TBD";const[h,m]=t.split(":");const hr=parseInt(h);return(hr>12?hr-12:hr===0?12:hr)+":"+m+" "+(hr>=12?"PM":"AM");};const d=new Date(newAppt.date+"T12:00:00");const nb={id:Date.now(),name:newAppt.name,phone:newAppt.phone,address:newAppt.address,issue:newAppt.issue,time:fmtT(newAppt.time),timeEnd:fmtT(newAppt.timeEnd),date:d,status:"pending",urgency:newAppt.urgency,source:"Manual"};setBookings(p=>[...p,nb]);setNewAppt({name:"",phone:"",address:"",issue:"",date:"",time:"",timeEnd:"",urgency:"standard"});setAddPanel(false);}} className="w-full bg-neutral-900 text-white py-3 text-sm hover:bg-black transition-colors">Add appointment</button>
        </div>
      </Panel>

      {/* Header */}
      <div className="flex flex-col md:flex-row md:items-end justify-between mb-6 md:mb-8 gap-3">

            <button onClick={()=>{view==="week"?setWeekOff(w=>w-1):setMonthOff(m=>m-1);}} className="w-8 h-8 flex items-center justify-center hover:bg-neutral-300 transition-colors"><span className="w-4 h-4 text-neutral-500">{I.arrowL}</span></button>

          </div>
          <div className="flex bg-neutral-200 p-1">{[["week","Week"],["month","Month"]].map(([k,l])=><button key={k} onClick={()=>setView(k)} className={"px-4 md:px-5 py-2 text-sm transition-all duration-200 "+(view===k?"bg-white text-neutral-900":"text-neutral-500")}>{l}</button>)}</div>
          <button onClick={()=>setAddPanel(true)} className="bg-neutral-900 text-white px-4 py-2.5 text-sm flex items-center gap-2 hover:bg-black transition-colors"><span className="w-4 h-4">{I.plus}</span><span className="hidden md:inline">New appointment</span><span className="md:hidden">New</span></button>
        </div>
      </div>

      {/* Week view */}
      {view==="week"&&<div className="flex-1 flex flex-col min-h-0">
        <div className="flex-1 overflow-auto bg-white border border-neutral-200">
          <div className="grid grid-cols-[60px_repeat(7,1fr)] min-w-[700px]">
            <div className="border-b border-neutral-200 p-2 bg-white"/>
            {weekDays.map((d,i)=><div key={i} className={"border-b border-l border-neutral-200 p-2 text-center bg-white "+(sameDay(d,today)?"":"")}>
              <p className="text-xs text-neutral-400">{fmtDay(d)}</p>
              <p className={"text-lg "+(sameDay(d,today)?"text-white bg-neutral-900 w-8 h-8 flex items-center justify-center mx-auto":"text-neutral-900")}>{d.getDate()}</p>
            </div>)}
            {hours.map(h=><React.Fragment key={h}>
              <div className="border-b border-neutral-100 px-2 py-3 text-right bg-white"><span className="text-xs text-neutral-300">{h>12?(h-12)+"pm":h===12?"12pm":h+"am"}</span></div>
              {weekDays.map((d,di)=>{
                const dayBooks=bookings.filter(b=>sameDay(b.date,d)&&b.status!=="cancelled"&&timeToRow(b.time)===h-7);
                return<div key={di} className="border-b border-l border-neutral-100 p-1 min-h-[52px] bg-white">
                  {dayBooks.map(b=>(
                    <div key={b.id} onClick={()=>setSelBook(b)} className={"px-2 py-1.5 mb-0.5 cursor-pointer text-xs transition-colors "+(b.status==="pending"?"bg-neutral-200 text-neutral-700 border-l-2 border-neutral-900 hover:bg-neutral-300":"bg-neutral-900 text-white hover:bg-black")}>
                      <p className="truncate">{b.time} {b.name}</p>
                    </div>
                  ))}
                </div>;
              })}
            </React.Fragment>)}
          </div>
        </div>
      </div>}

      {/* Month view */}
      {view==="month"&&<div className="flex-1 flex flex-col min-h-0">
        <div className="flex-1 bg-white border border-neutral-200 flex flex-col">
          <div className="grid grid-cols-7 shrink-0">
            {["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d=><div key={d} className="border-b border-neutral-200 p-1 md:p-2 text-center bg-white"><p className="text-xs text-neutral-400"><span className="md:hidden">{d[0]}</span><span className="hidden md:inline">{d}</span></p></div>)}
          </div>
          <div className="grid grid-cols-7 flex-1">
            {monthCells.map((d,i)=>{
              if(!d)return<div key={"e"+i} className="border-b border-r border-neutral-100 bg-white"/>;
              const dayBooks=bookings.filter(b=>sameDay(b.date,d)&&b.status!=="cancelled");
              const isToday=sameDay(d,today);
              return<div key={i} className="border-b border-r border-neutral-100 p-1.5 bg-white overflow-hidden">
                <p className={"text-xs mb-1.5 "+(isToday?"text-white bg-neutral-900 w-5 h-5 flex items-center justify-center":"text-neutral-400")}>{d.getDate()}</p>
                {dayBooks.slice(0,3).map(b=>(
                  <div key={b.id} onClick={()=>setSelBook(b)} className={"px-1.5 py-0.5 mb-0.5 cursor-pointer text-xs truncate transition-colors "+(b.status==="pending"?"bg-neutral-200 text-neutral-700 hover:bg-neutral-300":"bg-neutral-900 text-white hover:bg-black")}>
                    {b.time.replace(":00","")} {b.name.split(" ")[0]}
                  </div>
                ))}
                {dayBooks.length>3&&<p className="text-xs text-neutral-400 px-1">+{dayBooks.length-3} more</p>}
              </div>;
            })}
          </div>
        </div>
      </div>}
    </div>
  );
};

          <p className="text-xs text-neutral-600">\u2022 You can resubscribe anytime</p>

  const[cardNum,setCardNum]=useState("");
  const[cardExp,setCardExp]=useState("");
  const[cardCvc,setCardCvc]=useState("");
  const[email,setEmail]=useState("");
  const[processing,setProcessing]=useState(false);
  const[paid,setPaid]=useState(false);
  const pct=step===0?0:step===1?50:100;
  const fmtCard=v=>{const d=v.replace(/\D/g,"").substring(0,16);return d.replace(/(.{4})/g,"$1 ").trim();};
  const fmtExp=v=>{const d=v.replace(/\D/g,"").substring(0,4);return d.length>=3?d.substring(0,2)+" / "+d.substring(2):d;};
  const handlePay=()=>{
    if(!cardName||cardNum.replace(/\s/g,"").length<16||cardExp.length<7||cardCvc.length<3){alert("Please fill in all card details.");return;}
    setProcessing(true);
    setTimeout(()=>{setProcessing(false);setPaid(true);setStep(2);},2200);
  };

  return(
    <div className="min-h-screen bg-white flex flex-col">
      <div className="h-1 bg-neutral-100 shrink-0"><div className="h-full bg-neutral-900 transition-all duration-700 ease-out" style={{width:pct+"%"}}/></div>

      <div className="h-16 flex items-center px-6 md:px-10 shrink-0">
        <div className="flex items-center gap-3"><Logo s={32}/></div>
        <div className="flex-1"/>
        {step<2&&<span className="text-xs text-neutral-300 tabular-nums">{step===0?"Quote":"Checkout"}</span>}
      </div>

      <div className="flex-1 flex items-center justify-center px-6 md:px-8 pb-20">
        <div className="w-full max-w-[600px] fu" key={step}>

          {step===0&&<div>
            <div className="flex items-center justify-between mb-6"><p className="text-xs text-neutral-400 uppercase tracking-widest">Quote {data.qid}</p>{paid&&<span className="flex items-center gap-1.5 bg-neutral-900 text-white text-xs px-3 py-1"><span className="w-3 h-3">{I.check}</span>Paid</span>}</div>
            <p className="text-4xl md:text-5xl text-neutral-900 tracking-tight mb-3">${data.total.toLocaleString()}</p>
            <p className="text-neutral-400 mb-12">Issued {data.created} · Valid through {data.expires}</p>

                {data.custPhone&&<p className="text-sm text-neutral-400 mt-1">{data.custPhone}</p>}

              </div>
              {data.issue&&<div className="px-6 py-4 bg-neutral-50 border-b border-neutral-100"><p className="text-sm text-neutral-600">{data.issue}</p></div>}
              <table className="w-full">
                <thead><tr className="bg-neutral-50">
                  <th className="text-left px-6 py-3 text-xs text-neutral-400 uppercase tracking-widest" style={{fontWeight:400}}>Description</th>
                  <th className="text-right px-4 py-3 text-xs text-neutral-400 uppercase tracking-widest" style={{fontWeight:400}}>Qty</th>
                  <th className="text-right px-4 py-3 text-xs text-neutral-400 uppercase tracking-widest" style={{fontWeight:400}}>Rate</th>
                  <th className="text-right px-6 py-3 text-xs text-neutral-400 uppercase tracking-widest" style={{fontWeight:400}}>Amount</th>
                </tr></thead>
                <tbody>{data.lines.map((l,i)=>(
                  <tr key={i} className="border-t border-neutral-100">
                    <td className="px-6 py-3 text-sm text-neutral-900">{l.desc}</td>
                    <td className="px-4 py-3 text-sm text-neutral-500 text-right tabular-nums">{l.qty}</td>
                    <td className="px-4 py-3 text-sm text-neutral-500 text-right tabular-nums">${l.rate.toLocaleString()}</td>
                    <td className="px-6 py-3 text-sm text-neutral-900 text-right tabular-nums">${l.amt.toLocaleString()}</td>
                  </tr>
                ))}</tbody>
              </table>
              <div className="px-6 py-4 border-t border-neutral-200">
                <div className="max-w-[240px] ml-auto space-y-1.5">
                  <div className="flex justify-between"><span className="text-sm text-neutral-400">Subtotal</span><span className="text-sm text-neutral-900 tabular-nums">${data.sub.toLocaleString()}</span></div>
                  {data.discPct>0&&<div className="flex justify-between"><span className="text-sm text-neutral-400">Discount ({data.discPct}%)</span><span className="text-sm text-neutral-900 tabular-nums">-${data.discAmt.toLocaleString()}</span></div>}
                  <div className="flex justify-between"><span className="text-sm text-neutral-400">Tax ({data.taxPct}%)</span><span className="text-sm text-neutral-900 tabular-nums">${data.tax.toLocaleString()}</span></div>
                  <div className="h-px bg-neutral-200 my-2"/>
                  <div className="flex justify-between"><span className="text-base text-neutral-900">Total</span><span className="text-lg text-neutral-900 tabular-nums tracking-tight">${data.total.toLocaleString()}</span></div>
                </div>
              </div>
            </div>

            {data.notes&&<div className="bg-neutral-50 border border-neutral-200 p-6 mb-8">
              <p className="text-xs text-neutral-400 uppercase tracking-widest mb-3">Notes & Terms</p>
              <p className="text-sm text-neutral-600 leading-relaxed">{data.notes}</p>
            </div>}

            {paid
              ?<div className="bg-neutral-50 border border-neutral-200 py-4 text-center"><p className="text-sm text-neutral-500 flex items-center justify-center gap-2"><span className="w-4 h-4 text-neutral-900">{I.check}</span>Paid — ${data.total.toLocaleString()}</p></div>
              :<><button onClick={()=>setStep(1)} className="w-full bg-neutral-900 text-white py-4 text-sm hover:bg-black transition-colors">Pay now — ${data.total.toLocaleString()}</button>
              <p className="text-xs text-neutral-300 text-center mt-4">Secure payment powered by Stripe</p></>}
          </div>}

          {step===1&&<div>
            <button onClick={()=>setStep(0)} className="text-sm text-neutral-400 hover:text-neutral-900 transition-colors flex items-center gap-2 mb-10"><span className="w-4 h-4">{I.arrowL}</span>Back to quote</button>
            <p className="text-xs text-neutral-400 uppercase tracking-widest mb-6">Checkout</p>
            <p className="text-4xl text-neutral-900 tracking-tight mb-3">Payment details</p>
            <p className="text-neutral-400 mb-12">Quote {data.qid} · ${data.total.toLocaleString()} due</p>

            <div className="bg-neutral-50 border border-neutral-200 p-5 mb-10">
              <div className="flex justify-between items-center">
                <div><p className="text-sm text-neutral-900">{data.biz}</p><p className="text-xs text-neutral-400 mt-0.5">Quote {data.qid}</p></div>
                <p className="text-xl text-neutral-900 tabular-nums tracking-tight">${data.total.toLocaleString()}</p>
              </div>
              <div className="h-px bg-neutral-200 my-4"/>
              {data.lines.map((l,i)=>(
                <div key={i} className="flex justify-between py-1"><span className="text-xs text-neutral-400">{l.desc} x{l.qty}</span><span className="text-xs text-neutral-500 tabular-nums">${l.amt.toLocaleString()}</span></div>
              ))}
              <div className="h-px bg-neutral-200 my-3"/>
              <div className="flex justify-between py-1"><span className="text-xs text-neutral-400">Subtotal</span><span className="text-xs text-neutral-500 tabular-nums">${data.sub.toLocaleString()}</span></div>
              {data.discPct>0&&<div className="flex justify-between py-1"><span className="text-xs text-neutral-400">Discount ({data.discPct}%)</span><span className="text-xs text-neutral-500 tabular-nums">-${data.discAmt.toLocaleString()}</span></div>}
              <div className="flex justify-between py-1"><span className="text-xs text-neutral-400">Tax ({data.taxPct}%)</span><span className="text-xs text-neutral-500 tabular-nums">${data.tax.toLocaleString()}</span></div>
            </div>

            <div className="space-y-5">
              <div>
                <p className="text-xs text-neutral-400 mb-1.5">Cardholder name</p>
                <input value={cardName} onChange={e=>setCardName(e.target.value)} placeholder="Full name on card" className="w-full border border-neutral-200 px-4 py-3.5 text-sm hover:border-neutral-300 transition-colors"/>
              </div>
              <div>
                <p className="text-xs text-neutral-400 mb-1.5">Card number</p>
                <input value={cardNum} onChange={e=>setCardNum(fmtCard(e.target.value))} placeholder="1234 5678 9012 3456" maxLength={19} className="w-full border border-neutral-200 px-4 py-3.5 text-sm hover:border-neutral-300 transition-colors tabular-nums"/>
              </div>
              <div className="grid grid-cols-2 gap-4">
                <div>
                  <p className="text-xs text-neutral-400 mb-1.5">Expiry</p>
                  <input value={cardExp} onChange={e=>setCardExp(fmtExp(e.target.value))} placeholder="MM / YY" maxLength={7} className="w-full border border-neutral-200 px-4 py-3.5 text-sm hover:border-neutral-300 transition-colors tabular-nums"/>
                </div>
                <div>
                  <p className="text-xs text-neutral-400 mb-1.5">CVC</p>
                  <input value={cardCvc} onChange={e=>setCardCvc(e.target.value.replace(/\D/g,"").substring(0,4))} placeholder="123" maxLength={4} className="w-full border border-neutral-200 px-4 py-3.5 text-sm hover:border-neutral-300 transition-colors tabular-nums"/>
                </div>
              </div>
              <div>
                <p className="text-xs text-neutral-400 mb-1.5">Email for receipt</p>
                <input value={email} onChange={e=>setEmail(e.target.value)} type="email" placeholder="you@example.com" className="w-full border border-neutral-200 px-4 py-3.5 text-sm hover:border-neutral-300 transition-colors"/>
              </div>
            </div>

            <button onClick={handlePay} disabled={processing} className={"w-full py-4 text-sm mt-10 transition-colors "+(processing?"bg-neutral-300 text-white cursor-wait":"bg-neutral-900 text-white hover:bg-black")}>{processing?"Processing...":"Pay $"+data.total.toLocaleString()}</button>
            <p className="text-xs text-neutral-300 text-center mt-4 flex items-center justify-center gap-1.5"><span className="w-3 h-3">{I.lock||"\u{1F512}"}</span>256-bit SSL encrypted</p>
          </div>}

          {step===2&&<div className="text-center">
            <div className="w-20 h-20 bg-neutral-900 text-white flex items-center justify-center mx-auto mb-8"><span className="w-8 h-8">{I.check}</span></div>
            <p className="text-5xl text-neutral-900 tracking-tight mb-4">Payment received</p>
            <p className="text-neutral-400 leading-relaxed max-w-sm mx-auto mb-14">Thank you, {data.custName.split(" ")[0]}! A receipt has been sent to your email.</p>

            <div className="border border-neutral-200 mb-8">
              <p className="text-xs text-neutral-400 uppercase tracking-widest px-6 pt-5 pb-3">Payment summary</p>
              {[["Quote",data.qid],["Amount","$"+data.total.toLocaleString()],["Business",data.biz],["Date",data.created]].map(([l,v],i)=>(
                <div key={l} className={"flex items-center justify-between px-6 py-3.5 "+(i<3?"border-b border-neutral-100":"")}>
                  <span className="text-xs text-neutral-400">{l}</span>
                  <span className="text-sm text-neutral-900">{v}</span>
                </div>
              ))}
            </div>

            <button onClick={()=>setStep(0)} className="w-full border border-neutral-200 py-4 text-sm text-neutral-500 hover:bg-neutral-50 transition-colors">View quote details</button>
            <button onClick={onClose} className="w-full text-center text-xs text-neutral-400 hover:text-neutral-900 transition-colors mt-4 py-2">Close</button>
          </div>}

        </div>
      </div>
    </div>
  );
};

      </div>
      {/* Mobile top bar */}
      <div className="md:hidden flex items-center justify-between px-5 bg-neutral-900 shrink-0" style={{height:56}}>
        <button onClick={()=>setMobileMenu(true)} className="w-10 h-10 flex items-center justify-center text-white"><svg fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24" className="w-5 h-5"><path d="M4 7h16M4 12h16"/></svg></button>
        <Logo s={30} light/>

          <Logo s={30} light/>
          <div className="w-10"/>

        <div className="flex-1 flex flex-col justify-center px-8">
          {nav.map(n=>(
            <button key={n.id} onClick={()=>{go(n.id);setMobileMenu(false);}} className={"flex items-center gap-5 py-4 border-b border-neutral-800 transition-colors "+(pg===n.id?"text-white":"text-neutral-500")}>

/* ══════════════════ AUTH ══════════════════ */
const Auth=({onLogin,onSignup})=>{
  const[mode,setMode]=useState("login");
  const[email,setEmail]=useState("");
  const[pass,setPass]=useState("");
  const[name,setName]=useState("");
  const[biz,setBiz]=useState("");
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState("");

  const handleSubmit=async()=>{
    setError("");
    if(!email||!pass){setError("Please fill in all fields.");return;}
    if(mode==="signup"&&(!name||!biz)){setError("Please fill in all fields.");return;}
    setLoading(true);
    let err;
    if(mode==="login"){err=await onLogin(email,pass);}
    else{err=await onSignup(email,pass,name,biz);}
    if(err)setError(err);
    setLoading(false);
  };

  const handleKey=e=>{if(e.key==='Enter')handleSubmit();};

  return(
    <div className="min-h-screen bg-neutral-50 flex">
      {/* Left — branding */}
      <div className="hidden lg:flex w-[480px] bg-neutral-900 flex-col justify-between p-12 shrink-0">
        <div>
          <div className="mb-16"><Logo s={44} light/></div>
          <p className="text-4xl text-white tracking-tight leading-tight mb-6">Your AI front office for home services</p>
          <p className="text-neutral-500 leading-relaxed">Diali answers every call, books jobs, qualifies leads, and sends quotes — so you never miss revenue again.</p>
        </div>
        <div className="space-y-8">
          <div className="h-px bg-neutral-800"/>
          {[["2,400+","Contractors use Diali"],["$12M+","Revenue booked by AI"],["98%","Call answer rate"]].map(([v,l])=>(
            <div key={l} className="flex items-center justify-between"><span className="text-xs text-neutral-500 uppercase tracking-widest">{l}</span><span className="text-2xl text-white tabular-nums tracking-tight">{v}</span></div>
          ))}
        </div>
      </div>

      {/* Right — form */}
      <div className="flex-1 flex items-center justify-center p-8">
        <div className="w-full max-w-[400px] fu">
          <div className="lg:hidden mb-10"><Logo s={40}/></div>
          <p className="text-3xl text-neutral-900 tracking-tight mb-2">{mode==="login"?"Welcome back":"Create your account"}</p>
          <p className="text-neutral-400 mb-10">{mode==="login"?"Sign in to your Diali account":"Get started in under 2 minutes"}</p>

          {error&&<div className="bg-neutral-100 border border-neutral-200 px-4 py-3 mb-6"><p className="text-sm text-neutral-700">{error}</p></div>}

          <div className="space-y-4">
            {mode==="signup"&&<>
              <div><label className="text-xs text-neutral-400 mb-1.5 block">Full name</label><input value={name} onChange={e=>setName(e.target.value)} onKeyDown={handleKey} type="text" placeholder="Joe Martinez" className="w-full border border-neutral-200 px-4 py-3 text-sm hover:border-neutral-300 transition-colors"/></div>
              <div><label className="text-xs text-neutral-400 mb-1.5 block">Business name</label><input value={biz} onChange={e=>setBiz(e.target.value)} onKeyDown={handleKey} type="text" placeholder="Martinez HVAC" className="w-full border border-neutral-200 px-4 py-3 text-sm hover:border-neutral-300 transition-colors"/></div>
            </>}
            <div><label className="text-xs text-neutral-400 mb-1.5 block">Email</label><input value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={handleKey} type="email" placeholder="joe@martinezhvac.com" className="w-full border border-neutral-200 px-4 py-3 text-sm hover:border-neutral-300 transition-colors"/></div>
            <div><label className="text-xs text-neutral-400 mb-1.5 block">Password</label><input value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={handleKey} type="password" placeholder={mode==="login"?"Enter your password":"Create a password (6+ chars)"} className="w-full border border-neutral-200 px-4 py-3 text-sm hover:border-neutral-300 transition-colors"/></div>
            {mode==="login"&&<div className="flex justify-end"><button className="text-xs text-neutral-400 hover:text-neutral-900 transition-colors">Forgot password?</button></div>}
          </div>

          <button onClick={handleSubmit} disabled={loading} className={"w-full py-3.5 text-sm mt-8 transition-colors flex items-center justify-center gap-2 "+(loading?"bg-neutral-400 text-white cursor-not-allowed":"bg-neutral-900 text-white hover:bg-black")}>
            {loading&&<div className="w-4 h-4 border-2 border-white border-t-transparent animate-spin" style={{borderRadius:'50%'}}/>}
            {loading?(mode==="login"?"Signing in...":"Creating account..."):(mode==="login"?"Sign in":"Get started")}
          </button>

          {mode==="signup"&&<p className="text-xs text-neutral-300 text-center mt-4">By signing up you agree to our Terms and Privacy Policy</p>}

          <div className="flex items-center gap-4 my-8"><div className="flex-1 h-px bg-neutral-200"/><span className="text-xs text-neutral-300">or</span><div className="flex-1 h-px bg-neutral-200"/></div>

const Onboarding=({onDone})=>{

  const[greeting,setGreeting]=useState("Hi, thanks for calling! How can we help you today?");
  const toggleSvc=s=>setServices(p=>p.includes(s)?p.filter(x=>x!==s):[...p,s]);
  const voiceIdMap={"Kim":"O7LV5fxosQChiBE7l6Wz","Asher":"tMvyQtpCVQ0DkixuYm6J","Brady":"Sr9Xhw1be5kyNtGEOV0y","Evan":"TWutjvRaJqAX89preB4e","Larry":"LoQnubeEKhw9RDkfeS80","Kiora":"hGQkZQUA5RiOXIw7P9iO"};

    "Electrical":["Panel Upgrade","Wiring Repair","Outlet Install","Lighting","Generator Install","EV Charger","Ceiling Fan","Code Compliance","Surge Protection","Maintenance Plans"],
    "Roofing":["Roof Repair","Roof Replacement","Leak Detection","Gutter Install","Gutter Cleaning","Skylight Install","Flat Roof","Storm Damage","Roof Inspection","Maintenance Plans"],
    "General":["AC Repair","Heating","Plumbing","Electrical","Roofing","Water Heater","Duct Cleaning","Maintenance Plans","Insulation","Commercial HVAC"],
    "Other":["Service Call","Repair","Installation","Inspection","Maintenance Plans","Emergency Service","Consultation","Estimate"]

  const allServices=tradeServices[trade]||tradeServices["General"];
  const obVoiceIdMap2={"Kim":"O7LV5fxosQChiBE7l6Wz","Asher":"tMvyQtpCVQ0DkixuYm6J","Brady":"Sr9Xhw1be5kyNtGEOV0y","Evan":"TWutjvRaJqAX89preB4e","Larry":"LoQnubeEKhw9RDkfeS80","Kiora":"hGQkZQUA5RiOXIw7P9iO"};

    e.stopPropagation();
    if(obAudioRef.current){obAudioRef.current.pause();obAudioRef.current=null;}
    if(obPlaying===name){setObPlaying(null);return;}
    const vid=obVoiceIdMap2[name];if(!vid)return;
    setObLoading(name);setObPlaying(null);
    fetch("/api/voice-preview?voiceId="+encodeURIComponent(vid))
    .then(r=>{if(!r.ok)throw new Error("err");return r.blob();}).then(blob=>{
      const url=URL.createObjectURL(blob);
      const a=new Audio(url);
      a.onended=()=>{setObPlaying(null);obAudioRef.current=null;URL.revokeObjectURL(url);};
      a.onerror=()=>{setObPlaying(null);setObLoading(null);obAudioRef.current=null;};
      obAudioRef.current=a;setObPlaying(name);setObLoading(null);a.play();
    }).catch(()=>{setObLoading(null);setObPlaying(null);});
  };

  return(

        <span className="text-xs text-neutral-300 tabular-nums">{step+1} of {total}</span>

                <div key={n} className="bg-white p-6 text-center"><p className="text-3xl text-neutral-900 tracking-tight mb-3">{n}</p><p className="text-sm text-neutral-900 mb-1">{t}</p><p className="text-xs text-neutral-400">{d}</p></div>

            </div>
            <button onClick={next} className="w-full bg-neutral-900 text-white py-4 text-sm hover:bg-black transition-colors">Get started</button>
          </div>}

          {/* Step 1 — Business info */}
          {step===1&&<div>
            <p className="text-xs text-neutral-400 uppercase tracking-widest mb-6">About your business</p>
            <p className="text-4xl text-neutral-900 tracking-tight mb-3">What do you do?</p>
            <p className="text-neutral-400 mb-12">This helps your AI understand your services and speak your customers' language.</p>
            <div className="space-y-8">
              <div>
                <p className="text-sm text-neutral-900 mb-3">Trade</p>
                <div className="grid grid-cols-3 gap-2">{["HVAC","Plumbing","Electrical","Roofing","General","Other"].map(t=>(
                  <button key={t} onClick={()=>{setTrade(t);setServices([]);}} className={"px-4 py-3.5 text-sm border-2 transition-all duration-200 "+(trade===t?"border-neutral-900 bg-neutral-900 text-white":"border-neutral-200 text-neutral-600 hover:border-neutral-400")}>{t}</button>
                ))}</div>
              </div>
              <div className="grid grid-cols-2 gap-4">
                <div><label className="text-xs text-neutral-400 mb-1.5 block">Service area</label><input value={area} onChange={e=>setArea(e.target.value)} placeholder="Denver, CO" className="w-full border border-neutral-200 px-4 py-3.5 text-sm hover:border-neutral-300 transition-colors"/></div>
                <div><label className="text-xs text-neutral-400 mb-1.5 block">Business phone</label><input value={phone} onChange={e=>setPhone(e.target.value)} type="tel" placeholder="(555) 234-5678" className="w-full border border-neutral-200 px-4 py-3.5 text-sm hover:border-neutral-300 transition-colors"/></div>
              </div>
              <div>

            </div>
            <button onClick={next} className="w-full bg-neutral-900 text-white py-4 text-sm mt-12 hover:bg-black transition-colors">Continue</button>

          {/* Step 2 — Services */}

          </div>}

          {/* Step 3 — AI Voice + Greeting */}
          {step===3&&<div>
            <p className="text-xs text-neutral-400 uppercase tracking-widest mb-6">AI personality</p>
            <p className="text-4xl text-neutral-900 tracking-tight mb-3">How should your AI sound?</p>
            <p className="text-neutral-400 mb-12">Pick a voice and customize the greeting. Customers won't know it's AI.</p>
            <div className="space-y-2 mb-10">
              {[["Kim","Conversational, friendly","Default"],["Asher","Warm, professional","Popular"],["Brady","Deep, confident",""],["Evan","Calm, measured",""],["Larry","Authoritative, steady",""],["Kiora","Friendly, energetic",""]].map(([n,d,tag])=>(
                <div key={n} onClick={()=>setVoicePick(n)} className={"flex items-center gap-4 p-4 border-2 cursor-pointer transition-all duration-200 "+(voicePick===n?"border-neutral-900":"border-neutral-200 hover:border-neutral-300")}>

              ))}

const DEMO_EMAIL="demo@diali.com";
const VALID_PAGES=new Set(["home","calls","calendar","jobs","quotes","leads","agent","settings"]);
const hashPage=()=>{const h=window.location.hash.replace("#","");return VALID_PAGES.has(h)?h:"home";};
const App=()=>{
  const[auth,setAuth]=useState("loading");
  const[isNew,setIsNew]=useState(false);
  const[isDemo,setIsDemo]=useState(false);
  const[pg,setPg]=useState(hashPage);
  const go=p=>{setPg(p);window.location.hash=p==="home"?"":p;};
  React.useEffect(()=>{const h=()=>setPg(hashPage());window.addEventListener("hashchange",h);return()=>window.removeEventListener("hashchange",h);},[]);
  const[vapiKeys,setVapiKeys]=useState({publicKey:"",privateKey:""});
  const[userId,setUserId]=useState(null);
  const[agentCfg,setAgentCfg]=useState(null);
  const[profile,setProfile]=useState(null);
  const[sbReady,setSbReady]=useState(!!window.supabase);

  /* Wait for Supabase SDK to load */
  React.useEffect(()=>{
    if(window.supabase){setSbReady(true);return;}
    const h=()=>setSbReady(true);
    window.addEventListener('supabase-ready',h);
    return()=>window.removeEventListener('supabase-ready',h);
  },[]);

  /* Load user data from Supabase — returns profile so caller can check onboarding status */
  const loadUserData=async(uid)=>{
    const sb=window.supabase;if(!sb)return null;
    const{data:settings}=await sb.from('settings').select('*').eq('id',uid).single();
    if(settings){
      setVapiKeys({publicKey:settings.vapi_public_key||'',privateKey:settings.vapi_private_key||''});
      setAgentCfg(settings);
    }
    const{data:prof}=await sb.from('profiles').select('*').eq('id',uid).single();
    if(prof)setProfile(prof);
    return prof;
  };

  /* Check existing session on mount */
  React.useEffect(()=>{
    if(!sbReady)return;
    const sb=window.supabase;
    (async()=>{
      const{data:{session}}=await sb.auth.getSession();
      if(session){
        const uid=session.user.id;
        setUserId(uid);
        const prof=await loadUserData(uid);
        if(!prof?.trade)setIsNew(true);
        setIsDemo(session.user.email===DEMO_EMAIL);
        setAuth("app");
      }else{
        setAuth("auth");
      }
    })();
    const{data:{subscription}}=sb.auth.onAuthStateChange((ev)=>{
      if(ev==='SIGNED_OUT'){setAuth("auth");setUserId(null);setVapiKeys({publicKey:"",privateKey:""});setAgentCfg(null);}
    });
    return()=>subscription?.unsubscribe();
  },[sbReady]);

  /* Save a settings field to Supabase */
  const saveSetting=async(data)=>{
    if(!userId||!window.supabase)return;
    try{await window.supabase.from('settings').upsert({id:userId,...data});}catch(e){console.error('Save error:',e);}
  };

  /* Auto-save Vapi keys when they change (debounced) */
  React.useEffect(()=>{
    if(!userId||!sbReady)return;
    const t=setTimeout(()=>{
      saveSetting({vapi_public_key:vapiKeys.publicKey});
    },1000);
    return()=>clearTimeout(t);
  },[vapiKeys.publicKey]);

  /* Handle login */
  const handleLogin=async(email,password)=>{
    const sb=window.supabase;if(!sb)return"Supabase not loaded yet. Try again.";
    const{data,error}=await sb.auth.signInWithPassword({email,password});
    if(error)return error.message;
    const uid=data.user.id;
    setUserId(uid);
    const prof=await loadUserData(uid);
    setIsNew(!prof?.trade);
    setIsDemo(data.user.email===DEMO_EMAIL);
    setAuth("app");
    return null;
  };

  /* Handle signup */
  const handleSignup=async(email,password,name,biz)=>{
    const sb=window.supabase;if(!sb)return"Supabase not loaded yet. Try again.";
    const{data,error}=await sb.auth.signUp({email,password,options:{data:{full_name:name,business_name:biz}}});
    if(error)return error.message;
    if(data.user){setUserId(data.user.id);setIsNew(true);setAuth("onboard");}
    return null;
  };

  /* Handle onboarding done — save profile + initial agent config */
  const handleOnboardDone=async(obData)=>{
    if(userId&&window.supabase){
      try{
        await window.supabase.from('profiles').upsert({id:userId,trade:obData.trade||'',service_area:obData.area||'',phone:obData.phone||'',team_size:obData.teamSize||'',services:obData.services||[]});
        await window.supabase.from('settings').upsert({id:userId,voice_id:obData.voiceId||'O7LV5fxosQChiBE7l6Wz',voice_name:obData.voiceName||'Kim',greeting:obData.greeting||"Hi, thanks for calling! I can help you with scheduling a service appointment or answer any questions. What's going on?"});
      }catch(e){console.error('Onboard save error:',e);}
    }
    setAuth("app");
  };

  /* Save profile changes */
  const handleProfileSave=async(data)=>{
    if(!userId||!window.supabase)return;
    await window.supabase.from('profiles').upsert({id:userId,...data});
    setProfile(p=>({...p,...data}));
  };

  /* Handle logout */
  const handleLogout=async()=>{
    try{await window.supabase?.auth.signOut();}catch(e){}
    setAuth("auth");setUserId(null);
  };

  if(auth==="loading")return<div className="min-h-screen flex items-center justify-center bg-neutral-50"><div className="text-center fu"><Logo s={48}/><p className="text-sm text-neutral-300 mt-6">Loading...</p></div></div>;
  if(auth==="auth")return<Auth onLogin={handleLogin} onSignup={handleSignup}/>;
  if(auth==="onboard")return<Onboarding onDone={handleOnboardDone}/>;
  return<Layout pg={pg} go={go} isNew={isNew} isDemo={isDemo} vapiKeys={vapiKeys} setVapiKeys={setVapiKeys} saveSetting={saveSetting} onLogout={handleLogout} agentCfg={agentCfg} profile={profile} onProfileSave={handleProfileSave}/>;
};
ReactDOM.render(<App/>,document.getElementById("root"));
</script>
<script>
/* ── Data loader: waits for Supabase session then populates C ── */
(async function dialiLoader(){
  /* Wait for Supabase SDK (may still be loading via ESM import) */
  const waitForSb = () => new Promise(resolve => {
    if (window.supabase) return resolve(window.supabase);
    const h = () => resolve(window.supabase);
    window.addEventListener('supabase-ready', h, {once:true});
  });
  try {
    const sb = await waitForSb();
    const sess = await sb.auth.getSession();
    if (!sess.data.session) { console.log("Diali loader: no session"); return; }
    const email = sess.data.session.user.email;
    console.log("Diali loader: fetching data for " + email);

    /* Demo user gets sample data */
    if (email === "demo@diali.com") {
      console.log("Diali loader: demo user, loading demo data");
      C = DEMO_DATA.slice();
      const root = document.getElementById("root");
      ReactDOM.unmountComponentAtNode(root);
      ReactDOM.render(React.createElement(App), root);
      return;
    }

    const [cr, lr] = await Promise.all([
      sb.from("calls").select("*").order("started_at",{ascending:false}).limit(50),
      sb.from("leads").select("*").order("created_at",{ascending:false}).limit(50),
    ]);
    const calls = cr.data||[], leads = lr.data||[];
    console.log("Diali loader: got " + calls.length + " calls, " + leads.length + " leads");

    /* No data — C is already empty, nothing to do */
    if (!calls.length && !leads.length) { console.log("Diali loader: no data yet"); return; }

    const newC = [];
    calls.forEach((call,i) => {
      const lead = leads.find(l=>l.id===call.lead_id)||{};
      const ds = call.duration_sec||0;
      let tr = [];
      if (Array.isArray(call.transcript)) tr = call.transcript.map(m=>({r:m.role==="assistant"?"ai":"caller",t:m.message||m.content||""}));
      newC.push({
        id:i+1, name:lead.customer_name||"Unknown Caller",
        ph:lead.customer_phone||call.from_number||"Unknown",
        addr:lead.customer_address||"",
        time:call.started_at?new Date(call.started_at).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"}):"",
        dur:Math.floor(ds/60)+":"+String(ds%60).padStart(2,"0"),
        issue:lead.issue||call.summary||"No description",
        urg:lead.urgency||"normal", status:lead.status||"new",
        booked:"", src:lead.source||"Phone", rev:0, conf:75,
        score:lead.status==="won"?"hot":"warm", tr:tr, notes:lead.notes||"", sms:[]
      });
    });
    const usedIds = calls.map(c=>c.lead_id).filter(Boolean);
    leads.filter(l=>!usedIds.includes(l.id)).forEach(lead=>{
      newC.push({
        id:newC.length+1, name:lead.customer_name||"Unknown",
        ph:lead.customer_phone||"", addr:lead.customer_address||"",
        time:lead.created_at?new Date(lead.created_at).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"}):"",
        dur:"0:00", issue:lead.issue||"No description",
        urg:lead.urgency||"normal", status:lead.status||"new",
        booked:"", src:lead.source||"Phone", rev:0, conf:70,
        score:"warm", tr:[], notes:lead.notes||"", sms:[]
      });
    });
    console.log("Diali loader: loaded " + newC.length + " real entries");
    C = newC;
    const root = document.getElementById("root");
    ReactDOM.unmountComponentAtNode(root);
    ReactDOM.render(React.createElement(App), root);
  } catch(e) { console.error("Diali loader:", e); }
})();
</script>
</body>
