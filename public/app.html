    <label className="text-sm text-neutral-600 mb-2 block flex items-center gap-1.5">
      {label}{required&&<span className="text-neutral-300">*</span>}
    </label>
    {children}
    {hint&&<p className="text-xs text-neutral-400 mt-1.5 leading-relaxed">{hint}</p>}
  </div>
);

/* Info field — for displaying labeled data in detail panels */
const IF=({label,value,icon,large})=>(
  <div className={large?"":"py-2"}>
    <p className="text-xs text-neutral-400 uppercase tracking-widest mb-1">{label}</p>
    <div className="flex items-center gap-2">
      {icon&&<span className="w-4 h-4 text-neutral-300 shrink-0">{icon}</span>}
      <p className={"text-neutral-900 "+(large?"text-2xl tracking-tight":"text-sm")}>{value||"—"}</p>
    </div>
  </div>
);

/* Section title — replaces SL in panels for better visual weight */
const ST=({icon,title,count,right,className=""})=>(
  <div className={"flex items-center justify-between mb-3 "+className}>
    <div className="flex items-center gap-2">
      {icon&&<span className="w-4 h-4 text-neutral-400">{icon}</span>}
      <p className="text-sm text-neutral-600 uppercase tracking-widest">{title}</p>
      {count!=null&&<span className="text-xs text-neutral-300 ml-1">({count})</span>}
    </div>
    {right}
  </div>
);

/* Info grid — structured 2-col or 3-col data display */
const IG=({items,cols=2})=>(
  <div className={"grid gap-px bg-neutral-100 border border-neutral-100 grid-cols-"+cols}>
    {items.map(([l,v],i)=>(
      <div key={i} className="bg-white px-4 py-3">
        <p className="text-xs text-neutral-400 mb-0.5">{l}</p>
        <p className="text-sm text-neutral-900 capitalize">{v||"—"}</p>
      </div>
    ))}
  </div>
);

/* Toast notification — appears after save actions */
const Toast=({message,visible})=>visible?portal(
  <div className="fixed bottom-6 left-1/2 -translate-x-1/2 bg-neutral-900 text-white px-6 py-3 text-sm flex items-center gap-2.5 shadow-lg fi" style={{zIndex:99999}}>
    <span className="w-4 h-4">{I.check}</span>{message}
  </div>
):null;

/* Styled text input — consistent height and hover/focus states */
const TI=({...props})=><input {...props} className={"w-full border border-neutral-200 px-4 py-3 text-sm hover:border-neutral-300 focus:border-neutral-900 transition-colors "+(props.className||"")}/>;

/* Styled textarea — consistent styling */
const TA=({...props})=><textarea {...props} className={"w-full border border-neutral-200 px-4 py-3 text-sm hover:border-neutral-300 focus:border-neutral-900 transition-colors leading-relaxed "+(props.className||"")}/>;

/* Styled select */
const SE=({...props})=><select {...props} className={"w-full border border-neutral-200 px-4 py-3 text-sm bg-white hover:border-neutral-300 focus:border-neutral-900 transition-colors "+(props.className||"")}/>;

/* Form section divider with optional label */
const FD=({label})=>label?<div className="flex items-center gap-3 pt-2"><div className="h-px bg-neutral-100 flex-1"/><span className="text-xs text-neutral-300 uppercase tracking-widest shrink-0">{label}</span><div className="h-px bg-neutral-100 flex-1"/></div>:<div className="h-px bg-neutral-100"/>;

const HomeCallDetail=({c,actions,onClose,checkedActions,toggleAction})=>{

  const[showRec,setShowRec]=useState(false);
  return<>
    <PanelHeader onClose={onClose} title={c.name} sub={c.ph} right={<Bg s={c.status}/>}/>
    <div className="flex-1 overflow-y-auto px-7 py-6 space-y-6">
      <p className="text-sm text-neutral-700 leading-relaxed">{c.issue}</p>
      {c.addr&&<div className="flex items-start gap-3"><span className="w-4 h-4 text-neutral-300 mt-0.5 shrink-0">{I.map}</span><p className="text-sm text-neutral-700">{c.addr}</p></div>}
      {c.booked&&<div className="bg-neutral-900 px-5 py-4 flex items-center gap-4"><div className="w-10 h-10 bg-white/10 flex items-center justify-center shrink-0"><span className="w-4 h-4 text-white">{I.cal}</span></div><div className="flex-1"><p className="text-white">{c.booked}</p><p className="text-xs text-neutral-500 mt-0.5">Scheduled</p></div></div>}
      <IG items={[["Revenue",c.rev?"$"+c.rev.toLocaleString():"—"],["Source",c.src],["Duration",c.dur],["Confidence",c.conf+"%"]]} cols={2}/>

      {c.notes&&c.notes!=="—"&&<div><ST icon={I.msg} title="Notes"/><p className="text-sm text-neutral-600 leading-relaxed">{c.notes}</p></div>}
      <Sec open={showRec} onToggle={()=>setShowRec(!showRec)} title="Call recording">
        <div className="p-5">

            <audio controls preload="none" src={c.rec} className="w-full" style={{colorScheme:"light"}}/>

                <p className="text-sm text-neutral-700">No recording available</p>

          {c.tr?.length?c.tr.map((m,i)=>(
            <div key={i} className={"flex gap-2.5 "+(m.r==="ai"?"":"justify-end")}>

            </div>

    <div className="px-7 py-5 border-t border-neutral-100 shrink-0 flex gap-3">

    </div>

            <Sec open={showNotes} onToggle={()=>setShowNotes(!showNotes)} title="Notes"><div className="p-5"><p className="text-sm text-neutral-600 bg-neutral-50 p-4 mb-4 leading-relaxed">{sel.notes}</p><textarea value={noteText} onChange={e=>setNoteText(e.target.value)} placeholder="Add a note..." rows={2} className="w-full border border-neutral-200 p-4 text-sm mb-3"/><button onClick={()=>{if(noteText.trim()&&sel){const updated=sel.notes&&sel.notes!=="—"?sel.notes+"\n"+noteText.trim():noteText.trim();setCalls(p=>p.map(c=>c.id===sel.id?{...c,notes:updated}:c));setSel(prev=>({...prev,notes:updated}));setNoteText("");}}} className="text-sm px-5 py-2.5 bg-neutral-900 text-white hover:bg-black transition-colors">Save note</button></div></Sec>
            <div className="flex gap-3 pt-2"><button className="flex-1 bg-neutral-900 text-white py-3.5 text-sm hover:bg-black transition-colors flex items-center justify-center gap-2"><span className="w-4 h-4">{I.phone}</span>Call back</button><button className="flex-1 border border-neutral-200 text-neutral-600 py-3.5 text-sm hover:bg-neutral-50 transition-colors flex items-center justify-center gap-2"><span className="w-4 h-4">{I.msg}</span>Send SMS</button></div>

};

/* ══════════════════ JOBS ══════════════════ */
const Jobs=()=>{
  const[view,setView]=useState("board");
  const[panel,setPanel]=useState(null);
  const[selJob,setSelJob]=useState(null);
  const[loadedReal,setLoadedReal]=useState(false);
  const[jobs,setJobs]=useState([]);
  /* Load real appointments from Supabase. Any authenticated user gets real
     data (even if empty — they'll see the empty state). Demo seed is only
     shown to unauthenticated / demo users. */
  React.useEffect(()=>{
    let stop=false;
    (async()=>{
      try{
        const sess=await window.supabase.auth.getSession();
        const uid=sess?.data?.session?.user?.id;
        if(!uid)return;
        const{data,error}=await window.supabase
          .from("appointments")
          .select("id,starts_at,ends_at,title,location,notes,status,quote_id,tech,revenue_estimate,progress_pct,checklist,checklist_done,parts,tech_notes,confirmed_at,invoice_sent_at,invoice_paid_at,invoice_amount,invoice_line_items,invoice_tax_pct,invoice_notes,leads(customer_name,customer_phone,customer_address,issue,urgency,source,status)")
          .eq("user_id",uid)
          .order("starts_at",{ascending:false})
          .limit(200);
        if(stop||error)return;
        /* Always mark real for authenticated users — even with 0 rows.
           This ensures persistJob / create-job / pricebook writes go to Supabase. */
        setLoadedReal(true);
        if(data&&data.length>0){setJobs(data.map(apptToJob));}
        else{setJobs([]);}
      }catch(e){console.warn("jobs load:",e.message);}
    })();
    return()=>{stop=true;};
  },[]);
  /* Lazy-load the call linked to the selected appointment (transcript,
     recording, summary, urgency, source) — only fetched when a panel opens. */
  const[callCtx,setCallCtx]=useState(null);
  const[ctxLoading,setCtxLoading]=useState(false);
  React.useEffect(()=>{
    if(!selJob){setCallCtx(null);return;}
    setCtxLoading(true);
    (async()=>{
      try{
        const sess=await window.supabase.auth.getSession();
        const uid=sess?.data?.session?.user?.id;
        if(!uid){setCtxLoading(false);return;}
        const{data:appt}=await window.supabase
          .from("appointments")
          .select("lead_id,leads(urgency,source,issue,customer_email)")
          .eq("id",selJob.id)
          .maybeSingle();
        let call=null;
        if(appt?.lead_id){
          const{data}=await window.supabase
            .from("calls")
            .select("id,summary,recording_url,transcript,duration_sec,started_at")
            .eq("user_id",uid)
            .eq("lead_id",appt.lead_id)
            .order("started_at",{ascending:false})
            .limit(1)
            .maybeSingle();
          call=data;
        }
        setCallCtx({
          call,
          urgency:appt?.leads?.urgency||"normal",
          source:appt?.leads?.source||"phone",
          email:appt?.leads?.customer_email||"",
          summary:call?.summary||appt?.leads?.issue||""
        });
      }catch(e){console.warn("call ctx:",e.message);}
      setCtxLoading(false);
    })();
  },[selJob?.id]);
  /* Reschedule + decline + invoice state for the detail panel */
  const[reschedDate,setReschedDate]=useState("");
  const[reschedTime,setReschedTime]=useState("");
  const[reschedOpen,setReschedOpen]=useState(false);
  const[declineConfirm,setDeclineConfirm]=useState(false);
  /* Invoice review mode — when active, the panel body shows the editable
     invoice instead of the job summary. */
  const[invoiceReview,setInvoiceReview]=useState(false);
  const[invLines,setInvLines]=useState([]);
  const[invTax,setInvTax]=useState(0);
  const[invNotes,setInvNotes]=useState("");
  React.useEffect(()=>{setReschedOpen(false);setDeclineConfirm(false);setInvoiceReview(false);},[selJob?.id]);
  /* When user opens invoice review, seed the line items from:
     1. Existing invoice (if already sent) → editable copy
     2. Linked quote (if exists) → use its line items
     3. Fallback: single line for the job's revenue_estimate */
  const openInvoiceReview=async()=>{
    if(!selJob)return;
    let lines=[],tax=0,notes="";
    if(selJob.invoice_line_items&&selJob.invoice_line_items.length>0){
      lines=selJob.invoice_line_items;tax=selJob.invoice_tax_pct||0;notes=selJob.invoice_notes||"";
    }else{
      try{
        const sess=await window.supabase.auth.getSession();
        const uid=sess?.data?.session?.user?.id;
        if(uid){
          /* Try the linked quote first */
          const{data:appt}=await window.supabase.from("appointments").select("lead_id,quote_id").eq("id",selJob.id).maybeSingle();
          let quote=null;
          if(appt?.quote_id){
            const{data}=await window.supabase.from("quotes").select("*").eq("id",appt.quote_id).maybeSingle();
            quote=data;
          }else if(appt?.lead_id){
            const{data}=await window.supabase.from("quotes").select("*").eq("user_id",uid).eq("lead_id",appt.lead_id).order("created_at",{ascending:false}).limit(1).maybeSingle();
            quote=data;
          }
          if(quote&&Array.isArray(quote.line_items)&&quote.line_items.length>0){
            lines=quote.line_items.map(l=>({
              description:l.description||l.desc||"Service",
              qty:Number(l.qty)||1,
              rate:Number(l.rate)||0,
              amount:(Number(l.qty)||1)*(Number(l.rate)||0)
            }));
          }
        }
      }catch(e){console.warn("invoice seed:",e.message);}
    }
    if(lines.length===0){
      lines=[{description:selJob.issue||"Service call",qty:1,rate:selJob.rev||0,amount:selJob.rev||0}];
    }
    setInvLines(lines);setInvTax(tax);setInvNotes(notes);setInvoiceReview(true);
  };
  const updateInvLine=(idx,field,val)=>setInvLines(prev=>prev.map((l,i)=>{
    if(i!==idx)return l;
    const v=field==="description"?val:(parseFloat(val)||0);
    const updated={...l,[field]:v};
    updated.amount=(updated.qty||0)*(updated.rate||0);
    return updated;
  }));
  const addInvLine=()=>setInvLines(p=>[...p,{description:"",qty:1,rate:0,amount:0}]);
  const rmInvLine=(idx)=>setInvLines(p=>p.filter((_,i)=>i!==idx));
  const invSubtotal=invLines.reduce((a,l)=>a+(l.amount||0),0);
  const invTaxAmt=Math.round(invSubtotal*(invTax/100)*100)/100;
  const invTotal=invSubtotal+invTaxAmt;
  /* Send invoice — persist line items + amount + advance to Invoiced */
  const sendInvoice=async()=>{
    if(!selJob||invLines.length===0)return;
    const now=new Date().toISOString();
    const patch={
      invoice_sent_at:now,
      invoice_amount:invTotal,
      invoice_line_items:invLines,
      invoice_tax_pct:invTax,
      invoice_notes:invNotes
    };
    persistJob(selJob.id,patch);
    setJobs(p=>p.map(j=>j.id===selJob.id?{...j,invoiced_at:now,invoice_amount:invTotal,invoice_line_items:invLines,invoice_tax_pct:invTax,invoice_notes:invNotes}:j));
    setInvoiceReview(false);
    setSelJob(null);
  };
  const reschedule=async()=>{
    if(!reschedDate||!reschedTime||!selJob)return;
    const newStart=new Date(reschedDate+"T"+reschedTime).toISOString();
    const dur=2*3600*1000; /* 2hr default */
    const newEnd=new Date(new Date(newStart).getTime()+dur).toISOString();
    persistJob(selJob.id,{starts_at:newStart,ends_at:newEnd,confirmed_at:new Date().toISOString()});
    setJobs(p=>p.map(j=>j.id===selJob.id?{...j,starts_at:newStart,confirmed_at:new Date().toISOString(),day:humanDay(new Date(newStart)),time:fmtTime12(new Date(newStart))}:j));
    setReschedOpen(false);
    setSelJob(null);
  };
  const decline=async()=>{
    if(!selJob)return;
    persistJob(selJob.id,{status:"canceled"});
    setJobs(p=>p.filter(j=>j.id!==selJob.id));
    setSelJob(null);
  };
  const updateTech=(t)=>{
    if(!selJob)return;
    setJobs(p=>p.map(j=>j.id===selJob.id?{...j,tech:t}:j));
    setSelJob(prev=>({...prev,tech:t}));
    persistJob(selJob.id,{tech:t});
  };
  /* Persist a single field change back to the appointments table.
     Always attempts the write for authenticated users — even if they have 0
     existing appointments (loadedReal covers that now). */
  const persistJob=async(id,patch)=>{
    try{
      const sess=await window.supabase.auth.getSession();
      if(!sess?.data?.session?.user?.id)return;
      await window.supabase.from("appointments").update(patch).eq("id",id);
    }catch(e){console.warn("job persist:",e.message);}
  };
  /* Transition a job to the next pipeline stage.
     Updates both local state and the appointments row. */
  const advanceStage=(j,nextStage)=>{
    const now=new Date().toISOString();
    let dbPatch={},localPatch={};
    if(nextStage==="Confirmed"){dbPatch={confirmed_at:now};localPatch={confirmed_at:now};}
    else if(nextStage==="In Progress"){dbPatch={progress_pct:50};localPatch={pct:50};}
    else if(nextStage==="Completed"){dbPatch={status:"completed",progress_pct:100};localPatch={st:"Completed",pct:100};}
    else if(nextStage==="Invoiced"){const amt=j.rev||0;dbPatch={invoice_sent_at:now,invoice_amount:amt};localPatch={invoiced_at:now,invoice_amount:amt};}
    else if(nextStage==="Paid"){dbPatch={invoice_paid_at:now};localPatch={paid_at:now};}
    setJobs(p=>p.map(x=>x.id===j.id?{...x,...localPatch}:x));
    persistJob(j.id,dbPatch);
  };
  const totalRev=jobs.reduce((a,j)=>a+j.rev,0);
  /* Manual job entry — mirrors what the AI captures on a real call so Diali's
     pipeline stays consistent regardless of how the job was created. */
  const newJobBlank={cust:"",ph:"",email:"",addr:"",category:"hvac",urgency:"normal",issue:"",date:"",time:"",duration:"2",tech:"Unassigned",rev:"",source:"phone",notes:""};
  const[newJob,setNewJob]=useState(newJobBlank);
  const[filter,setFilter]=useState("all");
  const[hovered,setHovered]=useState(null);
  /* Same freshness bucket as Leads — parse human time strings */
  const dayBucket=(d="")=>{
    const s=(d||"").toLowerCase();
    if(s==="today")return "today";
    if(s==="tomorrow")return "week";
    if(s==="yesterday")return "past";
    if(["monday","tuesday","wednesday","thursday","friday","saturday","sunday"].includes(s))return "week";
    if(s.includes("day ago")||s.includes("days ago"))return "past";
    return "week";
  };
  const passes=(j)=>{
    if(filter==="all")return true;
    if(filter==="today")return dayBucket(j.day)==="today";
    if(filter==="week"){const b=dayBucket(j.day);return b==="today"||b==="week";}
    if(filter==="unassigned")return !j.tech||j.tech==="—";
    if(filter==="progress")return j.pct>0&&j.pct<100;
    return true;
  };
  const live=jobs.filter(passes);
  /* 7-stage pipeline: every job's current stage derived from its timestamps.
     This replaces the old 3-column Confirmed/Quote/Completed layout. */
  const stagedLive=live.map(j=>({...j,stage:jobStage(j)}));
  const cols=Object.fromEntries(STAGES.map(s=>[s,stagedLive.filter(j=>j.stage===s)]));
  /* Metrics — headline numbers the contractor cares about */
  const todayJobs=stagedLive.filter(j=>j.stage==="Today"||(j.stage==="In Progress"&&dayBucket(j.day)==="today"));
  const todayRev=todayJobs.reduce((a,j)=>a+j.rev,0);
  const pipelineRev=stagedLive.filter(j=>j.stage!=="Paid"&&j.stage!=="Completed").reduce((a,j)=>a+j.rev,0);
  const awaitingPayment=stagedLive.filter(j=>j.stage==="Invoiced").reduce((a,j)=>a+(j.invoice_amount||j.rev||0),0);
  const paidRev=stagedLive.filter(j=>j.stage==="Paid").reduce((a,j)=>a+(j.invoice_amount||j.rev||0),0);
  const activeJobs=stagedLive.filter(j=>j.stage!=="Paid"&&j.stage!=="Completed").length;
  return(
    <div className="fu">
      {/* New job panel — captures everything Diali captures on a real call,
          so manually-created jobs sit in the same pipeline with no missing data. */}
      <Panel open={panel==="newjob"} onClose={()=>setPanel(null)}>
        <PanelHeader onClose={()=>setPanel(null)} title="Create new job" sub="Manual entry — same fields Diali captures on a call"/>
        <div className="flex-1 overflow-y-auto px-7 py-6 space-y-5">

          {/* Customer */}
          <FD label="Customer"/>
          <FF label="Full name" required><TI type="text" value={newJob.cust} onChange={e=>setNewJob({...newJob,cust:e.target.value})} placeholder="e.g. Sarah Mitchell"/></FF>
          <div className="grid grid-cols-2 gap-3">
            <FF label="Phone" required><TI type="tel" value={newJob.ph} onChange={e=>setNewJob({...newJob,ph:e.target.value})} placeholder="(555) 000-0000"/></FF>
            <FF label="Email" hint="For invoice delivery"><TI type="email" value={newJob.email} onChange={e=>setNewJob({...newJob,email:e.target.value})} placeholder="customer@email.com"/></FF>
          </div>
          <FF label="Service address"><TI type="text" value={newJob.addr} onChange={e=>setNewJob({...newJob,addr:e.target.value})} placeholder="Street, city, state"/></FF>

          {/* The job */}
          <FD label="The job"/>
          <div className="grid grid-cols-2 gap-3">
            <FF label="Service type">
              <SE value={newJob.category} onChange={e=>setNewJob({...newJob,category:e.target.value})}>
                <option value="hvac">HVAC</option>
                <option value="plumbing">Plumbing</option>
                <option value="electrical">Electrical</option>
                <option value="roofing">Roofing</option>
                <option value="general">General</option>
              </SE>
            </FF>
            <FF label="Urgency">
              <SE value={newJob.urgency} onChange={e=>setNewJob({...newJob,urgency:e.target.value})}>
                <option value="normal">Standard</option>
                <option value="urgent">Urgent</option>
                <option value="emergency">Emergency</option>
              </SE>
            </FF>
          </div>
          <FF label="What's the issue?" hint="Specifics save the tech a trip — equipment type, symptoms, when it started"><TA rows={3} value={newJob.issue} onChange={e=>setNewJob({...newJob,issue:e.target.value})} placeholder="e.g. AC unit not cooling — started yesterday morning, blowing warm air, unit is 8 years old"/></FF>

          {/* Schedule */}
          <FD label="Schedule"/>
          <div className="grid grid-cols-3 gap-3">
            <FF label="Date" required><TI type="date" value={newJob.date} onChange={e=>setNewJob({...newJob,date:e.target.value})}/></FF>
            <FF label="Start time" required><TI type="time" value={newJob.time} onChange={e=>setNewJob({...newJob,time:e.target.value})}/></FF>
            <FF label="Duration">
              <SE value={newJob.duration} onChange={e=>setNewJob({...newJob,duration:e.target.value})}>
                <option value="0.5">30 min</option>
                <option value="1">1 hour</option>
                <option value="2">2 hours</option>
                <option value="3">3 hours</option>
                <option value="4">4 hours</option>
                <option value="8">Full day</option>
              </SE>
            </FF>
          </div>

          {/* Assignment */}
          <FD label="Assignment & value"/>
          <div className="grid grid-cols-2 gap-3">
            <FF label="Assign to">
              <SE value={newJob.tech} onChange={e=>setNewJob({...newJob,tech:e.target.value})}>
                <option>Unassigned</option>
                <option>You</option>
                <option>John S.</option>
                <option>Mike T.</option>
              </SE>
            </FF>
            <FF label="Revenue estimate" hint="What you expect to bill"><TI type="number" value={newJob.rev} onChange={e=>setNewJob({...newJob,rev:e.target.value})} placeholder="0"/></FF>
          </div>
          <FF label="Source" hint="How did this customer find you?">
            <SE value={newJob.source} onChange={e=>setNewJob({...newJob,source:e.target.value})}>
              <option value="phone">Phone (manual)</option>
              <option value="walk-in">Walk-in</option>
              <option value="referral">Referral</option>
              <option value="repeat">Repeat customer</option>
              <option value="web">Website / form</option>
              <option value="other">Other</option>
            </SE>
          </FF>

          {/* Internal notes */}
          <FD label="Internal notes"/>
          <FF label="Notes for the tech" hint="Anything they should know — gate code, dog, parking, customer preferences"><TA rows={2} value={newJob.notes} onChange={e=>setNewJob({...newJob,notes:e.target.value})} placeholder="Customer asked for tech to call 15 min before arrival..."/></FF>
        </div>
        <div className="px-7 py-5 border-t border-neutral-100 shrink-0">
          <button
            onClick={async()=>{
              if(!newJob.cust||!newJob.ph||!newJob.date||!newJob.time)return;
              const startsAt=new Date(newJob.date+"T"+newJob.time).toISOString();
              const dur=parseFloat(newJob.duration||"2")*3600*1000;
              const endsAt=new Date(new Date(startsAt).getTime()+dur).toISOString();
              /* Persist to Supabase if we're a real (loaded) tenant; otherwise local-only demo */
              try{
                const sess=await window.supabase.auth.getSession();
                const uid=sess?.data?.session?.user?.id;
                if(uid){
                  /* Create the lead first */
                  const{data:lead,error:le}=await window.supabase.from("leads").insert({
                    user_id:uid,
                    customer_name:newJob.cust,
                    customer_phone:newJob.ph,
                    customer_email:newJob.email||null,
                    customer_address:newJob.addr||null,
                    issue:newJob.issue||null,
                    category:newJob.category,
                    urgency:newJob.urgency,
                    source:newJob.source,
                    status:"scheduled",
                    notes:newJob.notes||null
                  }).select().single();
                  if(le)throw le;
                  /* Then the appointment, pre-confirmed (manual entries skip the New stage) */
                  const{data:appt,error:ae}=await window.supabase.from("appointments").insert({
                    user_id:uid,
                    lead_id:lead.id,
                    starts_at:startsAt,
                    ends_at:endsAt,
                    title:`${newJob.cust} — ${newJob.issue||"Service call"}`.slice(0,120),
                    location:newJob.addr||"",
                    notes:newJob.issue||"",
                    status:"scheduled",
                    confirmed_at:new Date().toISOString(),
                    tech:newJob.tech,
                    revenue_estimate:parseFloat(newJob.rev)||0,
                    tech_notes:newJob.notes||null
                  }).select().single();
                  if(ae)throw ae;
                  /* Add to local state with the real DB ID */
                  setJobs(p=>[apptToJob({...appt,leads:lead}),...p]);
                  setLoadedReal(true);
                }else{
                  /* Demo / unauth fallback */
                  const nj={id:Date.now(),starts_at:startsAt,day:humanDay(new Date(startsAt)),time:fmtTime12(new Date(startsAt)),cust:newJob.cust,ph:newJob.ph,addr:newJob.addr,issue:newJob.issue,tech:newJob.tech,rev:parseFloat(newJob.rev)||0,st:"Confirmed",pct:0,checklist:[],parts:[],notes:newJob.notes||"",confirmed_at:new Date().toISOString()};
                  setJobs(p=>[nj,...p]);
                }
              }catch(e){
                console.error("create job:",e);
                alert("Couldn't save: "+(e.message||e));
                return;
              }
              setNewJob(newJobBlank);
              setPanel(null);
            }}
            className="w-full bg-neutral-900 text-white py-3 text-sm hover:bg-black transition-colors">Create job</button>
        </div>
      </Panel>

      {/* Job detail panel — stage-aware decision view.
          For unconfirmed jobs (New stage), this shows everything the operator
          needs to confirm or reschedule the AI's request: customer info, when
          they want to come, what they need, what the AI heard, and what it
          quoted. For later stages, the panel tightens to the relevant info. */}
      <Panel open={!!selJob} onClose={()=>setSelJob(null)}>
        {selJob&&(()=>{
          const stage=jobStage(selJob);
          const isNew=stage==="New";

          const done=stage==="Completed"||stage==="Invoiced"||stage==="Paid";
          const urgency=callCtx?.urgency||"normal";
          const urgencyLabel=urgency==="emergency"?"Emergency":urgency==="urgent"?"Urgent":"Standard";
          return(
          <>
            <PanelHeader
              onClose={()=>setSelJob(null)}
              title={selJob.cust}
              sub={selJob.ph||"No phone"}
              right={<span className={"text-xs px-3 py-1 uppercase tracking-widest "+(isNew?"bg-neutral-900 text-white":done?"bg-neutral-100 text-neutral-500":"bg-neutral-200 text-neutral-700")}>{stage}</span>}
            />
            <div className="flex-1 overflow-y-auto px-7 py-6 space-y-6">

              {/* INVOICE REVIEW MODE — replaces the rest of the panel body */}

                <div className="bg-neutral-900 px-5 py-4">
                  <div className="flex items-center gap-2 mb-2">
                    <span className="w-3.5 h-3.5 text-neutral-400">{I.dollar}</span>
                    <p className="text-xs text-neutral-400 uppercase tracking-widest">Review invoice</p>
                  </div>
                  <p className="text-sm text-white leading-relaxed">Customer pays ${invTotal.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}. Edit any line, then send.</p>
                </div>

                <div className="border border-neutral-100 p-5">

                  {selJob.ph&&<p className="text-xs text-neutral-400 mt-0.5">{selJob.ph}</p>}
                  {selJob.addr&&<p className="text-xs text-neutral-400 mt-0.5">{selJob.addr}</p>}
                  {callCtx?.email&&<p className="text-xs text-neutral-400 mt-0.5">{callCtx.email}</p>}
                </div>

                {/* Line items — editable */}
                <div>
                  <ST icon={I.dollar} title="Line items" count={invLines.length}/>
                  <div className="border border-neutral-200">
                    <div className="grid gap-2 px-4 py-2.5 bg-neutral-50 border-b border-neutral-200" style={{gridTemplateColumns:"1fr 56px 80px 80px 28px"}}>
                      <span className="text-[10px] text-neutral-400 uppercase tracking-widest">Description</span>
                      <span className="text-[10px] text-neutral-400 uppercase tracking-widest text-right">Qty</span>
                      <span className="text-[10px] text-neutral-400 uppercase tracking-widest text-right">Rate</span>
                      <span className="text-[10px] text-neutral-400 uppercase tracking-widest text-right">Total</span>
                      <span/>
                    </div>
                    {invLines.map((it,i)=>(
                      <div key={i} className="grid gap-2 px-4 py-3 border-b border-neutral-100 last:border-0 items-center group" style={{gridTemplateColumns:"1fr 56px 80px 80px 28px"}}>
                        <input value={it.description} onChange={e=>updateInvLine(i,"description",e.target.value)} placeholder="Description" className="text-sm text-neutral-700 border-0 bg-transparent p-0 w-full focus:outline-none"/>
                        <input value={it.qty} onChange={e=>updateInvLine(i,"qty",e.target.value)} type="number" min="0" step="0.5" className="text-sm text-neutral-500 text-right tabular-nums border-0 bg-transparent p-0 w-full focus:outline-none"/>
                        <input value={it.rate} onChange={e=>updateInvLine(i,"rate",e.target.value)} type="number" min="0" className="text-sm text-neutral-500 text-right tabular-nums border-0 bg-transparent p-0 w-full focus:outline-none"/>
                        <span className="text-sm text-neutral-900 text-right tabular-nums">${(it.amount||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</span>
                        <button onClick={()=>rmInvLine(i)} className="w-5 h-5 text-neutral-200 hover:text-neutral-900 opacity-0 group-hover:opacity-100 transition-all flex items-center justify-center">{I.x}</button>
                      </div>
                    ))}
                  </div>
                  <button onClick={addInvLine} className="flex items-center gap-1.5 text-xs text-neutral-400 hover:text-neutral-900 transition-colors mt-3"><span className="w-3.5 h-3.5">{I.plus}</span>Add line item</button>
                </div>

                {/* Pricing — tax + totals */}
                <div className="border border-neutral-200">
                  <div className="bg-white p-4 border-b border-neutral-200">
                    <div className="flex items-center justify-between">
                      <p className="text-xs text-neutral-400">Tax rate %</p>
                      <input value={invTax} onChange={e=>setInvTax(parseFloat(e.target.value)||0)} type="number" min="0" step="0.1" className="text-sm tabular-nums text-right border-0 bg-transparent p-0 focus:outline-none w-20"/>
                    </div>
                  </div>
                  <div className="bg-neutral-50 p-5 space-y-2">
                    <div className="flex items-center justify-between"><span className="text-sm text-neutral-500">Subtotal</span><span className="text-sm text-neutral-900 tabular-nums">${invSubtotal.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</span></div>
                    {invTax>0&&<div className="flex items-center justify-between"><span className="text-sm text-neutral-500">Tax ({invTax}%)</span><span className="text-sm text-neutral-900 tabular-nums">${invTaxAmt.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</span></div>}
                    <div className="h-px bg-neutral-200 my-3"/>
                    <div className="flex items-center justify-between"><span className="text-sm text-neutral-900 uppercase tracking-widest">Total due</span><span className="text-2xl text-neutral-900 tabular-nums tracking-tight">${invTotal.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</span></div>
                  </div>
                </div>

                {/* Notes */}
                <FF label="Notes / payment terms" hint="Optional — shown on the invoice"><TA value={invNotes} onChange={e=>setInvNotes(e.target.value)} rows={2} placeholder="Payment due within 30 days. Thank you for your business."/></FF>
              </>}

              {/* For NEW jobs — top callout that this is an AI request awaiting decision */}
              {!invoiceReview&&isNew&&<div className="bg-neutral-900 px-5 py-4">
                <div className="flex items-center gap-2 mb-2">
                  <span className="w-3.5 h-3.5 text-neutral-400">{I.zap}</span>
                  <p className="text-xs text-neutral-400 uppercase tracking-widest">Diali wants to book</p>
                </div>
                <p className="text-sm text-white leading-relaxed">Diali took the call and proposed this appointment. Confirm to lock it in, reschedule to pick a different time, or decline if it's not a fit.</p>

              {!invoiceReview&&<>
              {/* Quick contact actions */}
              <div className="grid grid-cols-3 gap-px bg-neutral-100 border border-neutral-100">
                <a href={selJob.ph?"tel:"+selJob.ph:"#"} className="bg-white px-4 py-3 flex items-center justify-center gap-2 hover:bg-neutral-50 transition-colors text-sm text-neutral-700"><span className="w-4 h-4 text-neutral-500">{I.phone}</span>Call</a>
                <a href={selJob.ph?"sms:"+selJob.ph:"#"} className="bg-white px-4 py-3 flex items-center justify-center gap-2 hover:bg-neutral-50 transition-colors text-sm text-neutral-700"><span className="w-4 h-4 text-neutral-500">{I.msg}</span>Text</a>
                <a href={selJob.addr?"https://maps.google.com/?q="+encodeURIComponent(selJob.addr):"#"} target="_blank" rel="noreferrer" className="bg-white px-4 py-3 flex items-center justify-center gap-2 hover:bg-neutral-50 transition-colors text-sm text-neutral-700"><span className="w-4 h-4 text-neutral-500">{I.map}</span>Directions</a>
              </div>

              {/* When */}
              <div>
                <ST icon={I.cal} title="When"/>
                {!reschedOpen?(
                  <div className="bg-neutral-50 p-5 flex items-center justify-between gap-3">

                      <p className="text-base text-neutral-900">{selJob.day} · {selJob.time}</p>

                    </div>

                      const d=selJob.starts_at?new Date(selJob.starts_at):new Date();
                      setReschedDate(d.toISOString().slice(0,10));

                      <FF label="New date"><TI type="date" value={reschedDate} onChange={e=>setReschedDate(e.target.value)}/></FF>
                      <FF label="New time"><TI type="time" value={reschedTime} onChange={e=>setReschedTime(e.target.value)}/></FF>
                    </div>
                    <div className="flex gap-2">
                      <button onClick={reschedule} className="flex-1 bg-neutral-900 text-white py-2.5 text-sm hover:bg-black transition-colors">Save & confirm</button>
                      <button onClick={()=>setReschedOpen(false)} className="px-4 border border-neutral-200 py-2.5 text-sm text-neutral-500 hover:bg-neutral-50">Cancel</button>
                    </div>
                  </div>
                )}
              </div>

              {/* Where */}
              <div>
                <ST icon={I.map} title="Where"/>
                <p className="text-sm text-neutral-700 leading-relaxed">{selJob.addr||<span className="text-neutral-400">No address on file</span>}</p>
              </div>

              {/* What they need */}
              <div>
                <div className="flex items-center justify-between mb-3">
                  <ST icon={I.zap} title="What they need" className="mb-0"/>
                  {urgency!=="normal"&&<span className={"text-[10px] uppercase tracking-widest px-2 py-1 "+(urgency==="emergency"?"bg-neutral-900 text-white":"bg-neutral-200 text-neutral-700")}>{urgencyLabel}</span>}
                </div>
                <p className="text-sm text-neutral-700 leading-relaxed">{selJob.issue||callCtx?.summary||"No description"}</p>
              </div>

              {/* Money + tech */}
              <div className="grid grid-cols-2 gap-px bg-neutral-100 border border-neutral-100">
                <div className="bg-white p-5">
                  <p className="text-[10px] text-neutral-400 uppercase tracking-widest mb-2">Estimated value</p>
                  <p className="text-2xl text-neutral-900 tabular-nums tracking-tight">{selJob.rev?"$"+selJob.rev.toLocaleString():"—"}</p>
                </div>
                <div className="bg-white p-5">
                  <p className="text-[10px] text-neutral-400 uppercase tracking-widest mb-2">Assigned tech</p>
                  {done?<p className="text-sm text-neutral-700">{selJob.tech||"Unassigned"}</p>:(
                    <SE value={selJob.tech||"Unassigned"} onChange={e=>updateTech(e.target.value)} className="!px-2 !py-1.5 !text-sm">
                      <option>Unassigned</option><option>You</option><option>John S.</option><option>Mike T.</option>
                    </SE>
                  )}
                </div>
              </div>

              {/* What Diali heard — call recording + transcript + summary */}
              {(callCtx?.call||ctxLoading)&&<div>
                <ST icon={I.bot} title="What Diali heard"/>
                {ctxLoading?(
                  <p className="text-xs text-neutral-400">Loading call…</p>
                ):callCtx?.call?(
                  <div className="space-y-4">
                    {callCtx.summary&&<div className="bg-neutral-50 p-4">
                      <p className="text-xs text-neutral-400 uppercase tracking-widest mb-2">Summary</p>
                      <p className="text-sm text-neutral-700 leading-relaxed">{callCtx.summary}</p>
                    </div>}
                    {callCtx.call.recording_url&&<div>
                      <p className="text-xs text-neutral-400 uppercase tracking-widest mb-2">Recording ({callCtx.call.duration_sec?Math.floor(callCtx.call.duration_sec/60)+":"+String(callCtx.call.duration_sec%60).padStart(2,"0"):"—"})</p>

                    {Array.isArray(callCtx.call.transcript)&&callCtx.call.transcript.length>0&&<details className="border border-neutral-100">

                      <div className="p-4 space-y-2 max-h-80 overflow-y-auto">
                        {callCtx.call.transcript.map((m,i)=>{
                          const isAi=m.role==="assistant"||m.role==="bot"||m.role==="ai";
                          return <div key={i} className={"text-sm p-3 leading-relaxed "+(isAi?"bg-neutral-100 text-neutral-700 mr-12":"bg-neutral-900 text-white ml-12")}>{m.message||m.content||m.text||""}</div>;
                        })}
                      </div>
                    </details>}
                  </div>
                ):null}
              </div>}

              {(inField||done)&&selJob.checklist?.length>0&&<>
                <div className="h-px bg-neutral-100"/>
                <div>
                  <ST icon={I.check} title={`Checklist (${selJob.checklist.length})`}/>
                  {selJob.checklist.map((t,i)=><CK key={selJob.id+"-"+i} text={t} done={!!(selJob.checked&&selJob.checked[i])} onChange={v=>{const nc=[...(selJob.checked||selJob.checklist.map(()=>false))];nc[i]=v;setJobs(p=>p.map(j=>j.id===selJob.id?{...j,checked:nc}:j));setSelJob(prev=>({...prev,checked:nc}));persistJob(selJob.id,{checklist_done:nc});}}/>)}
                </div>
              </>}
              {(inField||done)&&selJob.parts?.length>0&&<>
                <div className="h-px bg-neutral-100"/>
                <div><ST icon={I.wrench} title="Parts and materials"/><div className="flex flex-wrap gap-2">{selJob.parts.map((p,i)=>(<span key={i} className="text-xs bg-neutral-100 text-neutral-600 px-3 py-1.5">{p}</span>))}</div></div>
              </>}
              {selJob.notes&&<>
                <div className="h-px bg-neutral-100"/>
                <div><ST icon={I.msg} title="Tech notes"/><p className="text-sm text-neutral-700 leading-relaxed">{selJob.notes}</p></div>
              </>}

              {/* For Invoiced/Paid stages — show the saved invoice as read-only */}
              {(stage==="Invoiced"||stage==="Paid")&&selJob.invoice_line_items&&selJob.invoice_line_items.length>0&&<>
                <div className="h-px bg-neutral-100"/>
                <div>
                  <div className="flex items-center justify-between mb-3">
                    <ST icon={I.dollar} title={stage==="Paid"?"Receipt":"Invoice sent"} className="mb-0"/>
                    <span className={"text-[10px] uppercase tracking-widest px-2 py-1 "+(stage==="Paid"?"bg-neutral-900 text-white":"bg-neutral-200 text-neutral-700")}>{stage==="Paid"?"PAID":"OUTSTANDING"}</span>
                  </div>
                  <div className="border border-neutral-200">
                    <div className="grid gap-2 px-4 py-2.5 bg-neutral-50 border-b border-neutral-200" style={{gridTemplateColumns:"1fr 56px 80px 80px"}}>
                      <span className="text-[10px] text-neutral-400 uppercase tracking-widest">Description</span>
                      <span className="text-[10px] text-neutral-400 uppercase tracking-widest text-right">Qty</span>
                      <span className="text-[10px] text-neutral-400 uppercase tracking-widest text-right">Rate</span>
                      <span className="text-[10px] text-neutral-400 uppercase tracking-widest text-right">Total</span>
                    </div>
                    {selJob.invoice_line_items.map((it,i)=>(

const Leads=({profile,setQuoteView})=>{
  const[view,setView]=useState("board");

  const[quoteMsg,setQuoteMsg]=useState("Hi {name}, thank you for contacting us. Please find your service quote below. This estimate is valid for 30 days. Feel free to call us with any questions.");
  /* Freshness bucket from the string "time" field on each lead */
  const freshness=(t="")=>{
    const s=t.toLowerCase();
    if(s.includes("min ago")||s.includes("just now"))return "now";
    if(s.includes("hr ago")||s.includes("hour"))return "today";
    if(s.includes("am")||s.includes("pm"))return "today";
    if(s==="yesterday")return "week";
    if(s.includes("day"))return "week";
    return "older";
  };
  const isHot=(l)=>l.score==="hot"&&l.status!=="declined"&&l.status!=="booked"&&l.rev>=300&&(freshness(l.time)==="now"||freshness(l.time)==="today");
  const passes=(l)=>{
    if(filter==="all")return true;
    if(filter==="hot")return isHot(l);
    if(filter==="urgent")return l.urg==="urgent"||l.urg==="emergency";
    if(filter==="today"){const f=freshness(l.time);return f==="now"||f==="today";}
    if(filter==="week"){const f=freshness(l.time);return f!=="older";}
    return true;
  };
  const live=C.filter(l=>l.status!=="declined").filter(passes);
  const cols={
    New:live.filter(l=>l.status!=="booked"&&l.status!=="follow-up"&&!quoteSent[l.id]&&!leadDraftMeta[l.id]),
    "Followed up":live.filter(l=>l.status==="follow-up"&&!quoteSent[l.id]&&!leadDraftMeta[l.id]),
    "Quote sent":live.filter(l=>(leadDraftMeta[l.id]||quoteSent[l.id])&&l.status!=="booked"),
    Booked:live.filter(l=>l.status==="booked")
  };
  /* Metrics — pipeline excludes booked + declined (that's closed business, not pipeline) */
  const pipeline=C.filter(l=>l.status!=="declined"&&l.status!=="booked").reduce((a,l)=>a+l.rev,0);
  const hotCount=C.filter(isHot).length;
  const bookedThisWeek=C.filter(l=>l.status==="booked").length;
  const activePool=C.filter(l=>l.status!=="declined").length;
  const bookRate=activePool?Math.round(bookedThisWeek/activePool*100):0;
  const pv=C.reduce((a,c)=>a+c.rev,0);
  const timeline={1:[{t:"2:45 PM",a:"Inbound call — 4:32 duration"},{t:"2:47 PM",a:"AI booked appointment for tomorrow 2 PM"},{t:"2:48 PM",a:"SMS confirmation sent and acknowledged"}],2:[{t:"1:20 PM",a:"Inbound call — urgent furnace noise"},{t:"1:22 PM",a:"Emergency dispatch scheduled for 5 PM today"}],3:[{t:"12:15 PM",a:"Inbound call — seasonal maintenance inquiry"},{t:"12:17 PM",a:"AI sent available time slots via SMS"},{t:"—",a:"Awaiting customer response"}],4:[{t:"11:45 AM",a:"Inbound call — emergency water leak"},{t:"11:47 AM",a:"Emergency dispatch confirmed for 2:30 PM"}],6:[{t:"9:15 AM",a:"Inbound call — new build HVAC quote"},{t:"9:17 AM",a:"Quote appointment scheduled for Friday 10 AM"},{t:"—",a:"Blueprints requested from customer"}],7:[{t:"8:45 AM",a:"Inbound call — ductwork cleaning pricing"},{t:"—",a:"Quote pending — follow up today"}],9:[{t:"Yesterday",a:"Inbound call — refrigerant refill needed"},{t:"—",a:"Follow up overdue — customer waiting"}],11:[{t:"2 days ago",a:"Inbound call — 50 unit commercial bid"},{t:"2 days ago",a:"Meeting scheduled for Monday 9 AM"},{t:"—",a:"Prepare volume pricing before meeting"}],12:[{t:"3 days ago",a:"Inbound call — warranty question"},{t:"—",a:"Needs warranty lookup — follow up pending"}]};
  const nextSteps={1:"Confirm tech John S. has parts ready for tomorrow.",2:"Verify Mike T. is en route for 5 PM emergency.",3:"Send follow-up SMS with 3 available time slots this week.",4:"Check on emergency dispatch — confirm water damage assessment.",6:"Review blueprints and prepare detailed quote before Friday.",7:"Call back with ductwork cleaning estimate ($325 quoted).",9:"Call back today — customer has been waiting since yesterday.",11:"Finalize 50-unit volume pricing and prepare bid document.",12:"Look up warranty records and call Chris back with details."};

  const sendQuote=(lead)=>{
    const qid="Q-"+Date.now().toString(36).toUpperCase();
    const biz=profile?.business_name||"Your Business";
    const created=new Date().toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"});
    const expires=new Date(Date.now()+validDays*86400000).toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"});
    setQuoteView({
      qid,biz,

      sub:subtotal,discPct:disc,discAmt,taxPct:taxRate,tax,total,
      notes:qNotes,created,expires
    });
    setQuoteSent(p=>({...p,[lead.id]:true}));setQuoteOpen(null);
  };

  /* ── Quote builder state (lifted from IIFE) ── */
  const defaultLines=(leadId)=>(quoteItems[leadId]||[{desc:"Service call",qty:1,rate:95}]).map((it,i)=>({...it,key:i}));
  const[lines,setLines]=useState([]);
  const[taxRate,setTaxRate]=useState(8.2);

  const[qNotes,setQNotes]=useState("");
  const[validDays,setValidDays]=useState(30);
  React.useEffect(()=>{if(quoteOpen){setLines(defaultLines(quoteOpen.id));setTaxRate(8.2);setDisc(0);setQNotes("");setValidDays(30);}},[quoteOpen?.id]);
  const updLine=(idx,field,val)=>setLines(p=>p.map((l,i)=>i===idx?{...l,[field]:field==="desc"?val:parseFloat(val)||0}:l));
  const addLine=()=>setLines(p=>[...p,{desc:"",qty:1,rate:0,key:Date.now()}]);
  const rmLine=(idx)=>setLines(p=>p.filter((_,i)=>i!==idx));
  const subtotal=lines.reduce((a,it)=>a+(it.qty||0)*(it.rate||0),0);
  const discAmt=disc>0?Math.round(subtotal*(disc/100)):0;
  const taxable=subtotal-discAmt;

  return(

            {selLead.addr&&<div className="flex items-start gap-3"><span className="w-4 h-4 text-neutral-300 mt-0.5 shrink-0">{I.map}</span><p className="text-sm text-neutral-700">{selLead.addr}</p></div>}
            <div className="h-px bg-neutral-100"/>
            {timeline[selLead.id]&&<div><ST icon={I.clock} title="Activity"/><div className="relative ml-3"><div className="absolute left-0 top-2 bottom-2 w-px bg-neutral-200"/>{timeline[selLead.id].map((e,i)=>(<div key={i} className="flex items-start gap-4 py-2.5 relative"><div className={"w-2 h-2 shrink-0 mt-1.5 relative z-10 -ml-[3.5px] "+(e.t==="—"?"bg-neutral-300":"bg-neutral-900")}/><div className="flex-1 min-w-0"><p className="text-sm text-neutral-700">{e.a}</p><p className="text-xs text-neutral-400 mt-0.5">{e.t}</p></div></div>))}</div></div>}
            <div className="h-px bg-neutral-100"/>
            {nextSteps[selLead.id]&&<div className="bg-neutral-900 p-5"><div className="flex items-center gap-2 mb-2"><span className="w-3.5 h-3.5 text-neutral-500">{I.zap}</span><p className="text-xs text-neutral-400 uppercase tracking-widest">AI next step</p></div><p className="text-sm text-white leading-relaxed">{nextSteps[selLead.id]}</p></div>}
            {leadDraftMeta[selLead.id]&&!quoteSent[selLead.id]&&<div className="border border-neutral-900">
              <div className="bg-neutral-900 px-5 py-3 flex items-center gap-2"><span className="w-3.5 h-3.5 text-neutral-500">{I.zap}</span><p className="text-xs text-neutral-400 uppercase tracking-widest flex-1">Draft quote ready</p><span className="text-[10px] text-neutral-400">Drafted {leadDraftMeta[selLead.id].draftedAt}</span></div>
              <div className="p-5 space-y-3">
                <p className="text-sm text-neutral-700 leading-relaxed">Diali drafted a quote from the call transcript. <span className="text-neutral-900">{leadDraftMeta[selLead.id].matchCount} of {leadDraftMeta[selLead.id].totalLines} line items</span> were auto-matched from your pricebook.</p>
                <div className="grid grid-cols-3 gap-3 pt-2">
                  <div><p className="text-lg text-neutral-900 tabular-nums tracking-tight">{leadDraftMeta[selLead.id].matchCount}</p><p className="text-xs text-neutral-400 mt-0.5">Auto-matched</p></div>
                  <div><p className="text-lg text-neutral-900 tabular-nums tracking-tight">{leadDraftMeta[selLead.id].totalLines-leadDraftMeta[selLead.id].matchCount}</p><p className="text-xs text-neutral-400 mt-0.5">Manual added</p></div>
                  <div><p className="text-lg text-neutral-900 tabular-nums tracking-tight">{leadDraftMeta[selLead.id].conf}%</p><p className="text-xs text-neutral-400 mt-0.5">Confidence</p></div>
                </div>
              </div>
            </div>}
            {quoteSent[selLead.id]&&<div className="bg-neutral-50 p-5 flex items-center gap-3"><span className="w-5 h-5 text-neutral-900">{I.check}</span><p className="text-sm text-neutral-700">Quote sent to {selLead.ph}</p></div>}
          </div>
          <div className="px-7 py-5 border-t border-neutral-100 shrink-0 flex gap-3">
            <button onClick={()=>setSelLead(null)} className="flex-1 border border-neutral-200 py-3 text-sm text-neutral-600 hover:bg-neutral-50 transition-colors flex items-center justify-center gap-2"><span className="w-4 h-4">{I.phone}</span>Call now</button>
            <button onClick={()=>setQuoteOpen(selLead)} className="flex-1 bg-neutral-900 text-white py-3 text-sm hover:bg-black transition-colors flex items-center justify-center gap-2"><span className="w-4 h-4">{leadDraftMeta[selLead.id]&&!quoteSent[selLead.id]?I.zap:I.dollar}</span>{quoteSent[selLead.id]?"Resend quote":leadDraftMeta[selLead.id]?"Review & send draft":"Send quote"}</button>
          </div>
        </>}
      </Panel>

      {/* Quote builder panel */}
      <Panel open={!!quoteOpen} onClose={()=>setQuoteOpen(null)}>
        {quoteOpen&&<>
            <PanelHeader onClose={()=>setQuoteOpen(null)} title={leadDraftMeta[quoteOpen.id]?"Review draft quote":"Send quote"} sub={leadDraftMeta[quoteOpen.id]?"Drafted by Diali from call · "+quoteOpen.name:"For "+quoteOpen.name}/>
            <div className="flex-1 overflow-y-auto px-7 py-6 space-y-7">
              {/* Customer header with embedded AI-drafted callout */}
              <div className="border border-neutral-100">
                <div className="flex items-start gap-4 p-5">
                  <Av n={quoteOpen.name} s={44}/>
                  <div className="flex-1 min-w-0">
                    <p className="text-base text-neutral-900">{quoteOpen.name}</p>
                    <p className="text-xs text-neutral-400 mt-0.5">{quoteOpen.ph} · {quoteOpen.src}</p>
                    {quoteOpen.addr&&<p className="text-xs text-neutral-400 mt-1 flex items-center gap-1"><span className="w-3 h-3">{I.map}</span>{quoteOpen.addr}</p>}
                  </div>
                  <div className="text-right shrink-0">
                    <p className="text-[10px] text-neutral-400 uppercase tracking-widest">Quote total</p>
                    <p className="text-2xl text-neutral-900 tabular-nums tracking-tight">${total.toLocaleString()}</p>
                  </div>
                </div>
                {leadDraftMeta[quoteOpen.id]&&<div className="bg-neutral-900 px-5 py-3 flex items-center gap-3">
                  <span className="w-3.5 h-3.5 text-neutral-400 shrink-0">{I.zap}</span>
                  <p className="text-xs text-neutral-300 leading-relaxed flex-1">Diali auto-matched <span className="text-white">{lines.filter(l=>l.pbId).length} of {lines.length}</span> line items from the call — review and edit below.</p>
                  <span className="text-[10px] text-neutral-500 tabular-nums shrink-0">{leadDraftMeta[quoteOpen.id].conf}% conf.</span>
                </div>}
              </div>

              {/* Line items */}
              <div>
                <ST icon={I.dollar} title="Line items" count={lines.length} right={leadDraftMeta[quoteOpen.id]?<div className="flex items-center gap-2 text-[10px] text-neutral-400"><span className="w-2 h-2 bg-neutral-900"/>Auto-matched<span className="w-2 h-2 border border-neutral-300 ml-1"/>Manual</div>:null}/>
                <div className="border border-neutral-200">
                  <div className="grid gap-2 px-4 py-2.5 bg-neutral-50 border-b border-neutral-200" style={{gridTemplateColumns:"8px 1fr 56px 72px 72px 28px"}}>
                    <span/>
                    <span className="text-[10px] text-neutral-400 uppercase tracking-widest">Description</span>
                    <span className="text-[10px] text-neutral-400 uppercase tracking-widest text-right">Qty</span>
                    <span className="text-[10px] text-neutral-400 uppercase tracking-widest text-right">Rate</span>
                    <span className="text-[10px] text-neutral-400 uppercase tracking-widest text-right">Total</span>
                    <span/>
                  </div>
                  {lines.map((it,i)=>(
                    <div key={it.key} className="border-b border-neutral-100 last:border-0 py-3 group">
                      <div className="grid gap-2 px-4 items-center" style={{gridTemplateColumns:"8px 1fr 56px 72px 72px 28px"}}>
                        <span className={"w-1 h-6 "+(it.pbId?"bg-neutral-900":"bg-neutral-200")}/>
                        <input value={it.desc} onChange={e=>updLine(i,"desc",e.target.value)} className="text-sm text-neutral-700 border-0 bg-transparent p-0 w-full focus:outline-none" placeholder="Description..."/>
                        <input value={it.qty} onChange={e=>updLine(i,"qty",e.target.value)} className="text-sm text-neutral-500 text-right tabular-nums border-0 bg-transparent p-0 w-full focus:outline-none" type="number" min="0" step="0.5"/>
                        <input value={it.rate} onChange={e=>updLine(i,"rate",e.target.value)} className="text-sm text-neutral-500 text-right tabular-nums border-0 bg-transparent p-0 w-full focus:outline-none" type="number" min="0"/>
                        <span className="text-sm text-neutral-900 text-right tabular-nums">${((it.qty||0)*(it.rate||0)).toLocaleString()}</span>
                        <button onClick={()=>rmLine(i)} className="w-5 h-5 text-neutral-200 hover:text-neutral-900 opacity-0 group-hover:opacity-100 transition-all flex items-center justify-center">{I.x}</button>
                      </div>
                      {it.pbId&&it.matchedBy&&<div className="mt-2 px-4" style={{paddingLeft:"24px"}}>
                        <div className="flex items-center gap-2 flex-wrap">
                          <span className="flex items-center gap-1 text-[10px] text-neutral-500 bg-neutral-100 px-1.5 py-0.5"><span className="w-2.5 h-2.5">{I.zap}</span>{it.matchedBy}</span>
                          {it.matchReason&&<span className="text-[10px] text-neutral-400">matched {it.matchReason}</span>}
                          {it.confidence&&<span className={"text-[10px] "+(it.confidence==="high"?"text-neutral-600":it.confidence==="medium"?"text-neutral-400":"text-neutral-300")}>· {it.confidence} conf.</span>}
                        </div>
                      </div>}
                    </div>
                  ))}
                </div>
                <button onClick={addLine} className="flex items-center gap-1.5 text-xs text-neutral-400 hover:text-neutral-900 transition-colors mt-3"><span className="w-3.5 h-3.5">{I.plus}</span>Add line item</button>
              </div>

              {/* Pricing — discount + tax + totals, all in one block */}
              <div>
                <ST icon={I.chart} title="Pricing"/>
                <div className="border border-neutral-200">
                  <div className="grid grid-cols-2 gap-px bg-neutral-200">
                    <div className="bg-white p-4"><p className="text-xs text-neutral-400 mb-1.5">Discount %</p><input value={disc} onChange={e=>setDisc(parseFloat(e.target.value)||0)} type="number" min="0" max="100" className="w-full border-0 p-0 text-sm tabular-nums focus:outline-none"/></div>
                    <div className="bg-white p-4"><p className="text-xs text-neutral-400 mb-1.5">Tax rate %</p><input value={taxRate} onChange={e=>setTaxRate(parseFloat(e.target.value)||0)} type="number" min="0" step="0.1" className="w-full border-0 p-0 text-sm tabular-nums focus:outline-none"/></div>
                  </div>
                  <div className="border-t border-neutral-200 p-5 space-y-2 bg-neutral-50">
                    <div className="flex items-center justify-between"><span className="text-sm text-neutral-500">Subtotal</span><span className="text-sm text-neutral-900 tabular-nums">${subtotal.toLocaleString()}</span></div>
                    {disc>0&&<div className="flex items-center justify-between"><span className="text-sm text-neutral-500">Discount ({disc}%)</span><span className="text-sm text-neutral-900 tabular-nums">-${discAmt.toLocaleString()}</span></div>}
                    <div className="flex items-center justify-between"><span className="text-sm text-neutral-500">Tax ({taxRate}%)</span><span className="text-sm text-neutral-900 tabular-nums">${tax.toLocaleString()}</span></div>
                    <div className="h-px bg-neutral-200 my-3"/>
                    <div className="flex items-center justify-between"><span className="text-sm text-neutral-900 uppercase tracking-widest">Total</span><span className="text-2xl text-neutral-900 tabular-nums tracking-tight">${total.toLocaleString()}</span></div>
                  </div>
                </div>
              </div>

              {/* Delivery — message + channel + validity, all grouped */}
              <div>
                <ST icon={I.send} title="Delivery"/>
                <div className="space-y-4">
                  <FF label="Message to customer" hint="Use {name} — it's replaced automatically"><TA value={quoteMsg.replace("{name}",quoteOpen.name.split(" ")[0])} onChange={e=>setQuoteMsg(e.target.value)} rows={3}/></FF>
                  <div className="grid grid-cols-2 gap-3">
                    <FF label="Send via">
                      <SE defaultValue="sms">
                        <option value="sms">SMS to {quoteOpen.ph}</option>
                        <option value="email">Email</option>
                      </SE>
                    </FF>
                    <FF label="Valid for">
                      <SE value={validDays} onChange={e=>setValidDays(e.target.value)}>
                        <option value={15}>15 days</option>
                        <option value={30}>30 days</option>
                        <option value={45}>45 days</option>
                        <option value={60}>60 days</option>
                        <option value={90}>90 days</option>
                      </SE>
                    </FF>
                  </div>
                  <FF label="Notes / terms" hint="Optional — shown on the quote PDF"><TA value={qNotes} onChange={e=>setQNotes(e.target.value)} rows={2} placeholder="Payment due within 30 days. Parts warranty included..."/></FF>
                </div>
              </div>
            </div>

            <div className="px-7 py-5 border-t border-neutral-100 shrink-0 flex gap-3">
              <button onClick={()=>sendQuote(quoteOpen)} className="flex-1 bg-neutral-900 text-white py-3 text-sm flex items-center justify-center gap-2 hover:bg-black transition-colors"><span className="w-4 h-4">{I.send}</span>Send quote — ${total.toLocaleString()}</button>
              <button onClick={()=>setQuoteOpen(null)} className="px-6 border border-neutral-200 py-3 text-sm text-neutral-500 hover:bg-neutral-50 transition-colors">Cancel</button>
            </div>
          </>}
      </Panel>

      {/* Header */}
      <div className="flex flex-col md:flex-row md:items-end justify-between mb-6 gap-3">
        <div>
          <p className="text-2xl md:text-4xl text-neutral-900 tracking-tight">Leads</p>
          <p className="text-neutral-400 mt-1 md:mt-2 text-sm md:text-base">${pipeline.toLocaleString()} active pipeline · {live.length} working leads</p>
        </div>
        <div className="flex bg-neutral-200 p-1">{[["board","Board"],["list","List"]].map(([k,l])=><button key={k} onClick={()=>setView(k)} className={"px-4 md:px-5 py-2 text-sm transition-all duration-200 "+(view===k?"bg-white text-neutral-900":"text-neutral-500")}>{l}</button>)}</div>
      </div>

      {/* Hero metrics — pipeline health at a glance */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4 mb-6 md:mb-8">
        <div className="bg-white border border-neutral-100 p-5">
          <p className="text-xs text-neutral-400 uppercase tracking-widest mb-2">Pipeline</p>
          <p className="text-2xl text-neutral-900 tabular-nums tracking-tight">${pipeline.toLocaleString()}</p>
          <p className="text-xs text-neutral-400 mt-1">active · ex. booked</p>
        </div>
        <div className="bg-white border border-neutral-100 p-5 relative">
          <p className="text-xs text-neutral-400 uppercase tracking-widest mb-2">Hot leads</p>
          <p className="text-2xl text-neutral-900 tabular-nums tracking-tight">{hotCount}</p>
          <p className="text-xs text-neutral-400 mt-1">need attention now</p>
          {hotCount>0&&<span className="absolute top-5 right-5 w-2 h-2 bg-neutral-900 animate-pulse"/>}
        </div>
        <div className="bg-white border border-neutral-100 p-5">
          <p className="text-xs text-neutral-400 uppercase tracking-widest mb-2">Response time</p>
          <p className="text-2xl text-neutral-900 tabular-nums tracking-tight">~2<span className="text-sm text-neutral-400 ml-1">sec</span></p>
          <p className="text-xs text-neutral-400 mt-1">Diali picks up instantly</p>
        </div>
        <div className="bg-white border border-neutral-100 p-5">
          <p className="text-xs text-neutral-400 uppercase tracking-widest mb-2">Book rate</p>
          <p className="text-2xl text-neutral-900 tabular-nums tracking-tight">{bookRate}<span className="text-sm text-neutral-400 ml-1">%</span></p>
          <p className="text-xs text-neutral-400 mt-1">{bookedThisWeek} of {activePool} booked</p>
        </div>
      </div>

      {/* Filter chips */}
      <div className="inline-flex bg-neutral-200 p-1 mb-4 overflow-x-auto max-w-full">
        {[["all","All",C.filter(l=>l.status!=="declined").length],["hot","Hot",C.filter(isHot).length],["urgent","Urgent",C.filter(l=>l.urg==="urgent"||l.urg==="emergency").length],["today","Today",C.filter(l=>{const f=freshness(l.time);return f==="now"||f==="today";}).length],["week","This week",C.filter(l=>freshness(l.time)!=="older").length]].map(([k,label,n])=>(
          <button key={k} onClick={()=>setFilter(k)} className={"px-3 md:px-4 py-2 text-sm transition-all duration-200 whitespace-nowrap "+(filter===k?"bg-white text-neutral-900":"text-neutral-500 hover:text-neutral-700")}>{label}{k!=="all"&&<span className="ml-1.5 tabular-nums text-neutral-400">{n}</span>}</button>
        ))}
      </div>

      {/* Board view */}
      {view==="board"&&<div className="grid grid-cols-1 md:grid-cols-4 gap-5">{Object.entries(cols).map(([name,leads])=>{
        const cv=leads.reduce((a,l)=>a+l.rev,0);
        const emptyCopy={"New":"No new leads in this window. Diali is listening 24/7.","Followed up":"No follow-ups pending. Nice work.","Quote sent":"No quotes awaiting a response.","Booked":"No bookings yet in this window."};
        return(
        <div key={name}>
          {/* Column header */}
          <div className="flex items-center justify-between mb-4">
            <div className="flex items-center gap-2.5">
              <span className="text-sm text-neutral-900">{name}</span>
              <span className="text-xs text-neutral-400 bg-neutral-200 w-5 h-5 flex items-center justify-center tabular-nums">{leads.length}</span>
            </div>
            {cv>0&&<span className="text-xs text-neutral-400 tabular-nums">${cv.toLocaleString()}</span>}
          </div>
          {/* Cards — or empty state */}
          <div className="space-y-3">
            {leads.length===0?(
              <div className="border border-dashed border-neutral-200 p-5 text-center">
                <p className="text-xs text-neutral-400 leading-relaxed">{emptyCopy[name]}</p>
              </div>
            ):leads.map(l=>{
              const draft=leadDraftMeta[l.id];
              const sent=quoteSent[l.id];
              const hot=isHot(l);
              const urg=l.urg==="emergency"||l.urg==="urgent";
              return(
                <div
                  key={l.id}
                  onClick={()=>setSelLead(l)}
                  onMouseEnter={()=>setHovered(l.id)}
                  onMouseLeave={()=>setHovered(null)}
                  className={"bg-white border p-5 cursor-pointer transition-all duration-200 relative "+(hot?"border-neutral-900":"border-neutral-100 hover:border-neutral-300")}
                >
                  {/* Status ribbon — hot, urgent, draft quote, or nothing */}
                  {hot&&<div className="absolute -top-px -left-px -right-px bg-neutral-900 text-white px-4 py-1 flex items-center justify-between"><span className="text-[10px] uppercase tracking-widest flex items-center gap-1.5"><span className="w-3 h-3">{I.trend}</span>Hot</span><span className="text-[10px] text-neutral-400 tabular-nums">{l.conf}% match</span></div>}
                  {!hot&&urg&&<div className="absolute -top-px -left-px -right-px bg-neutral-100 px-4 py-1"><span className="text-[10px] uppercase tracking-widest text-neutral-600 flex items-center gap-1.5"><span className="w-3 h-3">{I.zap}</span>{l.urg==="emergency"?"Emergency":"Urgent"}</span></div>}
                  {!hot&&!urg&&draft&&!sent&&<div className="absolute -top-px -left-px -right-px bg-neutral-100 px-4 py-1"><span className="text-[10px] uppercase tracking-widest text-neutral-600 flex items-center gap-1.5"><span className="w-3 h-3">{I.zap}</span>Draft ready · {draft.matchCount}/{draft.totalLines}</span></div>}
                  {(hot||urg||(draft&&!sent))&&<div className="h-5"/>}
                  {/* Customer row */}
                  <div className="flex items-start gap-3 mb-3">
                    <Av n={l.name} s={32}/>
                    <div className="flex-1 min-w-0">
                      <p className="text-sm text-neutral-900 truncate">{l.name}</p>
                      <div className="flex items-center gap-1.5 mt-0.5">
                        <span className="text-xs text-neutral-400">{l.src}</span>
                        <span className="text-neutral-200">·</span>
                        <span className="text-xs text-neutral-400">{l.time}</span>
                      </div>
                    </div>
                    <Dot s={l.score}/>
                  </div>
                  {/* Issue */}
                  <p className="text-xs text-neutral-500 mb-4 leading-relaxed line-clamp-2">{l.issue}</p>
                  {/* Revenue — the hero number */}
                  <div className="flex items-end justify-between">
                    <div>
                      <p className="text-xl text-neutral-900 tabular-nums tracking-tight">{l.rev?"$"+l.rev.toLocaleString():"—"}</p>
                      <p className="text-[10px] text-neutral-400 uppercase tracking-widest mt-0.5">{sent?"Quote sent":draft?"Draft ready":l.rev?"Est. value":"No value"}</p>
                    </div>
                    {/* Hover quick actions */}
                    {hovered===l.id?(
                      <div className="flex items-center gap-1 fi">
                        <a href={"tel:"+l.ph} onClick={e=>e.stopPropagation()} title="Call" className="w-8 h-8 border border-neutral-200 hover:border-neutral-900 hover:bg-neutral-900 hover:text-white flex items-center justify-center transition-colors"><span className="w-3.5 h-3.5">{I.phone}</span></a>
                        <a href={"sms:"+l.ph} onClick={e=>e.stopPropagation()} title="SMS" className="w-8 h-8 border border-neutral-200 hover:border-neutral-900 hover:bg-neutral-900 hover:text-white flex items-center justify-center transition-colors"><span className="w-3.5 h-3.5">{I.msg}</span></a>
                        <button onClick={e=>{e.stopPropagation();setQuoteOpen(l);}} title="Quote" className="w-8 h-8 border border-neutral-200 hover:border-neutral-900 hover:bg-neutral-900 hover:text-white flex items-center justify-center transition-colors"><span className="w-3.5 h-3.5">{I.dollar}</span></button>
                      </div>
                    ):(
                      <span className="text-xs text-neutral-400 tabular-nums">{l.conf}%</span>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )})}</div>}

      {/* List view */}
      {view==="list"&&<div className="bg-white border border-neutral-100">
        <div className="hidden md:grid px-7 py-3.5 border-b border-neutral-100 grid-cols-6 gap-4">{["Customer","Issue","Value","Confidence","Score","Status"].map(h=><span key={h} className="text-xs text-neutral-400 uppercase tracking-widest">{h}</span>)}</div>
        {live.length===0?(
          <div className="px-7 py-12 text-center">
            <p className="text-sm text-neutral-500 mb-1">No leads match this filter</p>
            <p className="text-xs text-neutral-400">Try "All" to see everything in your pipeline.</p>
          </div>
        ):live.map(l=>(
          <div key={l.id} onClick={()=>setSelLead(l)} className="px-4 md:px-7 py-4 border-b border-neutral-100 last:border-0 flex md:grid md:grid-cols-6 gap-3 md:gap-4 items-center hover:bg-neutral-50 cursor-pointer transition-colors">
            <div className="flex items-center gap-3"><Av n={l.name} s={32}/><div className="min-w-0 flex-1"><p className="text-sm text-neutral-900 flex items-center gap-2">{l.name}{isHot(l)&&<span className="text-[9px] uppercase tracking-widest bg-neutral-900 text-white px-1.5 py-0.5">Hot</span>}</p><p className="text-xs text-neutral-400 truncate">{l.ph} · {l.time}</p><p className="md:hidden text-xs text-neutral-400 truncate">{l.issue}</p></div></div>
            <p className="hidden md:block text-xs text-neutral-500 truncate">{l.issue}</p>
            <span className="hidden md:block text-sm text-neutral-900 tabular-nums">{l.rev?"$"+l.rev.toLocaleString():"—"}</span>
            <div className="hidden md:block"><div className="h-1 bg-neutral-100 w-20 mb-1"><div className="h-full bg-neutral-900" style={{width:l.conf+"%"}}/></div><span className="text-xs text-neutral-400">{l.conf}%</span></div>
            <span className="hidden md:block"><Dot s={l.score}/></span><Bg s={l.status}/>
          </div>
        ))}
      </div>}
    </div>
  );
};

/* ══════════════════ QUOTES / PRICEBOOK ══════════════════ */
/* Shape mappers between Supabase pricebook_items and the frontend item shape. */
const dbToItem=(r)=>({
  id:r.id, cat:r.category, name:r.name, desc:r.description||"",
  unit:r.unit||"each", rate:Number(r.rate)||0,
  rangeLow:Number(r.range_low)||0, rangeHigh:Number(r.range_high)||0,
  tax:!!r.taxable, uses:r.uses_count||0,
  updated:r.updated_at?new Date(r.updated_at).toLocaleDateString():"—",
  rules:[]
});
const itemToDb=(it,uid)=>({
  user_id:uid, category:it.cat, name:it.name, description:it.desc||"",

/* ══════════════════ AGENT ══════════════════ */
const Agent=({vapiKeys,setVapiKeys,saveSetting,agentCfg})=>{
  const defaultPrompt=`You are Diali, the receptionist for this home-services business. You answer the phone. You sound like a sharp dispatcher who's been doing this for ten years — not a chatbot.

# YOUR ROLE
You are the FIRST line of contact. Your job is to gather everything the team needs to follow up — NOT to lock in the schedule. After the call, the dispatcher reviews your notes and confirms the time with the customer. So you take the request, get all the details, and tell the customer the team will reach out shortly to confirm.

Pace matters. Don't rush through this. Take time to genuinely understand what's going on before pivoting to scheduling. A thorough call beats a fast one every time.

# VOICE
Warm. Direct. Efficient. Short sentences. Real contractions ("I'll", "we're", "can't"). Match the caller's energy: calm if they're calm, urgent if they're stressed, light if they're chatty.

NEVER say:
- "AI", "chatbot", "assistant", "virtual"
- "I'd be happy to help" / "How may I assist you" (too robotic)
- "Please hold while I check" (just ask what you need)
- More than 2 options in one sentence

ACTIVE LISTENING — sprinkle these in naturally so the caller knows you're tracking:
- "Mm-hmm." "Got it." "Okay." "Right." "Yep."
- After they describe a problem, echo the key detail in 3 words: "AC blowing warm — okay."
- If they sound frustrated: "I hear you. Let's get this fixed."
- If they sound panicked: "Okay, let's move fast."

# CALL FLOW — the happy path

The firstMessage greets them and asks how you can help. After they answer:

## 1. LISTEN — let them describe the problem fully
Don't interrupt. Don't ask their name yet. Don't pivot to scheduling. Just let them explain what's going on.

When they pause, acknowledge briefly: "Got it." / "Mm-hmm, okay."

## 2. DIAGNOSE — ask 3-5 specific follow-ups
This is the most important step. The team needs a real picture of the problem before they show up. Use the diagnostic playbooks below — they're the questions a real dispatcher would ask.

Ask ONE question, wait for the answer, then ask the next. Don't fire off three at once.

## 3. ASSESS URGENCY
Watch for emergency triggers (gas smell, no heat in winter, no AC in 95°+ heat, water actively flooding, sparking, smoke, CO alarm). If any → "That's urgent — let me get our team on this for today."

If not emergency, gauge: "Is this something we should look at today, or could it wait a day or two?"

## 4. CONFIRM YOU UNDERSTAND
Summarize the situation back in one sentence: "Okay — so the AC stopped cooling yesterday, blowing warm air, breaker checked, unit's about ten years old. Got it."

## 5. ASK ABOUT TIMING PREFERENCE
Use OPEN questions FIRST — don't immediately offer slots:
- "When were you hoping to have someone come out?"
- "What's your availability looking like — mornings or afternoons?"
- "Any specific day this week work best?"

## 6. OFFER TIMES BASED ON THEIR ANSWER
NOW call getAvailableSlots with their preference (today / tomorrow / this_week / next_week / specific date).

Offer 2 options max from what comes back: "I have [day1, time1] or [day2, time2] — which one works?"

When they pick: "Got it, [their choice]."

CRITICAL: When you call bookAppointment, copy the EXACT \`starts_at\` and \`ends_at\` ISO strings from the slot they picked. Do NOT construct your own timestamp. Do NOT translate to UTC yourself. Just paste the exact strings the slot returned.

## 7. COLLECT CONTACT INFO — go in this exact order
- **Full name:** "What's your full name?"
- **Email:** "What's a good email for the appointment confirmation?"
- **Phone:** "What's the best phone number to reach you?" → Read it back digit-by-digit: "5-1-3, 6-1-7, 9-9-4-2 — got it."
- **Service address:** "And what's the service address?" If existing customer: "Same as last time?"

## 8. CONFIRM THE FULL PACKAGE BACK
Read it ALL back. This is where you catch typos and misunderstandings:

If they correct anything, fix it.

## 9. SOFT CLOSE

If no: "Thanks for calling. We'll talk soon."

# PRICING
You do NOT give firm prices. Ever. The script:
1. Acknowledge: "Great question — I want to give you a real answer."
2. Set expectation: "Our tech needs to see it to give you an exact number."
3. Call getBallpark with their issue, category, urgency. Speak the range it returns.
4. Anchor: "The diagnostic visit is a flat ninety-five dollars. After that you get an exact price in writing before any work happens. You decide from there."
5. If pushed for a firm number: "I really can't pin it down without the tech seeing it — that wouldn't be fair to you. But I can have someone there [time]."

If getBallpark returns nothing useful: "Honestly, the price depends on what the tech finds. The diagnostic is a flat ninety-five dollars and you'll have a firm quote before any work is done."

# SCHEDULING — you propose, the team confirms
The framing matters. You are NOT auto-confirming the appointment. You are taking down a request and gathering everything the team needs to confirm with the customer. Use language like:
- "I've got it down for [time]"
- "I'll get this over to the team"

Do NOT say:
- "You're booked"

Mechanics:

## CRITICAL — slot timestamps
When the caller picks a slot, you MUST pass the EXACT \`starts_at\` and \`ends_at\` ISO strings that getAvailableSlots returned for that slot. Do NOT construct your own timestamp. Do NOT translate to UTC yourself. Do NOT round to the hour. Just copy the exact ISO string from the slot the caller picked into the bookAppointment call.

Example flow:
- getAvailableSlots returns: \`{slots: [{id:"slot_0", starts_at:"2026-04-16T12:00:00.000Z", ends_at:"2026-04-16T14:00:00.000Z", label:"tomorrow between 8 AM and 10 AM"}, ...]}\`
- Caller picks "tomorrow morning"

Picking the wrong timestamp puts the appointment at the wrong hour and wastes everyone's time.

# WHEN YOU GENUINELY DON'T KNOW
