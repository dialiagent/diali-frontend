            <button onClick={()=>setCallError("")} className="mt-3 text-xs bg-white text-neutral-900 px-4 py-2 hover:bg-neutral-100 transition-colors">Dismiss</button>
          </div>}

          {/* SDK status */}
          {!vapiKeys.publicKey&&<div className="bg-neutral-50 p-5">
            <p className="text-sm text-neutral-900 mb-1">Connect Vapi to make real calls</p>
            <p className="text-xs text-neutral-400 mb-4">Add your Vapi public key in the Setup tab to enable live browser calls with your AI agent.</p>
            <button onClick={()=>{setTestPanel(false);setSec("setup");}} className="text-xs bg-neutral-900 text-white px-4 py-2 hover:bg-black transition-colors">Go to setup</button>
          </div>}

          {callState==='ended'&&<div className="space-y-3">
            <div className="bg-neutral-50 p-5">
              <div className="flex items-center gap-2 mb-2"><span className="w-4 h-4 text-neutral-400">{I.zap}</span><p className="text-xs text-neutral-400 uppercase tracking-widest">Call summary</p></div>
              <p className="text-sm text-neutral-700 leading-relaxed">{transcript.length} messages exchanged over {fmtTime(callDur)}. {transcript.filter(t=>t.role==='assistant').length} AI responses, {transcript.filter(t=>t.role==='user').length} caller messages.</p>
            </div>
          </div>}
        </div>
        <div className="px-7 py-5 border-t border-neutral-100 shrink-0">
          {callState==='idle'&&<button onClick={startCall} className="w-full bg-neutral-900 text-white py-3.5 text-sm hover:bg-black transition-colors flex items-center justify-center gap-2"><span className="w-4 h-4">{I.phone}</span>{vapiKeys.publicKey?"Start live test call":"Start demo call"}</button>}
          {callState==='connecting'&&<button disabled className="w-full bg-neutral-300 text-white py-3.5 text-sm cursor-not-allowed flex items-center justify-center gap-2"><div className="w-4 h-4 border-2 border-white border-t-transparent animate-spin" style={{borderRadius:'50%'}}/>Connecting...</button>}
          {callState==='active'&&<button onClick={endCall} className="w-full bg-neutral-900 text-white py-3.5 text-sm hover:bg-black transition-colors flex items-center justify-center gap-2"><span className="w-4 h-4">{I.x}</span>End call — {fmtTime(callDur)}</button>}
          {callState==='ended'&&<div className="flex gap-3"><button onClick={()=>{setCallState('idle');setTranscript([]);setCallDur(0);}} className="flex-1 bg-neutral-900 text-white py-3.5 text-sm hover:bg-black transition-colors">Try again</button><button onClick={()=>{setCallState('idle');setTestPanel(false);}} className="flex-1 border border-neutral-200 py-3.5 text-sm text-neutral-500 hover:bg-neutral-50 transition-colors">Close</button></div>}
        </div>
      </Panel>

      {/* Sidebar nav — horizontal scroll on mobile, vertical on desktop */}
      <div className="md:w-52 shrink-0">
        <div className="flex md:flex-col gap-1 overflow-x-auto md:overflow-x-visible pb-1 md:pb-0">
          {[["setup","Setup"],["voice","Voice"],["personality","Personality"],["greeting","Greeting"],["questions","Questions"],["hours","Hours"],["escalation","Escalation"]].map(([k,l])=><button key={k} onClick={()=>setSec(k)} className={"whitespace-nowrap md:w-full text-left px-4 py-2.5 md:py-3 text-sm transition-all duration-200 "+(sec===k?"bg-neutral-900 text-white":"text-neutral-400 hover:bg-neutral-100 hover:text-neutral-600")}>
            <span className="flex items-center justify-between">{l}{k==="setup"&&<span className={"w-1.5 h-1.5 ml-2 "+(hasKeys?"bg-neutral-900":"bg-neutral-300")+(sec===k?" bg-white":"")}/>}</span>
          </button>)}
        </div>
        <div className="hidden md:block mt-6 pt-6 border-t border-neutral-200 space-y-3">
          <button onClick={()=>setTestPanel(true)} className="w-full bg-neutral-900 text-white py-3 text-sm flex items-center justify-center gap-2 hover:bg-black transition-colors"><span className="w-4 h-4">{I.phone}</span>Test call</button>
          {hasKeys&&<button onClick={saveAssistant} disabled={saving} className={"w-full border py-3 text-sm flex items-center justify-center gap-2 transition-colors "+(saved?"border-neutral-900 bg-neutral-900 text-white":"border-neutral-200 text-neutral-500 hover:bg-neutral-50")}>
            {saving?<><div className="w-3.5 h-3.5 border-2 border-neutral-400 border-t-transparent animate-spin" style={{borderRadius:'50%'}}/>Saving...</>:saved?<><span className="w-4 h-4">{I.check}</span>Saved to Vapi</>:<><span className="w-4 h-4">{I.upload}</span>Deploy to Vapi</>}
          </button>}
          {assistantId&&<p className="text-xs text-neutral-300 text-center truncate px-2" title={assistantId}>ID: {assistantId.slice(0,8)}...</p>}
        </div>
        {/* Mobile action buttons */}
        <div className="flex md:hidden gap-2 mt-3">
          <button onClick={()=>setTestPanel(true)} className="flex-1 bg-neutral-900 text-white py-2.5 text-sm flex items-center justify-center gap-2"><span className="w-4 h-4">{I.phone}</span>Test</button>
          {hasKeys&&<button onClick={saveAssistant} disabled={saving} className="flex-1 border border-neutral-200 py-2.5 text-sm text-neutral-500 flex items-center justify-center gap-2">{saving?"Saving...":saved?"Saved":"Deploy"}</button>}
        </div>
      </div>

      {/* Main content */}
      <div className="flex-1 bg-white border border-neutral-100 p-4 md:p-8 overflow-y-auto">

        {/* Setup */}
        {sec==="setup"&&<div className="max-w-xl">
          <p className="text-2xl text-neutral-900 tracking-tight mb-1">Setup</p>
          <p className="text-neutral-400 mb-8">Connect your Vapi account to power your AI voice agent.</p>

          <div className="space-y-6">
            <div className="bg-neutral-50 p-6">
              <div className="flex items-center gap-3 mb-4">
                <div className="w-10 h-10 bg-neutral-900 flex items-center justify-center"><img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAGAAAABgCAYAAADimHc4AAAJZklEQVR42u2bXWwcVxXH/+femVmvY8dJ6iRVi1qJjwpSqhAMUfpFPyQooiGqqACJIlVIvCCEhAQC2jRV0nzQwhM89KUv8FYlqnjgAbWicgptCkVCqmiVUgOVWqrWu5sP79renTtz75+HGccf2XXG3l13i+5P2gd7d87OPfd/zj1z7l3A4/F4PB6Px+PxeDwej8fj8Xg8Ho/H4/F4PB6Px+PxeDwej8fj8fQE6aUxkgJALbFLAE5EOAj2+m33A4WkXs97G2Wv33bXS9Aj5ysRseRkAEzcDJvsArSG1lPA7BkRmcs/49Zm76QG9u+Dbd4IJyEk+jeC1hkRqZOUtSp20e5bQ8D4rbD2BsAJqKYQ1F8UkeZa7nOglM/W9P209dfIWZJJ/ponbf0tmur3FhxArp72Fu29f4C2/upye03S1t+hqf1w0R6lqPMBgHHtQab1KXJ++X2m9X8xrj2Yffak/rA4X+XO+lE2kAYZVyzjSsK4krA1bcmLJEnG7//6yikgGzjNe98nY5Kzy+3FlZTuQmYvqT5V1FmXJjV+7zHSkayTrenldjlD0pHJ9JEPKh2tT/mm8gVynjS1lHElpaly2SuuWMZVQ5JMqw90GhxJTVJoqhO0DdKcsx3tmWpMkksiS185oir7yZQ01YTxtO1gNyFTMql+daMmQXUzB7mJRwFF0BEil9+wiAKo4WYdHI/z7bfLANzlqeMURISgOwoVAbSuoz0ygGs4kAf57rvD7e0tnQMqKBwDYoIUiFId7ArQIpx7nJOTweIYB2wC8gXQkY2doLsZbk4AdFaLiEI6T4Rbr8fOTQ/ki6deqlKRb1ia2l7o8peRzDiIBKvbawFR+VpsDydye6qd+kXEIa0dQDi2G2au/aQu2tUwcw7Rll24edd92Rgng0GMgExtpnktwmAYqSVErrAYSqYucT8hGeHw4ctVS/sIdEnAIlWIOCAiKNdnf5+WjuqnewSwLO6SlFB4OFvj7nSDmoIAqhasK+D8XLVm3iEc+wRM7Zty5IgDoLM8K46mOgFdvhdJ3UGKlMcUgAK6Vtt3JyeDTP0X7kU4NoFkdnX1L0pLI5lzCMf2IK7tFxGXp6PBeRJeqMFJlmGqU4hK18DEzPL9qhc6RMOCZP4swu27ATgAIiKW8fTvEG29D/FFC1XIUQSUQ2A/JbJjamX9nldohKn8FdHo52AKTkB2sUU4opE0XkG0Y19+j25gIiBz/mQgIk0oPA1sktyZBaNgyy6Y6v35oBzjC5+BHjqAZMYVcj5pEYwKXPpCB+dnuT+ufgXR2OcLq3/pWpDOWkSb96JVuSdbC/pTEXWRgvLcmJhfIa3PQWkNksWCLiEED5EMsgU0PgRdVnCOxSPXAk6d6BDJJCkQPgK49dUyC9coObjiP4MxAQuqkOGPvANrfotgTADY4jl2626k5+7i/PnroDfdl6lfFVN/NKpgGn+W8vbnF9oLl6m/VbkH0eZ9MI21qX9ZRdRwiDbdxmb17n5Fgery+kxppdIvkTaaUKpYFFAAWILuIQT2CeiSKhY9C1on4IKjndSfjYyH8re7US4BDSjXtyjouh2dK86yNf0USld9F+Z8umoNv2xsAaAESJJit5KpXyOeOSNDV9/aIfdbNmtfxNDwc0hmLSBdqpYOwbBCOne7RDtfXPiOQYmAxSiA/AJpw0BpVUwpAqQpYRIW10H+3KDDx1ZXvz0ESG/0ShASAuzPWtD1BOQKVDK0YwpMnkawWYG0RS8u9AyxLPfX/4Lgquc65X4m1bsRjdy+7tzfbi1I6g566B6a2l5k5bcepAhYjAKnHoedS6CUQl+SpQJUcFQE7                 <div><p className="text-sm text-neutral-900">Vapi</p><p className="text-xs text-neutral-400">Voice AI platform</p></div>
                <span className={"ml-auto text-xs px-3 py-1 "+(hasKeys?"bg-neutral-900 text-white":"bg-neutral-200 text-neutral-500")}>{hasKeys?"Connected":"Not connected"}</span>
              </div>
              <p className="text-xs text-neutral-400 leading-relaxed">Vapi handles the full voice pipeline — telephony, speech recognition, LLM, and text-to-speech. Get your API keys from <a href="https://dashboard.vapi.ai" target="_blank" className="text-neutral-900 hover:underline">dashboard.vapi.ai</a></p>
            </div>

            <div>
              <label className="text-xs text-neutral-400 mb-1.5 block">Vapi public key <span className="text-neutral-300">(optional — for browser test calls)</span></label>
              <input value={vapiKeys.publicKey} onChange={e=>setVapiKeys(p=>({...p,publicKey:e.target.value}))} type="text" placeholder="pk_xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" className="w-full border border-neutral-200 px-4 py-3 text-sm font-mono"/>
              <p className="text-xs text-neutral-300 mt-1.5">Only needed if you want to test calls in the browser. Your AI agent deploys without it.</p>
            </div>

            <div className="flex gap-3">
              <button onClick={()=>{fetchAssistant();setSec("voice");}} className="bg-neutral-900 text-white px-6 py-3 text-sm hover:bg-black transition-colors flex items-center gap-2"><span className="w-4 h-4">{I.check}</span>Continue setup</button>
            </div>
            {!hasKeys&&<div className="bg-neutral-900 p-6">
              <p className="text-sm text-white mb-2">Don't have a Vapi account?</p>
              <p className="text-xs text-neutral-400 leading-relaxed mb-4">Sign up free at vapi.ai — you get $10 in credits to test. No credit card required.</p>
              <a href="https://dashboard.vapi.ai" target="_blank" className="text-xs bg-white text-neutral-900 px-5 py-2.5 hover:bg-neutral-100 transition-colors inline-block">Create Vapi account</a>
            </div>}

            <div className="pt-6 border-t border-neutral-100">
              <p className="text-xs text-neutral-400 uppercase tracking-widest mb-4">How it works</p>
              <div className="space-y-4">
                {[["1. Connect","Add your Vapi API keys above to link your account."],["2. Configure","Set your AI voice, personality, greeting, and business rules."],["3. Test","Make a live test call directly from your browser."],["4. Deploy","Save to Vapi and connect a phone number to go live."]].map(([t,d])=>(
                  <div key={t} className="flex items-start gap-4">
                    <div className="w-8 h-8 bg-neutral-100 flex items-center justify-center shrink-0"><span className="text-xs text-neutral-500">{t.split(".")[0]}</span></div>
                    <div><p className="text-sm text-neutral-900">{t.split(". ")[1]}</p><p className="text-xs text-neutral-400 mt-0.5">{d}</p></div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>}

        {/* Voice */}
        {sec==="voice"&&<div>
          <p className="text-2xl text-neutral-900 tracking-tight mb-1">Voice</p>
          <p className="text-neutral-400 mb-8">Choose an ElevenLabs voice for your AI receptionist. Powered by Vapi.</p>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            {voices.map(v=>(<div key={v.id} onClick={()=>{setVoiceId(v.id);setVoiceName(v.name);}} className={"p-4 md:p-6 border-2 cursor-pointer transition-all duration-200 "+(voiceId===v.id?"border-neutral-900":"border-neutral-200 hover:border-neutral-300")}>
              <div className="flex items-center justify-between mb-4">
                <div className="flex items-center gap-4">
                  <div className={"w-12 h-12 flex items-center justify-center "+(voiceId===v.id?"bg-neutral-900":"bg-neutral-100")}><span className={"w-5 h-5 "+(voiceId===v.id?"text-white":"text-neutral-400")}>{I.mic}</span></div>
                  <div><p className="text-sm text-neutral-900">{v.name}</p><p className="text-xs text-neutral-400 mt-0.5">{v.desc}</p></div>
                </div>
                <div className="flex items-center gap-2">{v.tag&&<span className="text-xs bg-neutral-100 text-neutral-500 px-2 py-0.5">{v.tag}</span>}{voiceId===v.id&&<span className="w-5 h-5 text-neutral-900">{I.check}</span>}</div>
              </div>
              <div className="flex items-center justify-between">
                <span className="text-xs text-neutral-300 font-mono">{v.id.slice(0,12)}...</span>
                <button onClick={e=>previewVoice(v.id,e)} className={"text-xs transition-colors flex items-center gap-1.5 "+(playingVoice===v.id?"text-neutral-900":"text-neutral-400 hover:text-neutral-900")}>
                  {loadingVoice===v.id?<><div className="w-3.5 h-3.5 border-2 border-neutral-400 border-t-transparent animate-spin" style={{borderRadius:'50%'}}/>Loading...</>:playingVoice===v.id?<><span className="w-3.5 h-3.5">{I.x}</span>Stop</>:<><span className="w-3.5 h-3.5">{I.play}</span>Preview voice</>}
                </button>
              </div>
            </div>))}
          </div>
          {previewErr&&<div className="mt-4 bg-neutral-900 text-white px-4 py-3 text-sm flex items-center gap-3"><span className="w-4 h-4 shrink-0">{I.x}</span>{previewErr}</div>}
          <p className="text-xs text-neutral-300 mt-6">Voice IDs from ElevenLabs. You can use any ElevenLabs voice ID — including cloned voices.</p>
          <div className="mt-4"><label className="text-xs text-neutral-400 mb-1.5 block">Custom voice ID (optional)</label><input value={voiceId} onChange={e=>setVoiceId(e.target.value)} className="w-full border border-neutral-200 px-4 py-3 text-sm font-mono" placeholder="Enter any ElevenLabs voice ID"/></div>
        </div>}

        {/* Personality */}
        {sec==="personality"&&<div className="max-w-xl">
          <p className="text-2xl text-neutral-900 tracking-tight mb-1">Personality</p>
          <p className="text-neutral-400 mb-8">Define how your AI agent thinks and behaves. This is the system prompt sent to the LLM.</p>
          <textarea value={sysPrompt} onChange={e=>setSysPrompt(e.target.value)} rows={14} className="w-full border border-neutral-200 p-5 text-sm leading-relaxed font-mono mb-4"/>
          <div className="flex items-center justify-between">
            <span className="text-xs text-neutral-300">{sysPrompt.length} characters</span>
            <div className="flex gap-3">
              <button onClick={()=>setSysPrompt("You are a friendly, professional AI receptionist for a home services company. Your goals:\n1. Greet the caller warmly and ask how you can help\n2. Understand their issue — what's broken, leaking, not working\n3. Assess urgency — is it an emergency or can it wait?\n4. Collect their name, phone, and address\n5. Book an appointment or take a detailed message\n6. Confirm details before ending the call\n\nBe concise and natural. Use short sentences. Sound like a real person, not a script. If unsure, ask clarifying questions. Never reveal you are AI unless directly asked.")} className="text-xs text-neutral-400 hover:text-neutral-900 transition-colors">Reset to default</button>
            </div>
          </div>
          <div className="mt-8 bg-neutral-50 p-5">
            <p className="text-xs text-neutral-400 uppercase tracking-widest mb-3">Tips</p>
            <div className="space-y-2 text-xs text-neutral-500 leading-relaxed">
              <p>Keep instructions concise — long prompts increase latency.</p>
              <p>Use numbered lists for multi-step workflows.</p>
              <p>Include your company name and services for context.</p>
              <p>Tell the AI what NOT to do (e.g., "never give pricing").</p>
            </div>
          </div>
        </div>}

        {/* Greeting */}
        {sec==="greeting"&&<div className="max-w-xl">
          <p className="text-2xl text-neutral-900 tracking-tight mb-1">Greeting</p>
          <p className="text-neutral-400 mb-8">The first thing callers hear when your AI picks up. This is the <code className="text-xs bg-neutral-100 px-1.5 py-0.5 text-neutral-600">firstMessage</code> in Vapi.</p>
          <textarea value={greeting} onChange={e=>setGreeting(e.target.value)} rows={4} className="w-full border border-neutral-200 p-5 text-sm leading-relaxed mb-4"/>
          <div className="flex items-center justify-between">
            <span className="text-xs text-neutral-300">{greeting.length} characters</span>
            <div className="flex gap-3">
              <button onClick={()=>setTestPanel(true)} className="text-sm px-5 py-2.5 border border-neutral-200 text-neutral-500 hover:bg-neutral-50 transition-colors flex items-center gap-2"><span className="w-4 h-4">{I.play}</span>Test it</button>
            </div>
          </div>
          <div className="mt-8 space-y-2">
            <p className="text-xs text-neutral-400 uppercase tracking-widest mb-3">Quick templates</p>
            {["Hi, thanks for calling! I can help you with scheduling a service appointment or answer any questions. What's going on?","Thank you for calling [Company]! I'd be happy to help get a technician out to you. What are you experiencing?","Hi there! Are you calling about an existing appointment, or do we need to get someone out to take a look at something?","Good morning! I can get you scheduled for a service call right now. What's the issue you're dealing with?"].map((t,i)=>(
              <button key={i} onClick={()=>setGreeting(t)} className={"w-full text-left p-4 text-sm transition-colors "+(greeting===t?"bg-neutral-900 text-white":"bg-neutral-50 text-neutral-600 hover:bg-neutral-100")}>{t}</button>
            ))}
          </div>
        </div>}

        {/* Questions */}
        {sec==="questions"&&<div className="max-w-xl">
          <p className="text-2xl text-neutral-900 tracking-tight mb-1">Questions</p>
          <p className="text-neutral-400 mb-8">Qualification questions your AI asks callers. These get appended to your system prompt.</p>
          <div className="space-y-2 mb-6">
            {qs.map((q,i)=><div key={i} className="flex items-center gap-3 p-4 bg-neutral-50 group hover:bg-neutral-100 transition-colors">
              <span className="w-5 h-5 bg-neutral-200 text-neutral-500 flex items-center justify-center text-xs shrink-0">{i+1}</span>
              <span className="flex-1 text-sm text-neutral-700">{q}</span>
              <button onClick={()=>rmQ(i)} className="w-4 h-4 text-neutral-200 hover:text-neutral-900 opacity-0 group-hover:opacity-100 transition-opacity">{I.trash}</button>
            </div>)}
          </div>
          <div className="flex gap-2">
            <input value={newQ} onChange={e=>setNewQ(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addQ()} placeholder="Add a new question..." className="flex-1 border border-neutral-200 px-4 py-3 text-sm"/>
            <button onClick={addQ} className="bg-neutral-900 text-white px-4 py-3 text-sm hover:bg-black transition-colors flex items-center gap-2"><span className="w-4 h-4">{I.plus}</span>Add</button>
          </div>
        </div>}

        {/* Hours */}
        {sec==="hours"&&<div className="max-w-xl">
          <p className="text-2xl text-neutral-900 tracking-tight mb-1">Business hours</p>
          <p className="text-neutral-400 mb-8">Your AI answers 24/7 — but knows when to book vs. take a message.</p>
          <div className="space-y-1">{["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"].map((d,i)=>(

          ))}</div>

        {/* Escalation */}
        {sec==="escalation"&&<div className="max-w-xl">

        </div>}

      </div>
    </div>
  );
};

const Settings=({vapiKeys,setVapiKeys,saveSetting,onLogout,profile,onProfileSave,isDemo,curPlan,setCurPlan,curPlanData,requirePlan,sub})=>{
  const[tab,setTab]=useState("profile");
  const[notifs,setNotifs]=useState({calls:true,sms:true,email:false,weekly:true});
  const toggleN=k=>setNotifs(p=>({...p,[k]:!p[k]}));
  const[pf,setPf]=useState({business_name:profile?.business_name||"",full_name:profile?.full_name||"",email:profile?.email||"",phone:profile?.phone||"",service_area:profile?.service_area||"",trade:profile?.trade||""});
  const[saving,setSaving]=useState(false);
  const[saved,setSaved]=useState(false);
  const saveProfile=async()=>{setSaving(true);try{await onProfileSave(pf);setSaved(true);setTimeout(()=>setSaved(false),2000);}catch(e){}setSaving(false);};

  /* ── Integration state ── */
  const[intStates,setIntStates]=useState({gcal:true,stripe:true,slack:false,sf:false,zapier:true,eleven:true,qb:false,hw:false});
  const toggleInt=k=>setIntStates(p=>({...p,[k]:!p[k]}));

  /* ── Billing / Plan state ── */
  const plans=PLANS;
  const[checkoutBusy,setCheckoutBusy]=useState(null); /* which tier is in flight */
  const[portalBusy,setPortalBusy]=useState(false);
  const[billingError,setBillingError]=useState("");
  /* Kick off Stripe Checkout for a given plan tier. Redirects to Stripe on success. */
  const startCheckout=async(tier)=>{
    if(isDemo){setBillingError("Demo mode — sign up with a real account to subscribe.");return;}
    setBillingError("");setCheckoutBusy(tier);
    try{
      const sess=await window.supabase.auth.getSession();
      const token=sess?.data?.session?.access_token;
      if(!token)throw new Error("Not signed in");
      const res=await fetch(BACKEND_URL+"/api/billing/checkout",{method:"POST",headers:{"Authorization":"Bearer "+token,"Content-Type":"application/json"},body:JSON.stringify({tier})});
      const data=await res.json();
      if(!res.ok||!data.url)throw new Error(data.error||"Checkout failed");
      window.location.href=data.url;
    }catch(e){setBillingError(e.message||"Something went wrong");setCheckoutBusy(null);}
  };
  /* Open Stripe Customer Portal — lets the user manage, upgrade, cancel, update payment method. */
  const openPortal=async()=>{
    if(isDemo){setBillingError("Demo mode — real subscriptions only.");return;}
    setBillingError("");setPortalBusy(true);
    try{
      const sess=await window.supabase.auth.getSession();
      const token=sess?.data?.session?.access_token;
      if(!token)throw new Error("Not signed in");
      const res=await fetch(BACKEND_URL+"/api/billing/portal",{method:"POST",headers:{"Authorization":"Bearer "+token,"Content-Type":"application/json"}});
      const data=await res.json();
      if(!res.ok||!data.url)throw new Error(data.error||"Could not open billing portal");
      window.location.href=data.url;
    }catch(e){setBillingError(e.message||"Something went wrong");setPortalBusy(false);}

  const[teamPanel,setTeamPanel]=useState(null);
  const[editMember,setEditMember]=useState(null);

  const[editData,setEditData]=useState({});
  const[teamFilter,setTeamFilter]=useState("all");
  const filteredTeam=teamFilter==="all"?team:team.filter(m=>m.status===teamFilter);
  const roleBg=r=>r==="Owner"?"bg-neutral-900 text-white":r==="Admin"?"bg-neutral-700 text-white":r==="Dispatcher"?"bg-neutral-500 text-white":"bg-neutral-200 text-neutral-600";
  const statusBg=s=>s==="Active"?"bg-neutral-900 text-white":s==="Pending"?"bg-neutral-200 text-neutral-600":"bg-neutral-100 text-neutral-400";
  const openEdit=(m)=>{setEditData({...m});setTeamPanel("edit");setEditMember(m);};
  const saveEdit=()=>{setTeam(p=>p.map(m=>m.id===editMember.id?{...m,...editData}:m));setTeamPanel(null);setEditMember(null);};
  const deactivateMember=()=>{setTeam(p=>p.map(m=>m.id===editMember.id?{...m,status:m.status==="Deactivated"?"Active":"Deactivated"}:m));setTeamPanel(null);setEditMember(null);};

const Calendar=()=>{
  const[view,setView]=useState("week");
  const[weekOff,setWeekOff]=useState(0);
  const[monthOff,setMonthOff]=useState(0);
  const[selBook,setSelBook]=useState(null);

  const today=new Date();
  const day=n=>{const d=new Date(today);d.setDate(d.getDate()+n);return d;};
  const fmt=d=>(d.getMonth()+1)+"/"+d.getDate();
  const fmtFull=d=>d.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});
  const fmtDay=d=>["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][d.getDay()];
  const fmtMonth=d=>d.toLocaleDateString("en-US",{month:"long",year:"numeric"});
  const sameDay=(a,b)=>a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();

  const[bookings,setBookings]=useState([]);
  /* Load real appointments — same source of truth as the Jobs page.
     Authenticated users always get real data (even if empty). */
  React.useEffect(()=>{
    let stop=false;
    (async()=>{
      try{
        const sess=await window.supabase.auth.getSession();
        const uid=sess?.data?.session?.user?.id;
        if(!uid)return;
        const{data,error}=await window.supabase
          .from("appointments")
          .select("id,starts_at,ends_at,title,location,notes,status,leads(customer_name,customer_phone,customer_address,issue,urgency,source)")
          .eq("user_id",uid)
          .order("starts_at",{ascending:true})
          .limit(200);
        if(stop||error)return;
        if(data&&data.length>0){setBookings(data.map(apptToBooking));}
        else{setBookings([]);}
      }catch(e){console.warn("calendar load:",e.message);}
    })();
    return()=>{stop=true;};
  },[]);

  const[addPanel,setAddPanel]=useState(false);
  const[newAppt,setNewAppt]=useState({name:"",phone:"",address:"",issue:"",date:"",time:"",timeEnd:"",urgency:"standard"});
  const[bookTech,setBookTech]=useState("Unassigned");
  const[bookNotes,setBookNotes]=useState("");

  React.useEffect(()=>{
    if(selBook){setBookTech(selBook.tech||"Unassigned");setBookNotes(selBook.notes||"");}
  },[selBook?.id]);

  /* Week helpers */
  const weekStart=new Date(today);
  weekStart.setDate(weekStart.getDate()-weekStart.getDay()+weekOff*7);
  const weekDays=Array.from({length:7},(_,i)=>{const d=new Date(weekStart);d.setDate(d.getDate()+i);return d;});
  const hours=Array.from({length:12},(_,i)=>i+7);
  const timeToRow=t=>{const[h]=t.replace(/\s?(AM|PM)/i,"").split(":").map(Number);const hr=t.includes("PM")&&h!==12?h+12:t.includes("AM")&&h===12?0:h;return hr-7;};

  /* Month helpers */
  const monthDate=new Date(today.getFullYear(),today.getMonth()+monthOff,1);
  const daysInMonth=new Date(monthDate.getFullYear(),monthDate.getMonth()+1,0).getDate();
  const startDay=monthDate.getDay();
  const monthCells=[];
  for(let i=0;i<startDay;i++)monthCells.push(null);
  for(let i=1;i<=daysInMonth;i++){const d=new Date(monthDate.getFullYear(),monthDate.getMonth(),i);monthCells.push(d);}

  return(
    <div className="fu h-full flex flex-col">
      {/* Appointment detail panel */}
      <Panel open={!!selBook} onClose={()=>setSelBook(null)}>
        {selBook&&<>
          <PanelHeader onClose={()=>setSelBook(null)} title={selBook.name} sub={fmtFull(selBook.date)+" — "+selBook.time}/>

            <div className="bg-white border border-neutral-200 p-5">
              <div className="flex items-center justify-between mb-3">
                <div className="flex items-center gap-2"><span className="w-4 h-4 text-neutral-300">{I.clock}</span><p className="text-sm text-neutral-900">{selBook.time} — {selBook.timeEnd}</p></div>
                <span className={"text-xs px-2.5 py-1 "+(selBook.status==="confirmed"?"bg-neutral-900 text-white":"bg-neutral-200 text-neutral-600")}>{selBook.status==="confirmed"?"Confirmed":"Pending"}</span>
              </div>
              {selBook.urgency==="emergency"&&<span className="text-xs bg-neutral-900 text-white px-2.5 py-1">Emergency</span>}

/* ── Appointment helpers — appointments rows are the source of truth for both
   Jobs and Calendar. These mappers convert an appointments-joined-leads row
   into the shapes those two pages render. ── */
const fmtTime12=(d)=>d.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});
const humanDay=(d)=>{
  const today=new Date();today.setHours(0,0,0,0);
  const target=new Date(d);target.setHours(0,0,0,0);
  const diff=Math.round((target-today)/86400000);
  if(diff===0)return "Today";
  if(diff===1)return "Tomorrow";
  if(diff===-1)return "Yesterday";
  if(diff>1&&diff<7)return target.toLocaleDateString("en-US",{weekday:"long"});
  if(diff<-1&&diff>-7)return Math.abs(diff)+" days ago";
  return target.toLocaleDateString("en-US",{month:"short",day:"numeric"});
};
const apptToJob=(row)=>{
  const lead=row.leads||{};
  const start=row.starts_at?new Date(row.starts_at):null;
  const completed=row.status==="completed";
  return {
    id:row.id,
    starts_at:row.starts_at,
    day:start?humanDay(start):"TBD",
    time:start?fmtTime12(start):"TBD",
    cust:lead.customer_name||row.title||"Customer",
    ph:lead.customer_phone||"",
    addr:row.location||lead.customer_address||"",
    issue:row.notes||lead.issue||"",
    tech:row.tech||"Unassigned",
    rev:Number(row.revenue_estimate)||0,
    st:completed?"Completed":"Confirmed",
    pct:row.progress_pct||(completed?100:0),
    checklist:Array.isArray(row.checklist)?row.checklist:[],
    checked:Array.isArray(row.checklist_done)?row.checklist_done:[],
    parts:Array.isArray(row.parts)?row.parts:[],
    notes:row.tech_notes||"",
    /* Pipeline-stage timestamps */
    confirmed_at:row.confirmed_at||null,
    invoiced_at:row.invoice_sent_at||null,
    paid_at:row.invoice_paid_at||null,
    invoice_amount:row.invoice_amount?Number(row.invoice_amount):null,
    invoice_line_items:Array.isArray(row.invoice_line_items)?row.invoice_line_items:[],
    invoice_tax_pct:row.invoice_tax_pct?Number(row.invoice_tax_pct):0,
    invoice_notes:row.invoice_notes||""
  };
};
/* Derive the pipeline stage from the job's timestamps/fields. */
const jobStage=(j)=>{
  if(j.paid_at)return "Paid";
  if(j.invoiced_at)return "Invoiced";
  if(j.st==="Completed"||j.pct>=100)return "Completed";
  if(j.pct>0&&j.pct<100)return "In Progress";
  const isToday=j.starts_at&&new Date(j.starts_at).toDateString()===new Date().toDateString();
  if(j.confirmed_at&&isToday)return "Today";
  if(j.confirmed_at)return "Confirmed";
  return "New";
};
const STAGES=["New","Confirmed","Today","In Progress","Completed","Invoiced","Paid"];
const apptToBooking=(row)=>{
  const lead=row.leads||{};
  const start=row.starts_at?new Date(row.starts_at):new Date();
  const end=row.ends_at?new Date(row.ends_at):new Date(start.getTime()+3600000);
  const statusMap={scheduled:"confirmed",completed:"confirmed",canceled:"pending",no_show:"pending"};
  return {
    id:row.id,
    name:lead.customer_name||row.title||"Customer",
    phone:lead.customer_phone||"",
    address:row.location||lead.customer_address||"",
    issue:row.notes||lead.issue||"",
    time:fmtTime12(start),
    timeEnd:fmtTime12(end),
    date:start,
    status:statusMap[row.status]||"confirmed",
    urgency:lead.urgency||"standard",
    source:lead.source==="phone"?"AI Call":(lead.source||"Phone")
  };
};

const Layout=({pg,go,isNew,isDemo,vapiKeys,setVapiKeys,saveSetting,onLogout,agentCfg,profile,onProfileSave,showTutorial,onTutorialDone})=>{
  /* ── Quote view state ── */
  const[quoteView,setQuoteView]=useState(null);
  /* ── Plan state (lives at Layout level so all pages can access) ── */
  const[curPlan,setCurPlan]=useState(isDemo?"growth":null);
  const[sub,setSub]=useState(null); /* full subscription row: status, period end, cancel_at_period_end */
  const curPlanData=getPlan(curPlan);
  /* Load subscription from Supabase on mount. Demo users keep the fake "growth" plan. */
  React.useEffect(()=>{
    if(isDemo)return;
    let stop=false;
    const load=async(retries=0)=>{
      try{
        const sess=await window.supabase.auth.getSession();
        const uid=sess?.data?.session?.user?.id;
        if(!uid)return;
        const{data}=await window.supabase.from("subscriptions").select("plan,status,current_period_end,cancel_at_period_end").eq("user_id",uid).maybeSingle();
        if(stop)return;
        setSub(data||null);
        const active=data&&(data.status==="active"||data.status==="trialing");
        setCurPlan(active?data.plan:null);
      }catch(e){console.warn("sub load:",e.message);}
    };
    load();
    /* If we just came back from Stripe Checkout, the webhook may still be in flight.
       Poll a few times to pick up the new subscription row. */
    const url=new URL(window.location.href);
    if(url.searchParams.get("checkout")==="success"){
      let tries=0;
      const iv=setInterval(()=>{tries++;load();if(tries>=6)clearInterval(iv);},2000);
      /* Clean the URL so a refresh doesn't re-poll */
      url.searchParams.delete("checkout");
      url.searchParams.delete("session_id");
      window.history.replaceState({},"",url.toString());
      return()=>{stop=true;clearInterval(iv);};
    }
    return()=>{stop=true;};
  },[isDemo]);
  const[upgradePrompt,setUpgradePrompt]=useState(null);
  const requirePlan=(feature,requiredPlanId)=>{
    if(!curPlan||planTier(curPlan)<planTier(requiredPlanId)){
      setUpgradePrompt({feature,requiredPlan:requiredPlanId});
      return false;
    }
    return true;
  };
  /* Simplified nav: Jobs is the unified pipeline (replaces Leads). Calls is
     an audit log, Calendar is the time view of the same jobs data. Pricebook
     stays in its own spot for now. */
  const nav=[{id:"home",ic:I.home,l:"Home"},{id:"jobs",ic:I.wrench,l:"Jobs"},{id:"calendar",ic:I.cal,l:"Calendar"},{id:"calls",ic:I.phone,l:"Calls"},{id:"quotes",ic:I.dollar,l:"Pricebook"},{id:"agent",ic:I.bot,l:"Agent"},{id:"settings",ic:I.settings,l:"Settings"}];
  const[mobileMenu,setMobileMenu]=useState(false);
  if(quoteView)return<QuoteView data={quoteView} onClose={()=>setQuoteView(null)}/>;
  return(
    <div className="flex flex-col md:flex-row h-screen">
      {/* Desktop sidebar */}
      <div className="hidden md:flex w-[68px] bg-neutral-900 flex-col items-center py-5 shrink-0">
        <div className="mb-8"><Logo s={36} light/></div>
        <div className="flex-1 flex flex-col items-center gap-1">{nav.map(n=>(
          <button key={n.id} onClick={()=>go(n.id)} title={n.l} className={"w-10 h-10 flex items-center justify-center transition-all duration-200 relative group "+(pg===n.id?"bg-white text-neutral-900":"text-neutral-500 hover:text-white hover:bg-white/10")}>
            <span className="w-[18px] h-[18px]">{n.ic}</span>
            <span className="absolute left-full ml-3 bg-neutral-800 text-white text-xs px-3 py-1.5 opacity-0 group-hover:opacity-100 pointer-events-none whitespace-nowrap transition-opacity duration-150 z-50">{n.l}</span>
          </button>
        ))}</div>
        <Av n={profile?.full_name||"Me"} s={34}/>
      </div>
      {/* Mobile top bar */}
      <div className="md:hidden flex items-center justify-between px-5 bg-neutral-900 shrink-0" style={{height:56}}>
        <button onClick={()=>setMobileMenu(true)} className="w-10 h-10 flex items-center justify-center text-white"><svg fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24" className="w-5 h-5"><path d="M4 7h16M4 12h16"/></svg></button>
        <Logo s={30} light/>
        <div className="w-10"/>
      </div>
      {/* Mobile menu overlay */}
      {mobileMenu&&<div className="md:hidden fixed inset-0 bg-neutral-900 flex flex-col" style={{zIndex:9999}}>
        <div className="flex items-center justify-between px-5 shrink-0" style={{height:56}}>
          <button onClick={()=>setMobileMenu(false)} className="w-10 h-10 flex items-center justify-center text-white"><span className="w-5 h-5">{I.x}</span></button>
          <Logo s={30} light/>
          <div className="w-10"/>
        </div>
        <div className="flex-1 flex flex-col justify-center px-8">
          {nav.map(n=>(
            <button key={n.id} onClick={()=>{go(n.id);setMobileMenu(false);}} className={"flex items-center gap-5 py-4 border-b border-neutral-800 transition-colors "+(pg===n.id?"text-white":"text-neutral-500")}>
              <span className="w-5 h-5">{n.ic}</span>
              <span className="text-lg">{n.l}</span>
              {pg===n.id&&<span className="w-1.5 h-1.5 bg-white ml-auto"/>}
            </button>
          ))}
        </div>
        <div className="px-8 pb-10">
          <div className="flex items-center gap-3 py-4">
            <Av n={profile?.full_name||"Me"} s={36}/>
            <div><p className="text-sm text-white">{profile?.full_name||"Me"}</p><p className="text-xs text-neutral-500">{profile?.email||""}</p></div>
          </div>
        </div>
      </div>}
      <div className="flex-1 flex flex-col min-w-0 min-h-0">
        {/* Desktop top bar */}
        <div className="hidden md:flex h-14 bg-white border-b border-neutral-100 items-center px-8 gap-6 shrink-0">
          <span className="text-sm text-neutral-900 mr-auto">{nav.find(n=>n.id===pg)?.l||"Home"}</span>
          <div className="relative"><span className="absolute left-3.5 top-2.5 w-4 h-4 text-neutral-300">{I.search}</span><input placeholder="Search..." className="pl-10 pr-12 py-2 bg-neutral-100 text-sm w-60 border-0"/><span className="absolute right-3 top-2 text-xs text-neutral-300 bg-neutral-200/60 px-1.5 py-0.5">⌘K</span></div>
          <div className="flex items-center gap-1.5 bg-neutral-100 px-3 py-1.5"><div className="w-1.5 h-1.5 bg-neutral-900"/><span className="text-xs text-neutral-600">AI Active</span></div>
          <button className="relative"><span className="w-5 h-5 text-neutral-400">{I.bell}</span><span className="absolute -top-0.5 -right-0.5 w-2 h-2 bg-neutral-900 border-2 border-white"/></button>
        </div>
        <div className="flex-1 overflow-y-auto p-4 md:p-8">
          {/* Conditional render — each nav click unmounts the previous page and
              mounts the new one fresh, re-running its useEffects so data refetches.
              Trade-off: in-page state (selected detail, scroll position, partially
              filled forms) is lost on navigation. That matches how most apps work. */}
          {/* Jobs, Calendar, Quotes load their own data from Supabase independently.
              Always render the real component — they handle empty states internally.
              Calls + Home still use the global C array (populated by dialiLoader). */}
          {pg==="home"&&(C.length>0?<Home/>:<HomeEmpty/>)}
          {pg==="calls"&&<div className="h-full">{C.length>0?<Calls/>:<CallsEmpty/>}</div>}
          {pg==="calendar"&&<div className="h-full"><Calendar/></div>}
          {pg==="jobs"&&<Jobs/>}
          {pg==="quotes"&&<Quotes/>}
          {pg==="leads"&&(C.length>0?<Leads profile={profile} setQuoteView={setQuoteView}/>:<LeadsEmpty/>)}
          {pg==="agent"&&<div className="h-full"><Agent vapiKeys={vapiKeys} setVapiKeys={setVapiKeys} saveSetting={saveSetting} agentCfg={agentCfg}/></div>}
          {pg==="settings"&&<div className="h-full"><Settings vapiKeys={vapiKeys} setVapiKeys={setVapiKeys} saveSetting={saveSetting} onLogout={onLogout} profile={profile} onProfileSave={onProfileSave} isDemo={isDemo} curPlan={curPlan} setCurPlan={setCurPlan} curPlanData={curPlanData} requirePlan={requirePlan} sub={sub}/></div>}
        </div>
      </div>
      {upgradePrompt&&<UpgradePrompt feature={upgradePrompt.feature} requiredPlan={upgradePrompt.requiredPlan} curPlan={curPlan} onUpgrade={()=>{go("settings");}} onClose={()=>setUpgradePrompt(null)}/>}
      {showTutorial&&<Tutorial onDone={onTutorialDone} go={go}/>}

  );

const Auth=({onLogin,onSignup})=>{
  const[mode,setMode]=useState("login");
  const[email,setEmail]=useState("");
  const[pass,setPass]=useState("");
  const[name,setName]=useState("");
  const[biz,setBiz]=useState("");
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState("");

  const handleSubmit=async()=>{
    setError("");
    if(!email||!pass){setError("Please fill in all fields.");return;}
    if(mode==="signup"&&(!name||!biz)){setError("Please fill in all fields.");return;}
    setLoading(true);
    let err;
    if(mode==="login"){err=await onLogin(email,pass);}
    else{err=await onSignup(email,pass,name,biz);}
    if(err)setError(err);
    setLoading(false);
  };

  const handleKey=e=>{if(e.key==='Enter')handleSubmit();};

    <div className="min-h-screen bg-neutral-50 flex">
      {/* Left — branding */}
      <div className="hidden lg:flex w-[480px] bg-neutral-900 flex-col justify-between p-12 shrink-0">

          <div className="mb-16"><Logo s={44} light/></div>
          <p className="text-4xl text-white tracking-tight leading-tight mb-6">Your AI front office for home services</p>
          <p className="text-neutral-500 leading-relaxed">Diali answers every call, books jobs, qualifies leads, and sends quotes — so you never miss revenue again.</p>
        </div>
        <div className="space-y-8">
          <div className="h-px bg-neutral-800"/>
          {[["2,400+","Contractors use Diali"],["$12M+","Revenue booked by AI"],["98%","Call answer rate"]].map(([v,l])=>(
            <div key={l} className="flex items-center justify-between"><span className="text-xs text-neutral-500 uppercase tracking-widest">{l}</span><span className="text-2xl text-white tabular-nums tracking-tight">{v}</span></div>
          ))}
        </div>
      </div>

      {/* Right — form */}
      <div className="flex-1 flex items-center justify-center p-8">
        <div className="w-full max-w-[400px] fu">
          <div className="lg:hidden mb-10"><Logo s={40}/></div>
          <p className="text-3xl text-neutral-900 tracking-tight mb-2">{mode==="login"?"Welcome back":"Create your account"}</p>
          <p className="text-neutral-400 mb-10">{mode==="login"?"Sign in to your Diali account":"Get started in under 2 minutes"}</p>

          {error&&<div className="bg-neutral-100 border border-neutral-200 px-4 py-3 mb-6"><p className="text-sm text-neutral-700">{error}</p></div>}

          <div className="space-y-4">

/* ══════════════════ VERIFY OTP ══════════════════ */
const VerifyOtp=({email,onVerify,onResend,onBack})=>{
  const[code,setCode]=useState(["","","","","",""]);
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState("");
  const[resent,setResent]=useState(false);
  const[cooldown,setCooldown]=useState(0);
  const refs=[React.useRef(),React.useRef(),React.useRef(),React.useRef(),React.useRef(),React.useRef()];

  /* Auto-focus first input on mount */
  React.useEffect(()=>{refs[0].current?.focus();},[]);

  /* Cooldown timer for resend */
  React.useEffect(()=>{if(cooldown<=0)return;const t=setTimeout(()=>setCooldown(c=>c-1),1000);return()=>clearTimeout(t);},[cooldown]);

  const handleChange=(idx,val)=>{
    /* Only digits */
    const d=val.replace(/\D/g,"");
    if(!d&&!val){
      /* Backspace on empty — move back */
      const next=[...code];next[idx]="";setCode(next);
      if(idx>0)refs[idx-1].current?.focus();
      return;
    }
    if(d.length===1){
      const next=[...code];next[idx]=d;setCode(next);
      if(idx<5)refs[idx+1].current?.focus();
      /* Auto-submit when all 6 digits filled */
      if(idx===5||next.every(c=>c)){
        const full=next.join("");
        if(full.length===6)doVerify(full);
      }
    }
    /* Handle paste of full code */
    if(d.length>=6){
      const digits=d.slice(0,6).split("");
      setCode(digits);
      refs[5].current?.focus();
      doVerify(digits.join(""));
    }
  };

  const handleKeyDown=(idx,e)=>{
    if(e.key==="Backspace"&&!code[idx]&&idx>0){
      const next=[...code];next[idx-1]="";setCode(next);
      refs[idx-1].current?.focus();
    }
    if(e.key==="Enter"){
      const full=code.join("");
      if(full.length===6)doVerify(full);
    }
  };

  const handlePaste=(e)=>{
    e.preventDefault();
    const paste=e.clipboardData.getData("text").replace(/\D/g,"").slice(0,6);
    if(paste.length>=1){
      const digits=paste.padEnd(6," ").slice(0,6).split("").map(c=>c===" "?"":c);
      setCode(digits);
      const nextEmpty=digits.findIndex(c=>!c);
      refs[nextEmpty>=0?nextEmpty:5].current?.focus();
      if(paste.length===6)doVerify(paste);
    }
  };

  const doVerify=async(token)=>{
    setError("");setLoading(true);
    const err=await onVerify(token);
    if(err){setError(err);setCode(["","","","","",""]);refs[0].current?.focus();}
    setLoading(false);
  };

  const doResend=async()=>{
    if(cooldown>0)return;
    setError("");
    const err=await onResend();
    if(err){setError(err);}
    else{setResent(true);setCooldown(30);setTimeout(()=>setResent(false),3000);}
  };

  return(
    <div className="min-h-screen bg-neutral-50 flex">
      {/* Left — branding (same as Auth) */}
      <div className="hidden lg:flex w-[480px] bg-neutral-900 flex-col justify-between p-12 shrink-0">
        <div>
          <div className="mb-16"><Logo s={44} light/></div>
          <p className="text-4xl text-white tracking-tight leading-tight mb-6">Your AI front office for home services</p>
          <p className="text-neutral-500 leading-relaxed">Diali answers every call, books jobs, qualifies leads, and sends quotes — so you never miss revenue again.</p>
        </div>
        <div className="space-y-8">
          <div className="h-px bg-neutral-800"/>
          {[["2,400+","Contractors use Diali"],["$12M+","Revenue booked by AI"],["98%","Call answer rate"]].map(([v,l])=>(
            <div key={l} className="flex items-center justify-between"><span className="text-xs text-neutral-500 uppercase tracking-widest">{l}</span><span className="text-2xl text-white tabular-nums tracking-tight">{v}</span></div>
          ))}
        </div>
      </div>

      {/* Right — OTP form */}
      <div className="flex-1 flex items-center justify-center p-8">
        <div className="w-full max-w-[400px] fu">
          <div className="lg:hidden mb-10"><Logo s={40}/></div>

          {/* Lock icon */}
          <div className="w-14 h-14 bg-neutral-900 flex items-center justify-center mb-8">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="0"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </div>

          <p className="text-3xl text-neutral-900 tracking-tight mb-2">Check your email</p>
          <p className="text-neutral-400 mb-2">We sent a 6-digit verification code to</p>
          <p className="text-neutral-900 text-sm font-medium mb-8">{email}</p>

          {error&&<div className="bg-neutral-100 border border-neutral-200 px-4 py-3 mb-6"><p className="text-sm text-neutral-700">{error}</p></div>}

          {/* 6-digit input boxes */}
          <div className="flex gap-3 mb-8" onPaste={handlePaste}>
            {code.map((digit,i)=>(
              <input key={i} ref={refs[i]} type="text" inputMode="numeric" maxLength={1} value={digit}
                onChange={e=>handleChange(i,e.target.value)}
                onKeyDown={e=>handleKeyDown(i,e)}
                className={"w-full aspect-square text-center text-2xl text-neutral-900 border transition-colors outline-none "+(digit?"border-neutral-900":"border-neutral-200 hover:border-neutral-300")}
                style={{fontSize:"1.5rem"}}
                disabled={loading}
              />
            ))}
          </div>

          <button onClick={()=>{const full=code.join("");if(full.length===6)doVerify(full);}} disabled={loading||code.join("").length<6}
            className={"w-full py-3.5 text-sm transition-colors flex items-center justify-center gap-2 "+(loading||code.join("").length<6?"bg-neutral-300 text-neutral-500 cursor-not-allowed":"bg-neutral-900 text-white hover:bg-black")}>
            {loading&&<div className="w-4 h-4 border-2 border-white border-t-transparent animate-spin" style={{borderRadius:'50%'}}/>}
            {loading?"Verifying...":"Verify & continue"}
          </button>

          <div className="flex items-center justify-between mt-6">
            <button onClick={onBack} className="text-sm text-neutral-400 hover:text-neutral-900 transition-colors flex items-center gap-1.5">
              <span className="w-4 h-4">{I.arrowL}</span>Back
            </button>
            <button onClick={doResend} disabled={cooldown>0} className={"text-sm transition-colors "+(cooldown>0?"text-neutral-300 cursor-not-allowed":"text-neutral-400 hover:text-neutral-900")}>
              {resent?"Code sent!":cooldown>0?`Resend in ${cooldown}s`:"Resend code"}
            </button>
          </div>

          <p className="text-xs text-neutral-300 text-center mt-10">Didn't get the email? Check your spam folder or click resend.</p>
        </div>
      </div>
    </div>
  );
};

          .order("created_at",{ascending:true});

    setDraft({cat:"Service",name:"",desc:"",unit:"each",rate:0,tax:true});
    setAdding(false);
  };
  const cats=[...new Set(items.map(i=>i.cat))];
  const avgRate=items.length?Math.round(items.reduce((a,i)=>a+i.rate,0)/items.length):0;
  return(
  <div className="fu">
    <Panel open={adding} onClose={()=>setAdding(false)}>
      <PanelHeader onClose={()=>setAdding(false)} title="Add pricebook item" sub="Add a new service, part, or labor rate"/>
      <div className="flex-1 overflow-y-auto px-7 py-6 space-y-6">
        <FF label="Name" required><TI value={draft.name} onChange={e=>setDraft({...draft,name:e.target.value})} placeholder="e.g. Standard diagnostic"/></FF>
        <FF label="Description"><TA value={draft.desc} onChange={e=>setDraft({...draft,desc:e.target.value})} rows={2} placeholder="Short description"/></FF>
        <div><label className="text-xs text-neutral-400 mb-1.5 block">Category</label><div className="grid grid-cols-5 gap-2">{["Service","Labor","Parts","Maintenance","Install"].map(c=><button key={c} onClick={()=>setDraft({...draft,cat:c})} className={"text-xs py-2.5 border transition-colors "+(draft.cat===c?"bg-neutral-900 text-white border-neutral-900":"border-neutral-200 text-neutral-500 hover:border-neutral-400")}>{c}</button>)}</div></div>
        <FD label="Pricing"/>
        <div className="grid grid-cols-2 gap-3"><div><FF label="Rate"><div className="relative"><span className="absolute left-4 top-1/2 -translate-y-1/2 text-sm text-neutral-400 pointer-events-none">$</span><input value={draft.rate} onChange={e=>setDraft({...draft,rate:parseFloat(e.target.value)||0})} type="number" min="0" className="w-full border border-neutral-200 pl-8 pr-3 py-3 text-sm tabular-nums"/></div></FF></div><div><FF label="Unit"><SE value={draft.unit} onChange={e=>setDraft({...draft,unit:e.target.value})}><option value="each">each</option><option value="hour">hour</option><option value="lb">lb</option><option value="ft">linear ft</option></SE></FF></div></div>
      </div>
      <div className="px-7 py-5 border-t border-neutral-100 shrink-0"><button onClick={saveItem} className="w-full bg-neutral-900 text-white py-3 text-sm hover:bg-black transition-colors">Add item</button></div>
    </Panel>
    <div className="flex flex-col md:flex-row md:items-end justify-between mb-6 md:mb-8 gap-3">
      <div>
        <p className="text-2xl md:text-4xl text-neutral-900 tracking-tight">Pricebook</p>
        <p className="text-neutral-400 mt-1 md:mt-2 text-sm md:text-base">The source of truth Diali uses to build instant quotes</p>
      </div>
      <button onClick={()=>setAdding(true)} className="bg-neutral-900 text-white px-4 md:px-5 py-2.5 text-sm flex items-center gap-2 hover:bg-black transition-colors"><span className="w-4 h-4">{I.plus}</span><span>Add item</span></button>
    </div>
    <div className="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4 mb-6 md:mb-8">
      {[["Total items",items.length],["Categories",cats.length],["Avg. rate","$"+avgRate],["Top seller",items.length?items[0].name:"—"]].map(([l,v])=>(
        <div key={l} className="bg-white border border-neutral-100 p-5">
          <p className="text-xs text-neutral-400 uppercase tracking-widest mb-2">{l}</p>
          <p className="text-2xl text-neutral-900 tabular-nums tracking-tight">{v}</p>
        </div>
      ))}
    </div>
    <div className="bg-white border border-neutral-100">
      <div className="hidden md:grid px-7 py-3.5 border-b border-neutral-100 grid-cols-6 gap-4">{["Name","Category","Unit","Rate","Uses","Updated"].map(h=><span key={h} className="text-xs text-neutral-400 uppercase tracking-widest">{h}</span>)}</div>
      {items.length?<div>{items.map(it=><div key={it.id} className="px-7 py-4 border-b border-neutral-100 last:border-0 grid grid-cols-6 gap-4 items-center"><span className="text-sm text-neutral-900">{it.name}</span><span className="text-xs bg-neutral-100 text-neutral-600 px-2.5 py-1 w-fit">{it.cat}</span><span className="text-xs text-neutral-400">/{it.unit}</span><span className="text-sm text-neutral-900 tabular-nums">${it.rate}</span><span className="text-xs text-neutral-400">0</span><span className="text-xs text-neutral-400">Just now</span></div>)}</div>
      :<div className="flex flex-col items-center py-12 md:py-16 px-4">
        <div className="w-12 h-12 bg-neutral-50 flex items-center justify-center mb-3"><span className="w-5 h-5 text-neutral-200">{I.dollar}</span></div>
        <p className="text-sm text-neutral-900 mb-1">Your pricebook is empty</p>
        <p className="text-xs text-neutral-400 text-center max-w-sm">Add your services, labor rates, parts, and fees. Diali will use these to build instant quotes for every qualified lead.</p>
      </div>}
    </div>
  </div>);
};

const DEMO_EMAIL="demo@diali.com";
const VALID_PAGES=new Set(["home","calls","calendar","jobs","quotes","leads","agent","settings"]);
const hashPage=()=>{const h=window.location.hash.replace("#","");return VALID_PAGES.has(h)?h:"home";};
const App=()=>{
  const[auth,setAuth]=useState("loading");
  const[isNew,setIsNew]=useState(false);
  const[isDemo,setIsDemo]=useState(false);
  const[pg,setPg]=useState(hashPage);
  const go=p=>{setPg(p);window.location.hash=p==="home"?"":p;};
  React.useEffect(()=>{const h=()=>setPg(hashPage());window.addEventListener("hashchange",h);return()=>window.removeEventListener("hashchange",h);},[]);
  const[vapiKeys,setVapiKeys]=useState({publicKey:"",privateKey:""});
  const[userId,setUserId]=useState(null);
  const[agentCfg,setAgentCfg]=useState(null);
  const[profile,setProfile]=useState(null);
  const[sbReady,setSbReady]=useState(!!window.supabase);
  const[pendingEmail,setPendingEmail]=useState("");
  const[pendingPass,setPendingPass]=useState("");
  const[showTutorial,setShowTutorial]=useState(false);

  /* Wait for Supabase SDK to load */
  React.useEffect(()=>{
    if(window.supabase){setSbReady(true);return;}
    const h=()=>setSbReady(true);
    window.addEventListener('supabase-ready',h);
    return()=>window.removeEventListener('supabase-ready',h);
  },[]);

  /* Load user data from Supabase — returns profile so caller can check onboarding status */
  const loadUserData=async(uid)=>{
    const sb=window.supabase;if(!sb)return null;
    const{data:settings}=await sb.from('settings').select('*').eq('id',uid).single();
    if(settings){
      setVapiKeys({publicKey:settings.vapi_public_key||'',privateKey:settings.vapi_private_key||''});
      setAgentCfg(settings);
    }
    const{data:prof}=await sb.from('profiles').select('*').eq('id',uid).single();
    if(prof)setProfile(prof);
    return prof;
  };

  /* Check existing session on mount */
  React.useEffect(()=>{
    if(!sbReady)return;
    const sb=window.supabase;
    (async()=>{
      const{data:{session}}=await sb.auth.getSession();
      if(session){
        const uid=session.user.id;
        setUserId(uid);
        const prof=await loadUserData(uid);
        if(!prof?.trade)setIsNew(true);
        setIsDemo(session.user.email===DEMO_EMAIL);
        setAuth("app");
      }else{
        setAuth("auth");
      }
    })();
    const{data:{subscription}}=sb.auth.onAuthStateChange((ev)=>{
      if(ev==='SIGNED_OUT'){setAuth("auth");setUserId(null);setVapiKeys({publicKey:"",privateKey:""});setAgentCfg(null);}
    });
    return()=>subscription?.unsubscribe();
  },[sbReady]);

  /* Save a settings field to Supabase */
  const saveSetting=async(data)=>{
    if(!userId||!window.supabase)return;
    try{await window.supabase.from('settings').upsert({id:userId,...data});}catch(e){console.error('Save error:',e);}
  };

  /* Auto-save Vapi keys when they change (debounced) */
  React.useEffect(()=>{
    if(!userId||!sbReady)return;
    const t=setTimeout(()=>{
      saveSetting({vapi_public_key:vapiKeys.publicKey});
    },1000);
    return()=>clearTimeout(t);
  },[vapiKeys.publicKey]);

  /* Handle login */
  const handleLogin=async(email,password)=>{
    const sb=window.supabase;if(!sb)return"Supabase not loaded yet. Try again.";
    const{data,error}=await sb.auth.signInWithPassword({email,password});
    if(error)return error.message;
    const uid=data.user.id;
    setUserId(uid);
    const prof=await loadUserData(uid);
    setIsNew(!prof?.trade);
    setIsDemo(data.user.email===DEMO_EMAIL);
    setAuth("app");
    return null;
  };

  /* Handle signup — creates user + sends OTP via backend */
  const handleSignup=async(email,password,name,biz)=>{
    const sb=window.supabase;if(!sb)return"Supabase not loaded yet. Try again.";
    const{data,error}=await sb.auth.signUp({email,password,options:{data:{full_name:name,business_name:biz}}});
    if(error)return error.message;
    /* Store credentials temporarily for post-verification login */
    setPendingEmail(email);
    setPendingPass(password);
    /* Send OTP via backend */
    try{
      const resp=await fetch(BACKEND_URL+"/api/auth/send-otp",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email})});
      const body=await resp.json();
      if(!resp.ok)return body.error||"Failed to send verification code.";
    }catch(e){console.error("send-otp error:",e);}
    setAuth("verify");
    return null;
  };

  /* Verify OTP code via backend, then sign in */
  const handleVerifyOtp=async(code)=>{
    try{
      const resp=await fetch(BACKEND_URL+"/api/auth/verify-otp",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:pendingEmail,code})});
      const body=await resp.json();
      if(!resp.ok)return body.error||"Verification failed.";
    }catch(e){return"Network error. Please try again.";}
    /* Code verified — now sign in with the stored credentials */
    const sb=window.supabase;if(!sb)return"Supabase not loaded yet.";
    const{data,error}=await sb.auth.signInWithPassword({email:pendingEmail,password:pendingPass});
    if(error)return error.message;
    if(data.user){
      setUserId(data.user.id);
      setIsNew(true);
      const prof=await loadUserData(data.user.id);
      setPendingPass("");/* Clear stored password */
      setAuth("onboard");
    }
    return null;
  };

  /* Resend OTP via backend */
  const handleResendOtp=async()=>{
    try{
      const resp=await fetch(BACKEND_URL+"/api/auth/send-otp",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:pendingEmail})});
      const body=await resp.json();
      if(!resp.ok)return body.error||"Failed to resend code.";
      return null;
    }catch(e){return"Network error.";}
  };

  /* Handle onboarding done — save profile + initial agent config.
     Also pull business_name from the signup metadata to persist it. */
  const handleOnboardDone=async(obData)=>{
    if(userId&&window.supabase){
      try{
        /* Pull business_name + full_name from the auth user metadata (set during signup) */
        const{data:{user:authUser}}=await window.supabase.auth.getUser();
        const metaBiz=authUser?.user_metadata?.business_name||"";
        const metaName=authUser?.user_metadata?.full_name||"";
        await window.supabase.from('profiles').upsert({id:userId,trade:obData.trade||'',service_area:obData.area||'',phone:obData.phone||'',team_size:obData.teamSize||'',services:obData.services||[],business_name:metaBiz,full_name:metaName,email:authUser?.email||''});
        await window.supabase.from('settings').upsert({id:userId,voice_id:obData.voiceId||'O7LV5fxosQChiBE7l6Wz',voice_name:obData.voiceName||'Kim',greeting:obData.greeting||"Hi, thanks for calling! I can help you with scheduling a service appointment or answer any questions. What's going on?"});
      }catch(e){console.error('Onboard save error:',e);}
    }
    setAuth("app");
    setShowTutorial(true);
  };

  /* Save profile changes */
  const handleProfileSave=async(data)=>{
    if(!userId||!window.supabase)return;
    await window.supabase.from('profiles').upsert({id:userId,...data});
    setProfile(p=>({...p,...data}));
  };

  /* Handle logout */
  const handleLogout=async()=>{
    try{await window.supabase?.auth.signOut();}catch(e){}
    setAuth("auth");setUserId(null);
  };

  if(auth==="loading")return<div className="min-h-screen flex items-center justify-center bg-neutral-50"><div className="text-center fu"><Logo s={48}/><p className="text-sm text-neutral-300 mt-6">Loading...</p></div></div>;
  if(auth==="auth")return<Auth onLogin={handleLogin} onSignup={handleSignup}/>;
  if(auth==="verify")return<VerifyOtp email={pendingEmail} onVerify={handleVerifyOtp} onResend={handleResendOtp} onBack={()=>setAuth("auth")}/>;
  if(auth==="onboard")return<Onboarding onDone={handleOnboardDone}/>;
  return<Layout pg={pg} go={go} isNew={isNew} isDemo={isDemo} vapiKeys={vapiKeys} setVapiKeys={setVapiKeys} saveSetting={saveSetting} onLogout={handleLogout} agentCfg={agentCfg} profile={profile} onProfileSave={handleProfileSave} showTutorial={showTutorial} onTutorialDone={()=>{setShowTutorial(false);go("home");}}/>;
};
ReactDOM.render(<App/>,document.getElementById("root"));
</script>
<script>
/* ── Data loader: waits for Supabase session then populates C.
   Exposed on window.refreshDialiData so other components (like the test-call
   handler) can re-run it after a call ends to pick up new rows. ── */
window.refreshDialiData = dialiLoader;
async function dialiLoader(){
  /* Wait for Supabase SDK (may still be loading via ESM import) */
  const waitForSb = () => new Promise(resolve => {
    if (window.supabase) return resolve(window.supabase);
    const h = () => resolve(window.supabase);
    window.addEventListener('supabase-ready', h, {once:true});
  });
  try {
    const sb = await waitForSb();
    const sess = await sb.auth.getSession();
    if (!sess.data.session) { console.log("Diali loader: no session"); return; }
    const email = sess.data.session.user.email;
    console.log("Diali loader: fetching data for " + email);

    /* Demo user gets sample data */
    if (email === "demo@diali.com") {
      console.log("Diali loader: demo user, loading demo data");
      C = DEMO_DATA.slice();
      const root = document.getElementById("root");
      ReactDOM.unmountComponentAtNode(root);
      ReactDOM.render(React.createElement(App), root);
      return;
    }

    const [cr, lr] = await Promise.all([
      sb.from("calls").select("*").order("started_at",{ascending:false}).limit(50),
      sb.from("leads").select("*").order("created_at",{ascending:false}).limit(50),
    ]);
    const calls = cr.data||[], leads = lr.data||[];
    console.log("Diali loader: got " + calls.length + " calls, " + leads.length + " leads");

    /* No data — ensure C is empty (clear any stale demo data) and re-render */
    if (!calls.length && !leads.length) {
      console.log("Diali loader: no data yet");
      C = [];
      const root = document.getElementById("root");
      ReactDOM.unmountComponentAtNode(root);
      ReactDOM.render(React.createElement(App), root);
      return;
    }

    const newC = [];
    calls.forEach((call,i) => {
      let lead = leads.find(l=>l.id===call.lead_id)||{};
      /* Fallback: if the linked lead has no customer info (happens when the
         webhook creates an empty lead before bookAppointment's lead was
         linked), swap in the nearest-in-time lead that DOES have info. */
      if (!lead.customer_name && !lead.customer_phone && call.started_at) {
        const callTime = new Date(call.started_at).getTime();
        const nearest = leads
          .filter(l => (l.customer_name || l.customer_phone) && l.created_at)
          .map(l => ({ l, dt: Math.abs(new Date(l.created_at).getTime() - callTime) }))
          .sort((a, b) => a.dt - b.dt)[0];
        /* Within 10 minutes = same call */
        if (nearest && nearest.dt < 10 * 60 * 1000) lead = nearest.l;
      }
      const ds = call.duration_sec||0;
      /* Build transcript — Vapi can return either `transcript` (array) or `messages`
         (array), and sometimes a plain string. Handle all three. */
      let tr = [];
      const src = Array.isArray(call.transcript)?call.transcript:(Array.isArray(call.messages)?call.messages:null);
      if (src) {
        tr = src.map(m=>({
          r:(m.role==="assistant"||m.role==="bot"||m.role==="ai")?"ai":"caller",
          t:m.message||m.content||m.text||""
        })).filter(m=>m.t);
      } else if (typeof call.transcript==="string" && call.transcript.trim()) {
        /* Plain string transcript — split into alternating speaker blocks best-effort */
        tr = call.transcript.split(/\n+/).filter(Boolean).map((line,idx)=>{
          const m = line.match(/^(AI|Assistant|User|Caller|Customer|Bot)\s*[:\-]\s*(.*)$/i);
          if (m) return {r:/ai|assistant|bot/i.test(m[1])?"ai":"caller",t:m[2]};
          return {r:idx%2===0?"ai":"caller",t:line};
        });
      }
      /* Recording URL — Vapi returns `recording_url` or `recordingUrl` */
      const rec = call.recording_url || call.recordingUrl || call.audio_url || null;
      newC.push({
        id:i+1, name:lead.customer_name||"Unknown Caller",
        ph:lead.customer_phone||call.from_number||"Unknown",
        addr:lead.customer_address||"",
        time:call.started_at?new Date(call.started_at).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"}):"",
        dur:Math.floor(ds/60)+":"+String(ds%60).padStart(2,"0"),
        issue:lead.issue||call.summary||"No description",
        urg:lead.urgency||"normal", status:lead.status||"new",
        booked:"", src:lead.source||"Phone", rev:0, conf:75,
        score:lead.status==="won"?"hot":"warm", tr:tr, rec:rec, notes:lead.notes||"", sms:[]
      });
    });
    const usedIds = calls.map(c=>c.lead_id).filter(Boolean);
    leads.filter(l=>!usedIds.includes(l.id)).forEach(lead=>{
      newC.push({
        id:newC.length+1, name:lead.customer_name||"Unknown",
        ph:lead.customer_phone||"", addr:lead.customer_address||"",
        time:lead.created_at?new Date(lead.created_at).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"}):"",
        dur:"0:00", issue:lead.issue||"No description",
        urg:lead.urgency||"normal", status:lead.status||"new",
        booked:"", src:lead.source||"Phone", rev:0, conf:70,
        score:"warm", tr:[], notes:lead.notes||"", sms:[]
      });
    });
    console.log("Diali loader: loaded " + newC.length + " real entries");
    C = newC;
    const root = document.getElementById("root");
    ReactDOM.unmountComponentAtNode(root);
    ReactDOM.render(React.createElement(App), root);
  } catch(e) { console.error("Diali loader:", e); }
}
/* Initial call on page load */
dialiLoader();
</script>
